<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Tap & Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken || userToken === "null") {
            window.location.replace("login.html");
        }
    </script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #FFFFFF; /* Pure White Background */
            color: #0F172A; /* Slate 900 for sharp text */
            overflow: hidden; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Clean Minimalist Cards */
        .clean-card { 
            background: #FFFFFF;
            border: 1px solid #E2E8F0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border-radius: 24px;
        }

        /* 🪙 Solid Black Minimalist Coin */
        .coin-wrapper {
            perspective: 1000px;
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 20;
        }
        
        .the-coin {
            width: 260px; height: 260px; border-radius: 50%;
            background: #000000; /* Pure Black */
            box-shadow: 0 20px 40px rgba(0,0,0,0.15), inset 0 10px 20px rgba(255, 255, 255, 0.15), inset 0 -20px 40px rgba(0, 0, 0, 0.4);
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        
        .coin-inner-ring {
            width: 190px; height: 190px; border-radius: 50%;
            border: 2px solid #334155;
            background: #0F172A; /* Very dark slate */
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 8px 20px rgba(0,0,0,0.8);
            transform: translateZ(20px); 
        }

        /* ✨ Clean Black Particle Animation */
        .floating-text { 
            position: absolute; font-weight: 900; font-size: 38px;
            color: #000000;
            pointer-events: none; z-index: 50;
            animation: organicFloat 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
        }

        @keyframes organicFloat { 
            0% { opacity: 1; transform: translate(0, 0) scale(0.8) rotate(0deg); } 
            50% { transform: translate(var(--tx), -60px) scale(1.2) rotate(var(--tr)); }
            100% { opacity: 0; transform: translate(calc(var(--tx) * 1.5), -120px) scale(1) rotate(calc(var(--tr) * 2)); } 
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen relative selection:bg-slate-200">

    <div id="admin-notif" class="w-full bg-slate-900 text-white py-3 px-4 text-center text-[11px] font-black tracking-widest uppercase hidden z-50 flex items-center justify-center gap-2">
        <span class="animate-pulse">🔔</span> <span id="notif-text">Notification Text</span>
    </div>

    <div class="w-full max-w-md flex flex-col min-h-screen relative z-10 pt-6 pb-10 px-6">
        
        <div class="flex items-center justify-between mb-8">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center bg-slate-50 border border-slate-200 rounded-full active:scale-90 transition-all">
                <svg class="w-5 h-5 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            
            <div class="text-center">
                <h3 class="font-black text-xl tracking-tight text-slate-900">EarnproX</h3>
            </div>
            
            <div class="flex gap-2">
                <button class="w-10 h-10 flex items-center justify-center bg-slate-50 border border-slate-200 rounded-full active:scale-90 transition-all relative">
                    <svg class="w-5 h-5 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    <span id="bell-dot" class="absolute top-2 right-2.5 w-2 h-2 bg-black rounded-full hidden animate-pulse border border-white"></span>
                </button>
            </div>
        </div>

        <div class="clean-card p-6 mb-8 relative overflow-hidden">
            <div class="flex justify-between items-end mb-6 relative z-10">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-black rounded-full animate-pulse"></span> Live Balance
                    </p>
                    <h2 class="text-4xl font-black text-slate-900 flex items-center gap-2 tracking-tighter">
                        <span id="coin-balance">0</span>
                    </h2>
                </div>
                <div class="bg-slate-50 border border-slate-100 px-3 py-1.5 rounded-lg text-right">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Rate</p>
                    <p class="text-xs font-black text-slate-900">1000 = ₹1</p>
                </div>
            </div>

            <button onclick="goToWallet()" id="convert-btn" class="w-full bg-black hover:bg-slate-800 text-white text-[13px] font-black py-4 rounded-xl uppercase tracking-widest active:scale-95 transition-all">
                Convert to Wallet
            </button>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative my-4">
            <div class="coin-wrapper" id="coin-wrapper">
                <div class="the-coin" id="tap-coin">
                    <div class="coin-inner-ring">
                        <span class="text-7xl text-white font-black tracking-tighter">E<span class="text-5xl">X</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="clean-card p-5 mt-auto">
            <div class="flex justify-between items-end mb-3">
                <h4 class="font-bold text-[13px] text-slate-900 flex items-center gap-1.5">
                    Daily Limit
                </h4>
                <h4 class="font-black text-[13px] text-slate-900 tracking-wide"><span id="daily-tapped">0</span> <span class="text-slate-400 font-bold">/ 2000</span></h4>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden relative">
                <div id="progress-bar" class="bg-black h-full rounded-full transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <div id="ad-modal" class="fixed inset-0 z-[9999] bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-5 opacity-0 transition-opacity duration-300">
        <div class="clean-card w-full max-w-sm rounded-[2rem] p-8 text-center transform scale-95 transition-transform duration-300" id="ad-modal-content">
            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">⚡</span>
            </div>
            <h2 class="text-2xl font-black text-slate-900 mb-2">Energy Refilled!</h2>
            <p class="text-sm text-slate-500 font-bold mb-8">Watch a quick sponsor ad to continue.</p>

            <button onclick="claimAdBonus()" class="w-full bg-black text-white text-[15px] font-black py-4 rounded-xl uppercase tracking-widest active:scale-95 transition-all">
                Continue Mining
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", 
            authDomain: "earnproxuc.firebaseapp.com", 
            projectId: "earnproxuc", 
            storageBucket: "earnproxuc.firebasestorage.app", 
            messagingSenderId: "411733884378", 
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        let totalCoins = 0; let dailyTapped = 0; let userId = "";
        let adCounter = 0; let unsyncedCoins = 0; let syncTimer = null; let lastTapTime = 0;
        let isAdModalOpen = false;

        const coinEl = document.getElementById('tap-coin');
        const coinWrapper = document.getElementById('coin-wrapper');
        const SECURE_API_TOKEN = "RashiAkash@2026_Secure";

        async function init() {
            // 🔔 Fetch Notifications
            onSnapshot(collection(db, "notifications"), (snap) => {
                if(!snap.empty) {
                    const latest = snap.docs[0].data();
                    document.getElementById('notif-text').innerText = `${latest.title}: ${latest.message}`;
                    document.getElementById('admin-notif').classList.remove('hidden');
                    document.getElementById('bell-dot').classList.remove('hidden');
                } else {
                    document.getElementById('admin-notif').classList.add('hidden');
                    document.getElementById('bell-dot').classList.add('hidden');
                }
            });

            // Fetch User Data
            const q = query(collection(db, "users"), where("phone", "==", userPhone));
            const snap = await getDocs(q);
            if(!snap.empty) {
                userId = snap.docs[0].id;
                onSnapshot(doc(db, "users", userId), (docSnap) => {
                    const data = docSnap.data();
                    if(!data) window.location.replace("login.html");

                    totalCoins = data.coinBalance || 0;
                    const lastDate = data.lastCoinDate ? new Date(data.lastCoinDate).toDateString() : "";
                    dailyTapped = (lastDate === new Date().toDateString()) ? (data.dailyCoinsEarned || 0) : 0;
                    updateUI();
                });
            } else {
                window.location.replace("login.html");
            }
        }
        init();

        function updateUI() {
            document.getElementById('coin-balance').innerText = totalCoins.toLocaleString();
            document.getElementById('daily-tapped').innerText = dailyTapped;
            document.getElementById('progress-bar').style.width = (dailyTapped / 2000 * 100) + "%";
            
            if(dailyTapped >= 2000) {
                coinEl.style.filter = "opacity(0.5)";
                coinEl.style.pointerEvents = "none";
            }
        }

        // 🎯 DYNAMIC 3D TILT EFFECT
        coinWrapper.addEventListener('mousemove', (e) => {
            if(dailyTapped >= 2000 || isAdModalOpen) return;
            const rect = coinWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            coinEl.style.transform = `rotateX(${-y / 15}deg) rotateY(${x / 15}deg) scale(0.98)`;
        });
        coinWrapper.addEventListener('mouseleave', () => { coinEl.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`; });

        // 🚀 THE MAGIC TAP LOGIC (AD ON 15 CLICKS)
        coinEl.addEventListener('pointerdown', (e) => {
            if(dailyTapped >= 2000 || isAdModalOpen) return;

            // 🛡️ Anti-Auto Clicker (80ms human limit)
            const now = Date.now();
            if (now - lastTapTime < 80) return; 
            lastTapTime = now;

            if (navigator.vibrate) navigator.vibrate(15);
            coinEl.style.transform = `scale(0.92) translateZ(-20px)`;
            setTimeout(() => { coinEl.style.transform = `scale(1) translateZ(0)`; }, 100);

            // ✨ Black Particle Creation
            const float = document.createElement('div');
            float.className = 'floating-text'; float.innerText = '+1';
            const randomX = (Math.random() - 0.5) * 80; const randomRotate = (Math.random() - 0.5) * 40; 
            float.style.setProperty('--tx', `${randomX}px`); float.style.setProperty('--tr', `${randomRotate}deg`);
            
            const rect = coinEl.getBoundingClientRect();
            const touchX = e.clientX || (e.touches && e.touches[0].clientX) || rect.left + rect.width/2;
            const touchY = e.clientY || (e.touches && e.touches[0].clientY) || rect.top + rect.height/2;

            float.style.left = `${touchX - 20}px`; float.style.top = `${touchY - 30}px`;
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 800);

            totalCoins++; dailyTapped++; unsyncedCoins++; adCounter++;
            updateUI();

            // 💰 SHOW POPUP EXACTLY AT 15 TAPS
            if(adCounter >= 15) { 
                adCounter = 0; 
                showAdPopup(); 
            }

            clearTimeout(syncTimer);
            syncTimer = setTimeout(syncToVercelBackend, 1500); 
        });

        // 🛡️ LEVEL 2: SEND TAPS TO VERCEL BACKEND
        async function syncToVercelBackend() {
            if(unsyncedCoins === 0 || !userId) return;
            const toSync = unsyncedCoins; 
            unsyncedCoins = 0; 

            try {
                const response = await fetch('/api/Rashiandakash', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'sync_taps', 
                        payload: { userPhone: userPhone, newTaps: toSync },
                        secureToken: SECURE_API_TOKEN 
                    })
                });

                const data = await response.json();
                if (!data.success) {
                    console.error("Sync Error:", data.error);
                    unsyncedCoins += toSync; 
                }
            } catch(e) { 
                unsyncedCoins += toSync; 
            }
        }

        // 💸 GO TO WALLET DIRECTLY
        window.goToWallet = async () => {
            const btn = document.getElementById('convert-btn');
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>`; 
            btn.disabled = true;

            await syncToVercelBackend(); 
            setTimeout(() => { window.location.href = "wallet.html"; }, 800);
        }

        // 🚀 THE 100% WORKING AD TRICK
        function showAdPopup() {
            isAdModalOpen = true;
            const modal = document.getElementById('ad-modal');
            const content = document.getElementById('ad-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

        window.claimAdBonus = () => {
            window.open('https://omg10.com/4/10867186', '_blank'); 
            const modal = document.getElementById('ad-modal');
            const content = document.getElementById('ad-modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); isAdModalOpen = false; }, 300);
        };
    </script>
</body>
</html>
