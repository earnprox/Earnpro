<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Mining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken || userToken === "null") {
            window.location.replace("login.html");
        }
    </script>

    <style>
        /* Ultra Minimalist White Theme */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #FFFFFF; 
            color: #0F172A; 
            overflow: hidden; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }

        .clean-card { 
            background: #FFFFFF;
            border: 1px solid #F1F5F9; 
            box-shadow: 0 12px 32px rgba(0,0,0,0.04);
        }

        /* 🪙 Solid Black Minimalist Coin */
        .coin-wrapper {
            perspective: 1000px;
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 20;
        }
        
        .the-coin {
            width: 250px; height: 250px; border-radius: 50%;
            background: #000000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15), inset 0 -10px 20px rgba(0, 0, 0, 0.4), inset 0 10px 20px rgba(255, 255, 255, 0.2);
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        
        .coin-inner-ring {
            width: 180px; height: 180px; border-radius: 50%;
            border: 2px solid #334155;
            background: #0F172A;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.6);
            transform: translateZ(20px); 
        }

        /* ✨ Minimalist Particles */
        .floating-text { 
            position: absolute; font-weight: 900; font-size: 38px;
            color: #000000;
            pointer-events: none; z-index: 50;
            animation: floatUp 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards; 
        }

        @keyframes floatUp { 
            0% { opacity: 1; transform: translateY(0) scale(0.8); } 
            100% { opacity: 0; transform: translateY(-100px) scale(1.2); } 
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen relative selection:bg-slate-200">

    <div id="admin-notif" class="w-full bg-black text-white py-3 px-4 text-center text-[11px] font-bold tracking-widest uppercase hidden z-50 flex items-center justify-center gap-2">
        <span class="animate-pulse">🔔</span> <span id="notif-text">Notification Text</span>
    </div>

    <div class="w-full max-w-md flex flex-col min-h-screen relative z-10 pt-6 pb-8 px-6">
        
        <div class="flex items-center justify-between mb-8">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center bg-white border border-slate-200 rounded-full active:scale-90 transition-all shadow-sm">
                <svg class="w-5 h-5 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h3 class="font-black text-xl tracking-tight text-slate-900">EarnproX</h3>
            <div class="w-10 h-10"></div>
        </div>

        <div class="clean-card rounded-3xl p-6 mb-8 relative">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-black rounded-full animate-pulse"></span> Balance
                    </p>
                    <h2 class="text-4xl font-black text-slate-900 tracking-tighter">
                        <span id="coin-balance">0</span>
                    </h2>
                </div>
                <div class="bg-slate-50 border border-slate-100 px-3 py-1.5 rounded-lg text-right">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Rate</p>
                    <p class="text-xs font-black text-slate-900">1000 = ₹1</p>
                </div>
            </div>

            <button onclick="goToWallet()" id="convert-btn" class="w-full bg-black hover:bg-slate-800 text-white text-[13px] font-bold py-4 rounded-xl uppercase tracking-widest active:scale-95 transition-all shadow-md">
                Convert to Wallet
            </button>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative my-4">
            <div class="coin-wrapper" id="coin-wrapper">
                <div class="the-coin" id="tap-coin">
                    <div class="coin-inner-ring">
                        <span class="text-6xl text-white font-black tracking-tighter">E<span class="text-4xl">X</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="clean-card rounded-2xl p-5 mt-auto">
            <div class="flex justify-between items-end mb-3">
                <h4 class="font-bold text-[12px] text-slate-900 uppercase tracking-widest">
                    Daily Limit
                </h4>
                <h4 class="font-black text-[14px] text-slate-900 tracking-wide"><span id="daily-tapped">0</span> <span class="text-slate-400 text-[12px] font-bold">/ 2000</span></h4>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden relative">
                <div id="progress-bar" class="bg-black h-full rounded-full transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", 
            authDomain: "earnproxuc.firebaseapp.com", 
            projectId: "earnproxuc", 
            storageBucket: "earnproxuc.firebasestorage.app", 
            messagingSenderId: "411733884378", 
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        let totalCoins = 0; let dailyTapped = 0; let userId = "";
        let adCounter = 0; let unsyncedCoins = 0; let syncTimer = null; let lastTapTime = 0;

        const coinEl = document.getElementById('tap-coin');
        const coinWrapper = document.getElementById('coin-wrapper');
        const SECURE_API_TOKEN = "RashiAkash@2026_Secure";
        const DAILY_MAX = 2000;

        async function init() {
            onSnapshot(collection(db, "notifications"), (snap) => {
                if(!snap.empty) {
                    const latest = snap.docs[0].data();
                    document.getElementById('notif-text').innerText = `${latest.title}: ${latest.message}`;
                    document.getElementById('admin-notif').classList.remove('hidden');
                }
            });

            const q = query(collection(db, "users"), where("phone", "==", userPhone));
            const snap = await getDocs(q);
            if(!snap.empty) {
                userId = snap.docs[0].id;
                onSnapshot(doc(db, "users", userId), (docSnap) => {
                    const data = docSnap.data();
                    if(!data) window.location.replace("login.html");

                    totalCoins = data.coinBalance || 0;
                    const lastDate = data.lastCoinDate ? new Date(data.lastCoinDate).toDateString() : "";
                    dailyTapped = (lastDate === new Date().toDateString()) ? (data.dailyCoinsEarned || 0) : 0;
                    updateUI();
                });
            }
        }
        init();

        function updateUI() {
            document.getElementById('coin-balance').innerText = totalCoins.toLocaleString();
            document.getElementById('daily-tapped').innerText = dailyTapped;
            document.getElementById('progress-bar').style.width = (dailyTapped / DAILY_MAX * 100) + "%";
            
            if(dailyTapped >= DAILY_MAX) {
                coinEl.style.opacity = "0.3";
                coinEl.style.pointerEvents = "none";
            }
        }

        coinWrapper.addEventListener('mousemove', (e) => {
            if(dailyTapped >= DAILY_MAX) return;
            const rect = coinWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            coinEl.style.transform = `rotateX(${-y / 15}deg) rotateY(${x / 15}deg) scale(0.98)`;
        });
        coinWrapper.addEventListener('mouseleave', () => { coinEl.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`; });

        coinEl.addEventListener('pointerdown', (e) => {
            if(dailyTapped >= DAILY_MAX) return;

            const now = Date.now();
            if (now - lastTapTime < 80) return; // Hack Check
            lastTapTime = now;

            if (navigator.vibrate) navigator.vibrate(10);
            
            coinEl.style.transform = `scale(0.92) translateZ(-20px)`;
            setTimeout(() => { coinEl.style.transform = `scale(1) translateZ(0)`; }, 100);

            const float = document.createElement('div');
            float.className = 'floating-text'; float.innerText = '+1';
            
            const rect = coinEl.getBoundingClientRect();
            const touchX = e.clientX || (e.touches && e.touches[0].clientX) || rect.left + rect.width/2;
            const touchY = e.clientY || (e.touches && e.touches[0].clientY) || rect.top + rect.height/2;

            float.style.left = `${touchX - 20}px`; float.style.top = `${touchY - 30}px`;
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 800);

            totalCoins++; dailyTapped++; unsyncedCoins++; adCounter++;
            updateUI();

            // 💰 TRIGGER MONETAG NOTIFICATION AD AT 15 TAPS
            if(adCounter >= 15) { 
                adCounter = 0; 
                fireNotificationAd(); 
            }

            clearTimeout(syncTimer);
            syncTimer = setTimeout(syncToVercelBackend, 1500); 
        });

        async function syncToVercelBackend() {
            if(unsyncedCoins === 0 || !userId) return;
            const toSync = unsyncedCoins; unsyncedCoins = 0; 

            try {
                const response = await fetch('/api/Rashiandakash', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'sync_taps', payload: { userPhone: userPhone, newTaps: toSync }, secureToken: SECURE_API_TOKEN })
                });

                const data = await response.json();
                if (!data.success) { unsyncedCoins += toSync; }
            } catch(e) { unsyncedCoins += toSync; }
        }

        window.goToWallet = async () => {
            const btn = document.getElementById('convert-btn');
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-slate-400 border-t-transparent rounded-full animate-spin mx-auto"></div>`; 
            btn.disabled = true;

            await syncToVercelBackend(); 
            setTimeout(() => { window.location.href = "wallet.html"; }, 800);
        }

        // 🚀 DYNAMIC INJECTION FOR NOTIFICATION AD
        function fireNotificationAd() {
            console.log("Triggering Notification Ad...");
            
            // Notification / In-Page Push (Zone: 10860922)
            const script = document.createElement('script');
            script.dataset.zone = '10860922';
            script.src = 'https://nap5k.com/tag.min.js';
            document.body.appendChild(script);

            // Trigger Vignette just in case it's available
            if(window.showTag) { window.showTag(); }
        }
    </script>
    
    <script>(function(s){s.dataset.zone='10860816',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
</body>
</html>
