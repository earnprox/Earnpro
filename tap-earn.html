<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | 10Cr Tap & Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken || userToken === "null") {
            window.location.replace("login.html");
        }
    </script>

    <style>
        :root {
            --bg-color: #09090B;
            --text-color: #FFFFFF;
            --glass-bg: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            --glass-border: rgba(255,255,255,0.08);
            --card-text: #FFFFFF;
            --muted-text: #94A3B8;
            --progress-bg: rgba(0,0,0,0.5);
        }

        /* 🌓 Light Mode Variables */
        body.light-mode {
            --bg-color: #F8FAFC;
            --text-color: #0F172A;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0,0,0,0.05);
            --card-text: #0F172A;
            --muted-text: #64748B;
            --progress-bg: rgba(0,0,0,0.05);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            overflow: hidden; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .glass-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(24px); 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.1);
            color: var(--card-text);
            transition: all 0.4s ease;
        }

        .text-muted { color: var(--muted-text); }
        .progress-container { background-color: var(--progress-bg); }

        /* 🪙 Ultra-Premium 3D Coin */
        .coin-wrapper {
            perspective: 1000px;
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 20;
        }
        
        .the-coin {
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #FFE55C 0%, #F59E0B 40%, #B45309 80%, #78350F 100%);
            box-shadow: 0 20px 50px rgba(245, 158, 11, 0.4), inset 0 10px 20px rgba(255, 255, 255, 0.6), inset 0 -20px 40px rgba(0, 0, 0, 0.8), 0 0 0 14px rgba(245, 158, 11, 0.15);
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        
        .coin-inner-ring {
            width: 190px; height: 190px; border-radius: 50%;
            border: 5px solid #FCD34D;
            background: linear-gradient(135deg, #F59E0B, #D97706);
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 8px 20px rgba(0,0,0,0.4), 0 2px 10px rgba(255,255,255,0.3);
            transform: translateZ(20px); 
        }

        /* ✨ Organic Particle Animation */
        .floating-text { 
            position: absolute; font-weight: 900; font-size: 38px;
            text-shadow: 0px 4px 15px rgba(245,158,11,0.8);
            pointer-events: none; z-index: 50;
            animation: organicFloat 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
        }

        @keyframes organicFloat { 
            0% { opacity: 1; transform: translate(0, 0) scale(0.8) rotate(0deg); } 
            50% { transform: translate(var(--tx), -60px) scale(1.2) rotate(var(--tr)); }
            100% { opacity: 0; transform: translate(calc(var(--tx) * 1.5), -120px) scale(1) rotate(calc(var(--tr) * 2)); } 
        }

        .progress-glow { box-shadow: 0 0 15px 2px #F59E0B; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen relative">

    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 bg-amber-500/10 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <div id="admin-notif" class="w-full bg-indigo-600 text-white py-2.5 px-4 text-center text-[11px] font-black tracking-widest uppercase hidden z-50 shadow-md flex items-center justify-center gap-2">
        <span class="animate-pulse">🔔</span> <span id="notif-text">Notification Text</span>
    </div>

    <div class="w-full max-w-md flex flex-col min-h-screen relative z-10 pt-4 pb-10 px-5">
        
        <div class="flex items-center justify-between mb-6">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center glass-card rounded-full active:scale-90 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            
            <div class="text-center">
                <h3 class="font-black text-xl tracking-tight">EarnproX <span class="text-amber-500">Miner</span></h3>
            </div>
            
            <div class="flex gap-2">
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center glass-card rounded-full active:scale-90 transition-all" id="theme-btn">
                    🌞
                </button>
                <button class="w-10 h-10 flex items-center justify-center glass-card rounded-full active:scale-90 transition-all relative">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    <span id="bell-dot" class="absolute top-2 right-2.5 w-2 h-2 bg-rose-500 rounded-full hidden animate-pulse border border-white"></span>
                </button>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] p-6 mb-8 relative overflow-hidden">
            <div class="absolute -right-6 -top-6 w-24 h-24 bg-amber-500/20 rounded-full blur-2xl"></div>
            
            <div class="flex justify-between items-end mb-5 relative z-10">
                <div>
                    <p class="text-[10px] font-bold text-muted uppercase tracking-widest mb-1.5 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span> Live Balance
                    </p>
                    <h2 class="text-4xl font-black flex items-center gap-2 tracking-tighter">
                        <span id="coin-balance">0</span>
                        <span class="text-2xl drop-shadow-md">🪙</span>
                    </h2>
                </div>
                <div class="glass-card px-3 py-1.5 rounded-lg text-right">
                    <p class="text-[9px] font-bold text-muted uppercase tracking-widest mb-0.5">Rate</p>
                    <p class="text-xs font-black text-amber-500">1000 🪙 = ₹1</p>
                </div>
            </div>

            <button onclick="goToWallet()" id="convert-btn" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-white text-sm font-black py-3.5 rounded-xl uppercase tracking-widest shadow-[0_8px_25px_rgba(245,158,11,0.3)] active:scale-95 transition-all">
                Go to Wallet to Convert 💸
            </button>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative my-4">
            <div class="coin-wrapper" id="coin-wrapper">
                <div class="the-coin" id="tap-coin">
                    <div class="coin-inner-ring">
                        <span class="text-7xl drop-shadow-[0_4px_10px_rgba(0,0,0,0.5)] text-amber-950 font-black tracking-tighter">E<span class="text-5xl">X</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-4 mt-auto">
            <div class="flex justify-between items-end mb-2.5">
                <h4 class="font-bold text-[13px] flex items-center gap-1.5">
                    <span class="text-amber-500 text-lg leading-none">⚡</span> Daily Energy
                </h4>
                <h4 class="font-black text-[13px] text-amber-500 tracking-wide"><span id="daily-tapped">0</span> <span class="text-muted font-bold">/ 2000</span></h4>
            </div>
            <div class="w-full progress-container rounded-full h-3 overflow-hidden relative">
                <div id="progress-bar" class="bg-gradient-to-r from-amber-600 via-amber-400 to-yellow-300 h-full rounded-full transition-all duration-300 relative">
                    <div class="absolute right-0 top-0 bottom-0 w-2 progress-glow bg-white rounded-full"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", 
            authDomain: "earnproxuc.firebaseapp.com", 
            projectId: "earnproxuc", 
            storageBucket: "earnproxuc.firebasestorage.app", 
            messagingSenderId: "411733884378", 
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        let totalCoins = 0; let dailyTapped = 0; let userId = "";
        let adCounter = 0; let unsyncedCoins = 0; let syncTimer = null;
        let lastTapTime = 0;

        const coinEl = document.getElementById('tap-coin');
        const coinWrapper = document.getElementById('coin-wrapper');

        // 🌗 THEME LOGIC
        window.toggleTheme = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('earnprox_theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-btn').innerText = isLight ? '🌙' : '🌞';
        };

        if (localStorage.getItem('earnprox_theme') === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('theme-btn').innerText = '🌙';
        }

        async function init() {
            onSnapshot(collection(db, "notifications"), (snap) => {
                if(!snap.empty) {
                    const latest = snap.docs[0].data();
                    document.getElementById('notif-text').innerText = `${latest.title}: ${latest.message}`;
                    document.getElementById('admin-notif').classList.remove('hidden');
                    document.getElementById('bell-dot').classList.remove('hidden');
                }
            });

            const q = query(collection(db, "users"), where("phone", "==", userPhone));
            const snap = await getDocs(q);
            if(!snap.empty) {
                userId = snap.docs[0].id;
                onSnapshot(doc(db, "users", userId), (docSnap) => {
                    const data = docSnap.data();
                    totalCoins = data.coinBalance || 0;
                    const lastDate = data.lastCoinDate ? new Date(data.lastCoinDate).toDateString() : "";
                    dailyTapped = (lastDate === new Date().toDateString()) ? (data.dailyCoinsEarned || 0) : 0;
                    updateUI();
                });
            }
        }
        init();

        function updateUI() {
            document.getElementById('coin-balance').innerText = totalCoins.toLocaleString();
            document.getElementById('daily-tapped').innerText = dailyTapped;
            document.getElementById('progress-bar').style.width = (dailyTapped / 2000 * 100) + "%";
            if(dailyTapped >= 2000) {
                coinEl.style.filter = "grayscale(1) brightness(0.5)";
                coinEl.style.pointerEvents = "none";
            }
        }

        coinWrapper.addEventListener('mousemove', (e) => {
            if(dailyTapped >= 2000) return;
            const rect = coinWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            coinEl.style.transform = `rotateX(${-y / 10}deg) rotateY(${x / 10}deg) scale(0.98)`;
        });
        coinWrapper.addEventListener('mouseleave', () => { coinEl.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`; });

        coinEl.addEventListener('pointerdown', (e) => {
            if(dailyTapped >= 2000) return;

            const now = Date.now();
            if (now - lastTapTime < 80) return; 
            lastTapTime = now;

            if (navigator.vibrate) navigator.vibrate(15);
            coinEl.style.transform = `scale(0.92) translateZ(-20px)`;
            setTimeout(() => { coinEl.style.transform = `scale(1) translateZ(0)`; }, 100);

            const float = document.createElement('div');
            float.className = 'floating-text text-amber-400'; float.innerText = '+1';
            const randomX = (Math.random() - 0.5) * 80; const randomRotate = (Math.random() - 0.5) * 40; 
            float.style.setProperty('--tx', `${randomX}px`); float.style.setProperty('--tr', `${randomRotate}deg`);
            
            const rect = coinEl.getBoundingClientRect();
            const touchX = e.clientX || (e.touches && e.touches[0].clientX) || rect.left + rect.width/2;
            const touchY = e.clientY || (e.touches && e.touches[0].clientY) || rect.top + rect.height/2;

            float.style.left = `${touchX - 20}px`; float.style.top = `${touchY - 30}px`;
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 800);

            totalCoins++; dailyTapped++; unsyncedCoins++; adCounter++;
            updateUI();

            // 💰 TRIGGER AD EXACTLY AT 15 TAPS
            if(adCounter >= 15) { 
                adCounter = 0; 
                triggerMonetagAd(); 
            }

            clearTimeout(syncTimer);
            syncTimer = setTimeout(syncToFirebase, 1500); 
        });

        async function syncToFirebase() {
            if(unsyncedCoins === 0 || !userId) return;
            const toSync = unsyncedCoins; unsyncedCoins = 0;
            try {
                await updateDoc(doc(db, "users", userId), {
                    coinBalance: increment(toSync),
                    dailyCoinsEarned: increment(toSync),
                    lastCoinDate: new Date().toISOString()
                });
            } catch(e) { unsyncedCoins += toSync; }
        }

        // 🔥 FIXED: GO TO WALLET (No hanging Loader)
        window.goToWallet = () => {
            const btn = document.getElementById('convert-btn');
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>`; 
            btn.disabled = true;

            // Failsafe Redirect: Sync data in background, but redirect user immediately after max 1 second
            syncToFirebase().finally(() => {
                window.location.href = "wallet.html"; 
            });

            // Ultimate Failsafe (If Firebase is completely down)
            setTimeout(() => { window.location.href = "wallet.html"; }, 1000);
        }

        // 🚀 THE AD TRICK FOR MONETAG
        function triggerMonetagAd() {
            console.log("Triggering 15 Click Ad...");
            // Monetag Vignettes intercept link clicks. We create an invisible link and click it.
            const dummyLink = document.createElement('a');
            dummyLink.href = "javascript:void(0)";
            document.body.appendChild(dummyLink);
            dummyLink.click();
            dummyLink.remove();
        }
    </script>

    <script>(function(s){s.dataset.zone='10860922',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
</body>
