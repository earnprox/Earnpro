<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | 1000Cr Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken || userToken === "null") {
            window.location.replace("login.html");
        }
    </script>

    <style>
        /* 💎 1000Cr Ultra-Luxury Theme */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FAFAFA; /* Off-white luxury base */
            color: #09090B; 
            overflow: hidden; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Ambient Mesh Glows for that expensive feel */
        .ambient-glow-1 { position: absolute; top: -10%; left: -20%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,0,0,0.03) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; filter: blur(60px); z-index: 0; pointer-events: none; }
        .ambient-glow-2 { position: absolute; bottom: -10%; right: -20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(245,158,11,0.05) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; filter: blur(60px); z-index: 0; pointer-events: none; }

        /* Apple-style Frosted Glass Cards */
        .luxury-card { 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(0,0,0,0.04); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.02), inset 0 1px 0 rgba(255,255,255,1);
            border-radius: 32px; /* Smooth Squircle */
        }

        /* 🪙 The $100M Obsidian Black Coin */
        .coin-wrapper {
            perspective: 1500px;
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 20;
        }
        
        .the-coin {
            width: 270px; height: 270px; border-radius: 50%;
            /* Metallic Black Gradient */
            background: radial-gradient(circle at 30% 30%, #475569 0%, #1E293B 30%, #020617 80%, #000000 100%);
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.2), /* Deep drop shadow */
                inset 0 12px 24px rgba(255,255,255,0.15), /* Top light reflection */
                inset 0 -12px 24px rgba(0,0,0,0.8), /* Bottom dark edge */
                0 0 0 1px rgba(255,255,255,0.05); /* Hairline rim */
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        
        .coin-inner-ring {
            width: 190px; height: 190px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            background: radial-gradient(circle at 50% 0%, #1E293B, #000000);
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 15px 30px rgba(0,0,0,0.9), 0 4px 10px rgba(255,255,255,0.05);
            transform: translateZ(25px); /* 3D Depth */
        }

        /* ✨ High-End Particle Physics */
        .floating-text { 
            position: absolute; font-weight: 900; font-size: 32px;
            color: #0F172A;
            pointer-events: none; z-index: 50;
            animation: fluidFloat 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        @keyframes fluidFloat { 
            0% { opacity: 0; transform: translate(0, 0) scale(0.5); } 
            20% { opacity: 1; transform: translate(calc(var(--tx) * 0.5), -40px) scale(1.1); }
            100% { opacity: 0; transform: translate(var(--tx), -120px) scale(0.9); } 
        }

        /* Custom minimal scroll/progress */
        .progress-track { background: #E2E8F0; border-radius: 100px; overflow: hidden; height: 6px; }
        .progress-fill { background: #0F172A; height: 100%; border-radius: 100px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen relative">

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div id="admin-notif" class="w-full bg-slate-900 text-white py-3.5 px-4 text-center text-[11px] font-bold tracking-widest uppercase hidden z-50 flex items-center justify-center gap-2 shadow-md">
        <span class="animate-pulse text-amber-400">●</span> <span id="notif-text">System Notification</span>
    </div>

    <div class="w-full max-w-md flex flex-col min-h-screen relative z-10 pt-6 pb-8 px-6">
        
        <div class="flex items-center justify-between mb-8">
            <button onclick="window.history.back()" class="w-12 h-12 flex items-center justify-center bg-white/50 backdrop-blur-md border border-black/5 rounded-full active:scale-90 transition-all shadow-sm">
                <svg class="w-5 h-5 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="flex flex-col items-center">
                <h3 class="font-black text-[22px] tracking-tight text-slate-900 leading-none">EarnproX</h3>
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Mining Core</span>
            </div>
            <div class="w-12 h-12"></div> </div>

        <div class="luxury-card p-6 mb-10">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span> Live Portfolio
                    </p>
                    <h2 class="text-[44px] leading-none font-black text-slate-900 tracking-tighter">
                        <span id="coin-balance">0</span><span class="text-xl text-slate-400 ml-1">X</span>
                    </h2>
                </div>
                <div class="bg-slate-100/50 backdrop-blur-sm border border-slate-200/50 px-3 py-1.5 rounded-xl text-right">
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-0.5">Peg Rate</p>
                    <p class="text-[11px] font-black text-slate-900">1000 = ₹1</p>
                </div>
            </div>

            <button onclick="goToWallet()" id="convert-btn" class="w-full bg-slate-900 hover:bg-black text-white text-[14px] font-bold py-4 rounded-2xl uppercase tracking-widest active:scale-[0.98] transition-all shadow-[0_10px_20px_rgba(0,0,0,0.1)] flex items-center justify-center gap-2">
                Convert to Wallet <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
            </button>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative my-4">
            <div class="coin-wrapper" id="coin-wrapper">
                <div class="the-coin" id="tap-coin">
                    <div class="coin-inner-ring">
                        <span class="text-[70px] text-white/90 font-black tracking-tighter drop-shadow-md">E<span class="text-[45px] text-slate-300">X</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="luxury-card p-5 mt-auto">
            <div class="flex justify-between items-end mb-3">
                <h4 class="font-bold text-[12px] text-slate-900 uppercase tracking-widest flex items-center gap-1.5">
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Daily Capacity
                </h4>
                <h4 class="font-black text-[14px] text-slate-900 tracking-wide"><span id="daily-tapped">0</span> <span class="text-slate-400 text-[11px] font-bold">/ 2000</span></h4>
            </div>
            <div class="progress-track w-full">
                <div id="progress-bar" class="progress-fill" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", authDomain: "earnproxuc.firebaseapp.com", projectId: "earnproxuc", storageBucket: "earnproxuc.firebasestorage.app", messagingSenderId: "411733884378", appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        let totalCoins = 0; let dailyTapped = 0; let userId = "";
        let adCounter = 0; let unsyncedCoins = 0; let syncTimer = null; let lastTapTime = 0;

        const coinEl = document.getElementById('tap-coin');
        const coinWrapper = document.getElementById('coin-wrapper');
        const SECURE_API_TOKEN = "RashiAkash@2026_Secure";
        const DAILY_MAX = 2000;

        async function init() {
            // Notifications
            onSnapshot(collection(db, "notifications"), (snap) => {
                if(!snap.empty) {
                    const latest = snap.docs[0].data();
                    document.getElementById('notif-text').innerText = `${latest.title}: ${latest.message}`;
                    document.getElementById('admin-notif').classList.remove('hidden');
                }
            });

            // User Sync
            const q = query(collection(db, "users"), where("phone", "==", userPhone));
            const snap = await getDocs(q);
            if(!snap.empty) {
                userId = snap.docs[0].id;
                onSnapshot(doc(db, "users", userId), (docSnap) => {
                    const data = docSnap.data();
                    if(!data) window.location.replace("login.html");

                    totalCoins = data.coinBalance || 0;
                    const lastDate = data.lastCoinDate ? new Date(data.lastCoinDate).toDateString() : "";
                    dailyTapped = (lastDate === new Date().toDateString()) ? (data.dailyCoinsEarned || 0) : 0;
                    updateUI();
                });
            }
        }
        init();

        function updateUI() {
            // Format number to look expensive (e.g. 1,000)
            document.getElementById('coin-balance').innerText = totalCoins.toLocaleString('en-IN');
            document.getElementById('daily-tapped').innerText = dailyTapped;
            document.getElementById('progress-bar').style.width = (dailyTapped / DAILY_MAX * 100) + "%";
            
            if(dailyTapped >= DAILY_MAX) {
                coinEl.style.opacity = "0.5";
                coinEl.style.pointerEvents = "none";
            }
        }

        // 💎 LIQUID 3D HOVER PHYSICS
        coinWrapper.addEventListener('mousemove', (e) => {
            if(dailyTapped >= DAILY_MAX) return;
            const rect = coinWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            coinEl.style.transform = `rotateX(${-y / 18}deg) rotateY(${x / 18}deg) scale(0.98)`;
        });
        coinWrapper.addEventListener('mouseleave', () => { coinEl.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`; });

        // 🚀 THE TAP INTERACTION
        coinEl.addEventListener('pointerdown', (e) => {
            if(dailyTapped >= DAILY_MAX) return;

            // Hacker Check
            const now = Date.now();
            if (now - lastTapTime < 80) return; 
            lastTapTime = now;

            if (navigator.vibrate) navigator.vibrate(10);
            
            // Deep Press Effect
            coinEl.style.transform = `scale(0.94) translateZ(-25px)`;
            setTimeout(() => { coinEl.style.transform = `scale(1) translateZ(0)`; }, 120);

            // ✨ Fluid Particle Generation
            const float = document.createElement('div');
            float.className = 'floating-text'; float.innerText = '+1';
            
            const randomX = (Math.random() - 0.5) * 120; // Wide cinematic spread
            float.style.setProperty('--tx', `${randomX}px`); 
            
            const rect = coinEl.getBoundingClientRect();
            const touchX = e.clientX || (e.touches && e.touches[0].clientX) || rect.left + rect.width/2;
            const touchY = e.clientY || (e.touches && e.touches[0].clientY) || rect.top + rect.height/2;

            float.style.left = `${touchX - 15}px`; float.style.top = `${touchY - 20}px`;
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 900);

            totalCoins++; dailyTapped++; unsyncedCoins++; adCounter++;
            updateUI();

            // 💰 TRIGGER AD EVERY 15 TAPS
            if(adCounter >= 15) { 
                adCounter = 0; 
                fireNotificationAd(); 
            }

            clearTimeout(syncTimer);
            syncTimer = setTimeout(syncToVercelBackend, 1500); 
        });

        // 🛡️ VERCEL BACKEND SYNC (Level-2 Secure)
        async function syncToVercelBackend() {
            if(unsyncedCoins === 0 || !userId) return;
            const toSync = unsyncedCoins; unsyncedCoins = 0; 

            try {
                const response = await fetch('/api/Rashiandakash', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'sync_taps', payload: { userPhone: userPhone, newTaps: toSync }, secureToken: SECURE_API_TOKEN })
                });
                const data = await response.json();
                if (!data.success) { unsyncedCoins += toSync; }
            } catch(e) { unsyncedCoins += toSync; }
        }

        // 💸 PREMIUM REDIRECT
        window.goToWallet = async () => {
            const btn = document.getElementById('convert-btn');
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>`; 
            btn.disabled = true;

            await syncToVercelBackend(); 
            setTimeout(() => { window.location.href = "wallet.html"; }, 800);
        }

        // 🚀 MONETAG INJECTION
        function fireNotificationAd() {
            // Invisible script injection exactly at 15 clicks
            const script = document.createElement('script');
            script.dataset.zone = '10860922'; // Notification Ad Zone
            script.src = 'https://nap5k.com/tag.min.js';
            document.body.appendChild(script);

            // Optional Vignette fallback
            if(window.showTag) { window.showTag(); }
        }
    </script>
    
    <script>(function(s){s.dataset.zone='10860816',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
</body>
</html>
