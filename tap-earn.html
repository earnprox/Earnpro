<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Premium Mining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken || userToken === "null") {
            window.location.replace("login.html");
        }
    </script>

    <style>
        /* 💎 Ultra-Premium Clean "CRED/Apple" Aesthetic */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F4F5F7; /* Very light premium grey/white */
            color: #000000; 
            overflow: hidden; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Expensive Soft Shadow Cards */
        .premium-card { 
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.04); 
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.08);
            border-radius: 36px;
        }

        /* 🪙 Real 3D Gold Metallic Coin */
        .coin-wrapper {
            perspective: 1500px;
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 20;
        }
        
        .the-coin {
            width: 270px; height: 270px; border-radius: 50%;
            /* Metallic Gold Texture Gradient */
            background: linear-gradient(135deg, #F9D423 0%, #FF4E50 100%);
            border: 8px solid #FFFFFF;
            box-shadow: 
                0 30px 60px rgba(255, 78, 80, 0.35), 
                inset 0 -20px 40px rgba(0,0,0,0.2),
                inset 0 20px 40px rgba(255,255,255,0.6);
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        
        .coin-inner-ring {
            width: 200px; height: 200px; border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.5);
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 100%);
            display: flex; align-items: center; justify-content: center;
            transform: translateZ(30px); 
            box-shadow: inset 0 0 20px rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
        }

        /* ✨ Glowing Text on Click */
        .floating-text { 
            position: absolute; font-weight: 900; font-size: 42px;
            color: #FF4E50;
            text-shadow: 0 10px 20px rgba(255, 78, 80, 0.5);
            pointer-events: none; z-index: 50;
            animation: cleanFloat 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        @keyframes cleanFloat { 
            0% { opacity: 0; transform: translate(0, 0) scale(0.5); } 
            20% { opacity: 1; transform: translate(calc(var(--tx) * 0.5), -40px) scale(1.1); }
            100% { opacity: 0; transform: translate(var(--tx), -120px) scale(0.9); } 
        }

        /* Limit Dark Capsule */
        .limit-capsule {
            background: #09090B;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 20px 24px;
            color: white;
        }

        .progress-track { background: rgba(255,255,255,0.15); border-radius: 100px; overflow: hidden; height: 12px; }
        .progress-fill { 
            background: linear-gradient(90deg, #F9D423, #FF4E50); 
            box-shadow: 0 0 10px #FF4E50;
            height: 100%; border-radius: 100px; transition: width 0.4s ease; 
        }

        .text-gold {
            background: linear-gradient(135deg, #F9D423 0%, #FF4E50 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen relative">

    <div id="admin-notif" class="w-full bg-[#FF4E50] text-white py-3 px-4 text-center text-[12px] font-black tracking-widest uppercase hidden z-50 flex items-center justify-center gap-2 shadow-lg">
        <span class="animate-pulse text-yellow-300">●</span> <span id="notif-text">System Notification</span>
    </div>

    <div class="w-full max-w-md flex flex-col min-h-screen relative z-10 pt-6 pb-6 px-5">
        
        <div class="flex items-center justify-between mb-6">
            <button onclick="window.history.back()" class="w-12 h-12 flex items-center justify-center bg-white border border-gray-200 rounded-full active:scale-90 transition-all shadow-sm">
                <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="flex flex-col items-center">
                <h3 class="font-black text-[24px] tracking-tight text-black leading-none">EarnproX</h3>
            </div>
            <div class="w-12 h-12"></div>
        </div>

        <div class="premium-card p-7 mb-6 relative overflow-hidden">
            <div class="absolute -right-10 -top-10 w-32 h-32 bg-gray-50 rounded-full blur-xl"></div>
            
            <div class="flex justify-between items-start mb-6 relative z-10">
                <div>
                    <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-1">Total Balance</p>
                    <h2 class="text-[50px] leading-none font-black text-black tracking-tighter">
                        <span id="coin-balance">0</span>
                    </h2>
                </div>
                <div class="bg-black px-4 py-2 rounded-xl text-right shadow-lg">
                    <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Rate</p>
                    <p class="text-[14px] font-black text-gold">1K = ₹1</p>
                </div>
            </div>

            <button onclick="goToWallet()" id="convert-btn" class="w-full bg-black hover:bg-gray-900 text-white text-[15px] font-black py-4.5 rounded-[20px] uppercase tracking-widest active:scale-[0.98] transition-all shadow-xl flex items-center justify-center gap-2">
                Convert to Wallet
            </button>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative my-4">
            <div class="coin-wrapper" id="coin-wrapper">
                <div class="the-coin" id="tap-coin">
                    <div class="coin-inner-ring">
                        <span class="text-[85px] text-white font-black tracking-tighter drop-shadow-2xl">E<span class="text-[55px] opacity-80">X</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="limit-capsule mt-auto">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 flex items-center gap-2">
                        <span class="w-2 h-2 bg-[#FF4E50] rounded-full animate-pulse shadow-[0_0_10px_#FF4E50]"></span> Energy Limit
                    </p>
                    <h4 class="font-black text-[22px] tracking-tight">
                        <span id="daily-tapped" class="text-white">0</span> 
                        <span class="text-gray-500 text-[16px]"> / 2000</span>
                    </h4>
                </div>
            </div>
            <div class="progress-track w-full">
                <div id="progress-bar" class="progress-fill" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <div id="ad-modal" class="fixed inset-0 z-[9999] bg-black/60 backdrop-blur-md hidden flex items-center justify-center p-6 opacity-0 transition-opacity duration-300">
        <div class="premium-card w-full max-w-sm rounded-[2rem] p-8 text-center transform scale-95 transition-transform duration-300" id="ad-modal-content">
            <div class="w-24 h-24 bg-gradient-to-tr from-[#F9D423] to-[#FF4E50] rounded-full flex items-center justify-center mx-auto mb-6 shadow-2xl border-4 border-white">
                <span class="text-5xl text-white drop-shadow-lg">⚡</span>
            </div>
            <h2 class="text-3xl font-black text-black mb-2">Refilled!</h2>
            <p class="text-sm text-gray-500 font-bold mb-8">Watch a quick sponsor ad to continue mining your rewards.</p>

            <button onclick="claimAdBonus()" class="w-full bg-black text-white hover:bg-gray-900 text-[16px] font-black py-4.5 rounded-[20px] uppercase tracking-widest active:scale-95 transition-all shadow-xl">
                Continue Mining
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", authDomain: "earnproxuc.firebaseapp.com", projectId: "earnproxuc", storageBucket: "earnproxuc.firebasestorage.app", messagingSenderId: "411733884378", appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        let totalCoins = 0; let dailyTapped = 0; let userId = "";
        let adCounter = 0; let unsyncedCoins = 0; let syncTimer = null; let lastTapTime = 0;
        let isAdModalOpen = false;

        const coinEl = document.getElementById('tap-coin');
        const coinWrapper = document.getElementById('coin-wrapper');
        const SECURE_API_TOKEN = "RashiAkash@2026_Secure";
        const DAILY_MAX = 2000;

        async function init() {
            onSnapshot(collection(db, "notifications"), (snap) => {
                if(!snap.empty) {
                    const latest = snap.docs[0].data();
                    document.getElementById('notif-text').innerText = `${latest.title}: ${latest.message}`;
                    document.getElementById('admin-notif').classList.remove('hidden');
                }
            });

            const q = query(collection(db, "users"), where("phone", "==", userPhone));
            const snap = await getDocs(q);
            if(!snap.empty) {
                userId = snap.docs[0].id;
                onSnapshot(doc(db, "users", userId), (docSnap) => {
                    const data = docSnap.data();
                    if(!data) window.location.replace("login.html");

                    totalCoins = data.coinBalance || 0;
                    const lastDate = data.lastCoinDate ? new Date(data.lastCoinDate).toDateString() : "";
                    dailyTapped = (lastDate === new Date().toDateString()) ? (data.dailyCoinsEarned || 0) : 0;
                    updateUI();
                });
            }
        }
        init();

        function updateUI() {
            document.getElementById('coin-balance').innerText = totalCoins.toLocaleString('en-IN');
            document.getElementById('daily-tapped').innerText = dailyTapped;
            document.getElementById('progress-bar').style.width = (dailyTapped / DAILY_MAX * 100) + "%";
            
            if(dailyTapped >= DAILY_MAX) {
                coinEl.style.opacity = "0.5";
                coinEl.style.pointerEvents = "none";
                coinEl.style.filter = "grayscale(100%) brightness(0.8)";
            } else {
                coinEl.style.opacity = "1";
                coinEl.style.pointerEvents = "auto";
                coinEl.style.filter = "none";
            }
        }

        coinWrapper.addEventListener('mousemove', (e) => {
            if(dailyTapped >= DAILY_MAX || isAdModalOpen) return;
            const rect = coinWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            coinEl.style.transform = `rotateX(${-y / 15}deg) rotateY(${x / 15}deg) scale(0.98)`;
        });
        coinWrapper.addEventListener('mouseleave', () => { coinEl.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`; });

        coinEl.addEventListener('pointerdown', (e) => {
            if(dailyTapped >= DAILY_MAX || isAdModalOpen) return;

            const now = Date.now();
            if (now - lastTapTime < 80) return; 
            lastTapTime = now;

            if (navigator.vibrate) navigator.vibrate(10);
            
            coinEl.style.transform = `scale(0.94) translateZ(-30px)`;
            setTimeout(() => { coinEl.style.transform = `scale(1) translateZ(0)`; }, 120);

            const float = document.createElement('div');
            float.className = 'floating-text'; float.innerText = '+1';
            const randomX = (Math.random() - 0.5) * 120; 
            float.style.setProperty('--tx', `${randomX}px`); 
            
            const rect = coinEl.getBoundingClientRect();
            const touchX = e.clientX || (e.touches && e.touches[0].clientX) || rect.left + rect.width/2;
            const touchY = e.clientY || (e.touches && e.touches[0].clientY) || rect.top + rect.height/2;

            float.style.left = `${touchX - 20}px`; float.style.top = `${touchY - 20}px`;
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 900);

            totalCoins++; dailyTapped++; unsyncedCoins++; adCounter++;
            updateUI();

            // 💰 TRIGGER POPUP EVERY 15 TAPS
            if(adCounter >= 15) { 
                adCounter = 0; 
                showAdPopup(); 
            }

            clearTimeout(syncTimer);
            syncTimer = setTimeout(syncToVercelBackend, 1500); 
        });

        // 🛡️ VERCEL BACKEND SYNC
        async function syncToVercelBackend() {
            if(unsyncedCoins === 0 || !userId) return;
            const toSync = unsyncedCoins; unsyncedCoins = 0; 

            try {
                const response = await fetch('/api/Rashiandakash', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'sync_taps', payload: { userPhone: userPhone, newTaps: toSync }, secureToken: SECURE_API_TOKEN })
                });
                const data = await response.json();
                if (!data.success) { unsyncedCoins += toSync; }
            } catch(e) { unsyncedCoins += toSync; }
        }

        window.goToWallet = async () => {
            const btn = document.getElementById('convert-btn');
            btn.innerHTML = `<div class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>`; 
            btn.disabled = true;

            await syncToVercelBackend(); 
            setTimeout(() => { window.location.href = "wallet.html"; }, 800);
        }

        // 🚀 AD POPUP LOGIC
        function showAdPopup() {
            isAdModalOpen = true;
            const modal = document.getElementById('ad-modal');
            const content = document.getElementById('ad-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

        window.claimAdBonus = () => {
            window.open('https://omg10.com/4/10867186', '_blank'); // Direct Link opens
            const modal = document.getElementById('ad-modal');
            const content = document.getElementById('ad-modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); isAdModalOpen = false; }, 300);
        };
    </script>
</body>
</html>
