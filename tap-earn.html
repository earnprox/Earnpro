<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Premium Mining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken || userToken === "null") {
            window.location.replace("login.html");
        }
    </script>

    <style>
        /* 💎 Pure White Premium Theme */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FFFFFF; 
            color: #09090B; 
            overflow: hidden; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Clean White Cards */
        .premium-card { 
            background: #FFFFFF;
            border: 1px solid #E5E7EB; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.04);
            border-radius: 32px;
        }

        /* 🪙 Ultra-Minimalist Coin */
        .coin-wrapper {
            perspective: 1500px;
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 20;
        }
        
        .the-coin {
            width: 260px; height: 260px; border-radius: 50%;
            background: #FFFFFF;
            border: 4px solid #09090B;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.08), 
                inset 0 -10px 20px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        
        .coin-inner-ring {
            width: 190px; height: 190px; border-radius: 50%;
            border: 2px dashed #CBD5E1;
            background: #FAFAFA;
            display: flex; align-items: center; justify-content: center;
            transform: translateZ(20px); 
        }

        /* ✨ Clean Particles */
        .floating-text { 
            position: absolute; font-weight: 900; font-size: 36px;
            color: #09090B;
            pointer-events: none; z-index: 50;
            animation: cleanFloat 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        @keyframes cleanFloat { 
            0% { opacity: 0; transform: translate(0, 0) scale(0.5); } 
            20% { opacity: 1; transform: translate(calc(var(--tx) * 0.5), -40px) scale(1.1); }
            100% { opacity: 0; transform: translate(var(--tx), -120px) scale(0.9); } 
        }

        .progress-track { background: #F1F5F9; border-radius: 100px; overflow: hidden; height: 8px; }
        .progress-fill { background: #09090B; height: 100%; border-radius: 100px; transition: width 0.4s ease; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen relative selection:bg-slate-200">

    <div id="admin-notif" class="w-full bg-black text-white py-3.5 px-4 text-center text-[11px] font-bold tracking-widest uppercase hidden z-50 flex items-center justify-center gap-2">
        <span class="animate-pulse">●</span> <span id="notif-text">System Notification</span>
    </div>

    <div class="w-full max-w-md flex flex-col min-h-screen relative z-10 pt-6 pb-8 px-6">
        
        <div class="flex items-center justify-between mb-8">
            <button onclick="window.history.back()" class="w-12 h-12 flex items-center justify-center bg-white border border-slate-200 rounded-full active:scale-90 transition-all shadow-sm">
                <svg class="w-5 h-5 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="flex flex-col items-center">
                <h3 class="font-black text-[22px] tracking-tight text-slate-900 leading-none">EarnproX</h3>
            </div>
            <div class="w-12 h-12"></div>
        </div>

        <div class="premium-card p-6 mb-10">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-black rounded-full animate-pulse"></span> Portfolio
                    </p>
                    <h2 class="text-[44px] leading-none font-black text-slate-900 tracking-tighter">
                        <span id="coin-balance">0</span>
                    </h2>
                </div>
                <div class="bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-xl text-right">
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-0.5">Rate</p>
                    <p class="text-[11px] font-black text-slate-900">1000 = ₹1</p>
                </div>
            </div>

            <button onclick="goToWallet()" id="convert-btn" class="w-full bg-black hover:bg-slate-800 text-white text-[14px] font-bold py-4 rounded-2xl uppercase tracking-widest active:scale-[0.98] transition-all shadow-md flex items-center justify-center gap-2">
                Convert to Wallet
            </button>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative my-4">
            <div class="coin-wrapper" id="coin-wrapper">
                <div class="the-coin" id="tap-coin">
                    <div class="coin-inner-ring">
                        <span class="text-[70px] text-black font-black tracking-tighter">E<span class="text-[45px] text-slate-300">X</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="premium-card p-5 mt-auto">
            <div class="flex justify-between items-end mb-3">
                <h4 class="font-bold text-[12px] text-slate-900 uppercase tracking-widest flex items-center gap-1.5">
                    Daily Limit
                </h4>
                <h4 class="font-black text-[14px] text-slate-900 tracking-wide"><span id="daily-tapped">0</span> <span class="text-slate-400 text-[11px] font-bold">/ 2000</span></h4>
            </div>
            <div class="progress-track w-full">
                <div id="progress-bar" class="progress-fill" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <div id="ad-modal" class="fixed inset-0 z-[9999] bg-slate-900/40 backdrop-blur-md hidden flex items-center justify-center p-6 opacity-0 transition-opacity duration-300">
        <div class="premium-card w-full max-w-sm rounded-[2rem] p-8 text-center transform scale-95 transition-transform duration-300" id="ad-modal-content">
            <div class="w-20 h-20 bg-slate-50 border border-slate-200 rounded-full flex items-center justify-center mx-auto mb-5">
                <span class="text-4xl text-black">⚡</span>
            </div>
            <h2 class="text-2xl font-black text-slate-900 mb-2">Energy Refilled!</h2>
            <p class="text-sm text-slate-500 font-medium mb-8 leading-relaxed">Watch a quick sponsor ad to continue mining.</p>

            <button onclick="claimAdBonus()" class="w-full bg-black text-white text-[15px] font-black py-4 rounded-xl uppercase tracking-widest active:scale-95 transition-all shadow-md">
                Continue Mining
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", authDomain: "earnproxuc.firebaseapp.com", projectId: "earnproxuc", storageBucket: "earnproxuc.firebasestorage.app", messagingSenderId: "411733884378", appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        let totalCoins = 0; let dailyTapped = 0; let userId = "";
        let adCounter = 0; let unsyncedCoins = 0; let syncTimer = null; let lastTapTime = 0;
        let isAdModalOpen = false;

        const coinEl = document.getElementById('tap-coin');
        const coinWrapper = document.getElementById('coin-wrapper');
        const SECURE_API_TOKEN = "RashiAkash@2026_Secure";
        const DAILY_MAX = 2000;

        async function init() {
            onSnapshot(collection(db, "notifications"), (snap) => {
                if(!snap.empty) {
                    const latest = snap.docs[0].data();
                    document.getElementById('notif-text').innerText = `${latest.title}: ${latest.message}`;
                    document.getElementById('admin-notif').classList.remove('hidden');
                }
            });

            const q = query(collection(db, "users"), where("phone", "==", userPhone));
            const snap = await getDocs(q);
            if(!snap.empty) {
                userId = snap.docs[0].id;
                onSnapshot(doc(db, "users", userId), (docSnap) => {
                    const data = docSnap.data();
                    if(!data) window.location.replace("login.html");

                    totalCoins = data.coinBalance || 0;
                    const lastDate = data.lastCoinDate ? new Date(data.lastCoinDate).toDateString() : "";
                    dailyTapped = (lastDate === new Date().toDateString()) ? (data.dailyCoinsEarned || 0) : 0;
                    updateUI();
                });
            }
        }
        init();

        function updateUI() {
            document.getElementById('coin-balance').innerText = totalCoins.toLocaleString('en-IN');
            document.getElementById('daily-tapped').innerText = dailyTapped;
            document.getElementById('progress-bar').style.width = (dailyTapped / DAILY_MAX * 100) + "%";
            
            if(dailyTapped >= DAILY_MAX) {
                coinEl.style.opacity = "0.4";
                coinEl.style.pointerEvents = "none";
            }
        }

        coinWrapper.addEventListener('mousemove', (e) => {
            if(dailyTapped >= DAILY_MAX || isAdModalOpen) return;
            const rect = coinWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            coinEl.style.transform = `rotateX(${-y / 15}deg) rotateY(${x / 15}deg) scale(0.98)`;
        });
        coinWrapper.addEventListener('mouseleave', () => { coinEl.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`; });

        coinEl.addEventListener('pointerdown', (e) => {
            if(dailyTapped >= DAILY_MAX || isAdModalOpen) return;

            const now = Date.now();
            if (now - lastTapTime < 80) return; 
            lastTapTime = now;

            if (navigator.vibrate) navigator.vibrate(10);
            
            coinEl.style.transform = `scale(0.94) translateZ(-25px)`;
            setTimeout(() => { coinEl.style.transform = `scale(1) translateZ(0)`; }, 120);

            const float = document.createElement('div');
            float.className = 'floating-text'; float.innerText = '+1';
            const randomX = (Math.random() - 0.5) * 100; 
            float.style.setProperty('--tx', `${randomX}px`); 
            
            const rect = coinEl.getBoundingClientRect();
            const touchX = e.clientX || (e.touches && e.touches[0].clientX) || rect.left + rect.width/2;
            const touchY = e.clientY || (e.touches && e.touches[0].clientY) || rect.top + rect.height/2;

            float.style.left = `${touchX - 15}px`; float.style.top = `${touchY - 20}px`;
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 900);

            totalCoins++; dailyTapped++; unsyncedCoins++; adCounter++;
            updateUI();

            // 💰 TRIGGER POPUP EVERY 15 TAPS
            if(adCounter >= 15) { 
                adCounter = 0; 
                showAdPopup(); 
            }

            clearTimeout(syncTimer);
            syncTimer = setTimeout(syncToVercelBackend, 1500); 
        });

        // 🛡️ VERCEL BACKEND SYNC (Level-2 Secure)
        async function syncToVercelBackend() {
            if(unsyncedCoins === 0 || !userId) return;
            const toSync = unsyncedCoins; unsyncedCoins = 0; 

            try {
                const response = await fetch('/api/Rashiandakash', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'sync_taps', payload: { userPhone: userPhone, newTaps: toSync }, secureToken: SECURE_API_TOKEN })
                });
                const data = await response.json();
                if (!data.success) { unsyncedCoins += toSync; }
            } catch(e) { unsyncedCoins += toSync; }
        }

        window.goToWallet = async () => {
            const btn = document.getElementById('convert-btn');
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>`; 
            btn.disabled = true;

            await syncToVercelBackend(); 
            setTimeout(() => { window.location.href = "wallet.html"; }, 800);
        }

        // 🚀 AD POPUP LOGIC
        function showAdPopup() {
            isAdModalOpen = true;
            const modal = document.getElementById('ad-modal');
            const content = document.getElementById('ad-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

        window.claimAdBonus = () => {
            window.open('https://omg10.com/4/10867186', '_blank'); // Direct Link opens
            const modal = document.getElementById('ad-modal');
            const content = document.getElementById('ad-modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); isAdModalOpen = false; }, 300);
        };
    </script>
</body>
</html>
