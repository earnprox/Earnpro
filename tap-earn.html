<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Premium Mining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken || userToken === "null") {
            window.location.replace("login.html");
        }
    </script>

    <style>
        :root {
            /* Deep Premium Dark Theme */
            --bg-base: #070B14;
            --text-main: #FFFFFF;
            --text-muted: #8B9BB4;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --accent-glow: rgba(245, 158, 11, 0.15);
        }

        /* 🌓 Light Mode (Clean & Crisp) */
        body.light-mode {
            --bg-base: #F8FAFC;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(15, 23, 42, 0.05);
            --glass-shadow: 0 8px 32px 0 rgba(30, 41, 59, 0.05);
            --accent-glow: rgba(245, 158, 11, 0.1);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            overflow: hidden; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Apple Style Glassmorphism */
        .glass-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            box-shadow: var(--glass-shadow);
            transition: all 0.4s ease;
        }

        /* 🪙 Ultimate 3D Gold Token */
        .coin-wrapper {
            perspective: 1200px;
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 20;
        }
        
        .coin-glow {
            position: absolute;
            width: 280px; height: 280px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 3s infinite alternate;
        }

        .the-coin {
            width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #FFE975 0%, #F5A623 40%, #D07B04 80%, #7A4600 100%);
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.5), 
                inset 0 10px 20px rgba(255, 255, 255, 0.8), 
                inset 0 -20px 40px rgba(0, 0, 0, 0.7),
                0 0 0 10px rgba(245, 166, 35, 0.1);
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none; z-index: 10;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        
        .coin-inner-ring {
            width: 180px; height: 180px; border-radius: 50%;
            border: 4px solid #FFE975;
            background: linear-gradient(135deg, #F5A623, #B86A00);
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 10px 25px rgba(0,0,0,0.5), 0 4px 15px rgba(255,255,255,0.4);
            transform: translateZ(30px); /* Deep 3D Pop */
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* ✨ Premium Particle Animation */
        .floating-text { 
            position: absolute; font-weight: 900; font-size: 42px;
            background: linear-gradient(to bottom, #FFE975, #F5A623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 20px rgba(245,166,35,0.3);
            pointer-events: none; z-index: 50;
            animation: floatAway 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards; 
        }

        @keyframes floatAway { 
            0% { opacity: 1; transform: translate(0, 0) scale(0.5) rotate(0deg); } 
            50% { transform: translate(var(--tx), -70px) scale(1.2) rotate(var(--tr)); }
            100% { opacity: 0; transform: translate(calc(var(--tx) * 1.5), -140px) scale(0.9) rotate(calc(var(--tr) * 2)); } 
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen relative selection:bg-amber-500/30">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-amber-500/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <div id="admin-notif" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-slate-900 py-3 px-4 text-center text-[11px] font-black tracking-widest uppercase hidden z-50 flex items-center justify-center gap-2 shadow-lg">
        <span class="animate-bounce">🔔</span> <span id="notif-text">Notification Text</span>
    </div>

    <div class="w-full max-w-md flex flex-col min-h-screen relative z-10 pt-6 pb-10 px-6">
        
        <div class="flex items-center justify-between mb-8">
            <button onclick="window.history.back()" class="w-11 h-11 flex items-center justify-center glass-card rounded-2xl active:scale-90 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            
            <div class="text-center">
                <h3 class="font-black text-xl tracking-tight flex items-center gap-1">Earnpro<span class="text-amber-500">X</span></h3>
            </div>
            
            <div class="flex gap-2.5">
                <button onclick="toggleTheme()" class="w-11 h-11 flex items-center justify-center glass-card rounded-2xl active:scale-90 transition-all text-lg" id="theme-btn">
                    🌙
                </button>
                <button class="w-11 h-11 flex items-center justify-center glass-card rounded-2xl active:scale-90 transition-all relative">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    <span id="bell-dot" class="absolute top-2.5 right-2.5 w-2.5 h-2.5 bg-rose-500 rounded-full hidden border-2 border-slate-900"></span>
                </button>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] p-6 mb-8 relative overflow-hidden group">
            <div class="absolute -right-10 -top-10 w-32 h-32 bg-amber-500/10 rounded-full blur-2xl group-hover:bg-amber-500/20 transition-all"></div>
            
            <div class="flex justify-between items-end mb-6 relative z-10">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_8px_#34d399]"></span> Live Balance
                    </p>
                    <h2 class="text-[40px] font-black leading-none tracking-tighter flex items-center gap-2">
                        <span id="coin-balance">0</span>
                    </h2>
                </div>
                <div class="glass-card px-3 py-2 rounded-xl text-right border-white/5">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Exchange</p>
                    <p class="text-[11px] font-black text-amber-500">1000 X = ₹1</p>
                </div>
            </div>

            <button onclick="goToWallet()" id="convert-btn" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-slate-900 text-[14px] font-black py-4 rounded-xl uppercase tracking-widest shadow-[0_10px_30px_rgba(245,158,11,0.25)] active:scale-[0.98] transition-all">
                Convert to Wallet 💳
            </button>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative my-4">
            <div class="coin-wrapper" id="coin-wrapper">
                <div class="coin-glow"></div>
                <div class="the-coin" id="tap-coin">
                    <div class="coin-inner-ring">
                        <span class="text-[80px] text-amber-950 font-black tracking-tighter drop-shadow-md">E<span class="text-[55px]">X</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[1.5rem] p-5 mt-auto">
            <div class="flex justify-between items-end mb-3">
                <h4 class="font-bold text-[13px] flex items-center gap-1.5">
                    <span class="text-amber-500 text-lg">⚡</span> Energy Limit
                </h4>
                <h4 class="font-black text-[14px] text-amber-500 tracking-wide"><span id="daily-tapped">0</span> <span class="text-slate-500 text-[12px] font-bold">/ 2000</span></h4>
            </div>
            <div class="w-full bg-slate-800/50 rounded-full h-2.5 overflow-hidden relative border border-white/5">
                <div id="progress-bar" class="bg-gradient-to-r from-amber-600 via-amber-400 to-yellow-300 h-full rounded-full transition-all duration-300 relative">
                    <div class="absolute right-0 top-0 bottom-0 w-2 bg-white rounded-full shadow-[0_0_10px_#fff]"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="ad-modal" class="fixed inset-0 z-[9999] bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-6 opacity-0 transition-opacity duration-300">
        <div class="glass-card w-full max-w-sm rounded-[2rem] p-8 text-center transform scale-95 transition-transform duration-300 border-amber-500/20 shadow-[0_0_50px_rgba(245,158,11,0.1)]" id="ad-modal-content">
            <div class="w-20 h-20 bg-gradient-to-br from-amber-400 to-orange-500 rounded-full flex items-center justify-center mx-auto mb-5 shadow-lg shadow-amber-500/30">
                <span class="text-4xl text-white">⚡</span>
            </div>
            <h2 class="text-2xl font-black mb-2">Energy Refilled!</h2>
            <p class="text-sm text-slate-400 font-medium mb-8 leading-relaxed">Watch a quick sponsor ad to continue mining your X Coins.</p>

            <button onclick="claimAdBonus()" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-slate-900 text-[15px] font-black py-4 rounded-xl uppercase tracking-widest shadow-[0_8px_25px_rgba(245,158,11,0.3)] active:scale-95 transition-all">
                Continue Mining 🚀
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", 
            authDomain: "earnproxuc.firebaseapp.com", 
            projectId: "earnproxuc", 
            storageBucket: "earnproxuc.firebasestorage.app", 
            messagingSenderId: "411733884378", 
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        let totalCoins = 0; let dailyTapped = 0; let userId = "";
        let adCounter = 0; let unsyncedCoins = 0; let syncTimer = null; let lastTapTime = 0;
        let isAdModalOpen = false;

        const coinEl = document.getElementById('tap-coin');
        const coinWrapper = document.getElementById('coin-wrapper');
        const SECURE_API_TOKEN = "RashiAkash@2026_Secure";

        // 🌗 THEME LOGIC
        window.toggleTheme = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('earnprox_theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-btn').innerText = isLight ? '🌙' : '🌞';
        };

        if (localStorage.getItem('earnprox_theme') === 'light') { 
            document.body.classList.add('light-mode'); 
            document.getElementById('theme-btn').innerText = '🌙'; 
        }

        async function init() {
            onSnapshot(collection(db, "notifications"), (snap) => {
                if(!snap.empty) {
                    const latest = snap.docs[0].data();
                    document.getElementById('notif-text').innerText = `${latest.title}: ${latest.message}`;
                    document.getElementById('admin-notif').classList.remove('hidden');
                    document.getElementById('bell-dot').classList.remove('hidden');
                }
            });

            const q = query(collection(db, "users"), where("phone", "==", userPhone));
            const snap = await getDocs(q);
            if(!snap.empty) {
                userId = snap.docs[0].id;
                onSnapshot(doc(db, "users", userId), (docSnap) => {
                    const data = docSnap.data();
                    if(!data) window.location.replace("login.html");

                    totalCoins = data.coinBalance || 0;
                    const lastDate = data.lastCoinDate ? new Date(data.lastCoinDate).toDateString() : "";
                    dailyTapped = (lastDate === new Date().toDateString()) ? (data.dailyCoinsEarned || 0) : 0;
                    updateUI();
                });
            }
        }
        init();

        function updateUI() {
            document.getElementById('coin-balance').innerText = totalCoins.toLocaleString();
            document.getElementById('daily-tapped').innerText = dailyTapped;
            document.getElementById('progress-bar').style.width = (dailyTapped / 2000 * 100) + "%";
            
            if(dailyTapped >= 2000) {
                coinEl.style.filter = "grayscale(1) brightness(0.4)";
                coinEl.style.pointerEvents = "none";
            }
        }

        // 🎯 DYNAMIC 3D TILT EFFECT
        coinWrapper.addEventListener('mousemove', (e) => {
            if(dailyTapped >= 2000 || isAdModalOpen) return;
            const rect = coinWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            coinEl.style.transform = `rotateX(${-y / 12}deg) rotateY(${x / 12}deg) scale(0.96)`;
        });
        coinWrapper.addEventListener('mouseleave', () => { coinEl.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`; });

        // 🚀 THE MAGIC TAP LOGIC
        coinEl.addEventListener('pointerdown', (e) => {
            if(dailyTapped >= 2000 || isAdModalOpen) return;

            const now = Date.now();
            if (now - lastTapTime < 80) return; // Anti-Auto Clicker
            lastTapTime = now;

            if (navigator.vibrate) navigator.vibrate(15);
            
            // 3D Press Effect
            coinEl.style.transform = `scale(0.90) translateZ(-30px)`;
            setTimeout(() => { coinEl.style.transform = `scale(1) translateZ(0)`; }, 120);

            // ✨ Particle Creation
            const float = document.createElement('div');
            float.className = 'floating-text'; float.innerText = '+1';
            const randomX = (Math.random() - 0.5) * 100; const randomRotate = (Math.random() - 0.5) * 60; 
            float.style.setProperty('--tx', `${randomX}px`); float.style.setProperty('--tr', `${randomRotate}deg`);
            
            const rect = coinEl.getBoundingClientRect();
            const touchX = e.clientX || (e.touches && e.touches[0].clientX) || rect.left + rect.width/2;
            const touchY = e.clientY || (e.touches && e.touches[0].clientY) || rect.top + rect.height/2;

            float.style.left = `${touchX - 20}px`; float.style.top = `${touchY - 30}px`;
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 800);

            totalCoins++; dailyTapped++; unsyncedCoins++; adCounter++;
            updateUI();

            // 💰 TRIGGER POPUP AT 15 TAPS
            if(adCounter >= 15) { 
                adCounter = 0; 
                showAdPopup(); 
            }

            clearTimeout(syncTimer);
            syncTimer = setTimeout(syncToVercelBackend, 1500); 
        });

        // 🛡️ VERCEL BACKEND SYNC (Level 2 Secure)
        async function syncToVercelBackend() {
            if(unsyncedCoins === 0 || !userId) return;
            const toSync = unsyncedCoins; unsyncedCoins = 0; 

            try {
                const response = await fetch('/api/Rashiandakash', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'sync_taps', 
                        payload: { userPhone: userPhone, newTaps: toSync },
                        secureToken: SECURE_API_TOKEN 
                    })
                });

                const data = await response.json();
                if (!data.success) { unsyncedCoins += toSync; }
            } catch(e) { unsyncedCoins += toSync; }
        }

        // 💸 GO TO WALLET DIRECTLY
        window.goToWallet = async () => {
            const btn = document.getElementById('convert-btn');
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-slate-900 border-t-transparent rounded-full animate-spin mx-auto"></div>`; 
            btn.disabled = true;

            await syncToVercelBackend(); 
            setTimeout(() => { window.location.href = "wallet.html"; }, 800);
        }

        // 🚀 AD TRICK POPUP
        function showAdPopup() {
            isAdModalOpen = true;
            const modal = document.getElementById('ad-modal');
            const content = document.getElementById('ad-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

        window.claimAdBonus = () => {
            window.open('https://omg10.com/4/10867186', '_blank'); // Your Direct Link
            const modal = document.getElementById('ad-modal');
            const content = document.getElementById('ad-modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); isAdModalOpen = false; }, 300);
        };
    </script>
</body>
</html>
