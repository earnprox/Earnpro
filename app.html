<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | App Installs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        // Secure Auth Check
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken) {
            window.location.replace("login.html");
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .modal-overlay { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Loading Spinner */
        .loader {
            border: 2px solid rgba(255,255,255,0.2); border-top: 2px solid #fff; border-radius: 50%;
            width: 18px; height: 18px; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Premium Toast Animation */
        @keyframes toastSlideDown {
            0% { opacity: 0; transform: translate(-50%, -20px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }
        .toast-animate {
            animation: toastSlideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-[#F4F7F9] font-['Inter'] antialiased text-slate-900 selection:bg-emerald-100 flex justify-center min-h-screen">

    <div id="toastContainer" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 w-[90%] max-w-sm pointer-events-none"></div>

    <div class="w-full max-w-md bg-[#F4F7F9] relative shadow-2xl overflow-x-hidden overflow-y-auto min-h-screen flex flex-col">
        
        <div class="px-5 pt-6 pb-4 bg-white/85 backdrop-blur-xl sticky top-0 z-30 shadow-[0_4px_20px_rgba(0,0,0,0.03)] border-b border-slate-100/80 transition-all">
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center gap-3.5">
                    <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center bg-white shadow-sm hover:shadow-md rounded-full active:scale-90 transition-all border border-slate-200/80 text-slate-700">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </button>
                    <div>
                        <h3 class="font-black text-[22px] tracking-tight text-slate-900 leading-none mb-1">App Hub</h3>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Earn Rewards</p>
                    </div>
                </div>
                <div id="task-count" class="bg-indigo-50/80 text-indigo-600 font-bold text-[11px] px-3.5 py-2 rounded-xl border border-indigo-100/50 shadow-inner flex items-center gap-1.5 transition-all">
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
                    Loading
                </div>
            </div>

            <div class="flex overflow-x-auto gap-2.5 no-scrollbar pb-1">
                <button class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-[12px] font-bold whitespace-nowrap active:scale-95 transition-all shadow-lg shadow-slate-900/20">All Apps</button>
                <button class="bg-white text-slate-600 border border-slate-200/80 hover:bg-slate-50 px-5 py-2.5 rounded-xl text-[12px] font-bold whitespace-nowrap active:scale-95 transition-all shadow-sm">🎮 Gaming</button>
                <button class="bg-white text-slate-600 border border-slate-200/80 hover:bg-slate-50 px-5 py-2.5 rounded-xl text-[12px] font-bold whitespace-nowrap active:scale-95 transition-all shadow-sm">🛠 Utilities</button>
            </div>
        </div>

        <div class="px-4 mt-5 space-y-3.5 pb-24 flex-1" id="task-list">
            <div class="bg-white rounded-[20px] p-3 shadow-sm border border-slate-100 flex items-center justify-between animate-pulse">
                <div class="w-14 h-14 bg-slate-100 rounded-xl shrink-0"></div>
                <div class="flex-1 px-4 space-y-2.5">
                    <div class="w-3/4 h-3.5 bg-slate-100 rounded-md"></div>
                    <div class="w-1/2 h-2.5 bg-slate-100 rounded-md"></div>
                </div>
                <div class="w-16 h-9 bg-slate-100 rounded-xl shrink-0"></div>
            </div>
        </div>
    </div>

    <div id="instructionModal" class="fixed inset-0 z-50 flex items-end justify-center pointer-events-none">
        <div id="modalOverlay" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm opacity-0 modal-overlay transition-opacity duration-300"></div>
        
        <div id="modalSheet" class="relative w-full max-w-md bg-white rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.1)] translate-y-full modal-content pointer-events-auto flex flex-col max-h-[85vh]">
            <div class="w-full flex justify-center pt-5 pb-3" id="closeModalArea">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full cursor-pointer hover:bg-slate-300 transition-colors"></div>
            </div>
            <div class="px-6 pb-8 pt-1 overflow-y-auto no-scrollbar" id="modalDynamicContent">
                </div>
        </div>
    </div>

    <script type="module">
        // Added 'doc', 'setDoc' for Firebase Admin Status saving
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", 
            authDomain: "earnproxuc.firebaseapp.com", 
            projectId: "earnproxuc", 
            storageBucket: "earnproxuc.firebasestorage.app", 
            messagingSenderId: "411733884378", 
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // 🌟 Premium Toast Notification Logic
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const bgColor = type === 'success' ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200';
            const textColor = type === 'success' ? 'text-emerald-800' : 'text-rose-800';
            const icon = type === 'success' ? '✅' : '⚠️';

            toast.className = `toast-animate flex items-center gap-3 w-full p-4 rounded-2xl shadow-lg border ${bgColor} ${textColor} font-semibold text-[13px] backdrop-blur-md bg-opacity-90`;
            toast.innerHTML = `<span class="text-lg">${icon}</span> <span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
                toast.style.transition = 'all 0.4s ease';
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        };

        let tasksDataMap = {};
        let userStatusMap = {}; 
        let latestTaskSnapshot = null;

        // 1. Fetch Live User Status (Admin Control)
        const statusQuery = query(collection(db, "submissions"), where("userPhone", "==", userPhone));
        onSnapshot(statusQuery, (statusSnapshot) => {
            userStatusMap = {};
            statusSnapshot.forEach((doc) => {
                const data = doc.data();
                userStatusMap[data.taskId] = data.status; // Tracks "PENDING", "COMPLETED", "REJECTED"
            });
            renderTasks(); 
        });

        // 2. Fetch Live Tasks
        const q = query(collection(db, "gigs"), where("category", "in", ["Normal Task", "App Install"]));
        onSnapshot(q, (snapshot) => {
            latestTaskSnapshot = snapshot;
            renderTasks();
        });

        // 3. Render UI Function
        function renderTasks() {
            if(!latestTaskSnapshot) return;
            const snapshot = latestTaskSnapshot;

            const taskList = document.getElementById("task-list");
            const taskCount = document.getElementById("task-count");
            
            tasksDataMap = {}; 
            
            if (snapshot.empty) {
                taskCount.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span> 0 Apps`;
                taskList.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 opacity-80">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4 shadow-inner text-4xl border border-slate-100">🚀</div>
                        <h4 class="font-black text-slate-800 text-lg">All Caught Up!</h4>
                        <p class="text-[13px] font-medium text-slate-500 mt-1 text-center px-6">Admin is preparing new premium apps for you.</p>
                    </div>`;
                return;
            }

            taskCount.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span> ${snapshot.size} Apps`;
            taskCount.className = "bg-emerald-50 text-emerald-700 font-bold text-[11px] px-3.5 py-2 rounded-xl border border-emerald-100 flex items-center gap-1.5 shadow-sm";
            
            let html = "";
            let delay = 0;

            snapshot.forEach((docSnap) => {
                const task = docSnap.data();
                const taskId = docSnap.id;
                const reward = parseFloat(task.reward || 0);
                
                tasksDataMap[taskId] = task;
                const status = userStatusMap[taskId] || "NONE";
                
                let difficulty = "EASY"; let barColor = "bg-[#00A87A]"; let badgeColor = "bg-emerald-100 text-emerald-700"; let timeEst = "2 mins"; let rewardColor = "text-[#00A87A]";
                let btnText = "VIEW"; let btnBg = "bg-slate-900"; let btnTextColor = "text-white"; let pointerEvents = "auto"; let opacity = "1";

                if (reward > 10 && reward <= 25) { difficulty = "MEDIUM"; barColor = "bg-amber-400"; badgeColor = "bg-amber-100 text-amber-700"; timeEst = "5 mins"; rewardColor = "text-amber-500"; } 
                else if (reward > 25) { difficulty = "HARD"; barColor = "bg-rose-500"; badgeColor = "bg-rose-100 text-rose-700"; timeEst = "10 mins"; rewardColor = "text-rose-600"; }

                // 🚨 Dynamic Admin Status Logic
                if (status === "PENDING") {
                    btnText = "IN PROGRESS"; btnBg = "bg-amber-50 border border-amber-200"; btnTextColor = "text-amber-600";
                    barColor = "bg-amber-300"; opacity = "0.75"; pointerEvents = "none";
                } else if (status === "COMPLETED") {
                    btnText = "DONE ✅"; btnBg = "bg-emerald-50 border border-emerald-200"; btnTextColor = "text-emerald-600";
                    barColor = "bg-emerald-400"; opacity = "0.6"; pointerEvents = "none";
                } else if (status === "REJECTED") {
                    btnText = "TRY AGAIN"; btnBg = "bg-rose-50 border border-rose-200"; btnTextColor = "text-rose-600";
                    barColor = "bg-rose-500";
                }

                const shortDesc = task.desc ? (task.desc.length > 25 ? task.desc.substring(0, 25) + "..." : task.desc) : "View Instructions";
                const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(task.title)}&background=F2F5F8&color=0B100E&rounded=true&bold=true&size=128`;
                const appImage = task.image || task.logo || task.icon || defaultAvatar;

                html += `
                <div class="bg-white rounded-[20px] p-3 shadow-sm hover:shadow-md border border-slate-100 flex items-center relative overflow-hidden mb-3.5 active:scale-[0.98] transition-all duration-300 task-card cursor-pointer animate-fade-in-up" data-task-id="${taskId}" style="animation-delay: ${delay}s; opacity: ${opacity}; pointer-events: ${pointerEvents};">
                    <div class="absolute left-0 top-0 bottom-0 w-[5px] ${barColor} opacity-90 transition-colors"></div>
                    
                    <div class="w-[54px] h-[54px] ml-2 shrink-0 bg-slate-50 rounded-[14px] border border-slate-100 overflow-hidden shadow-sm flex items-center justify-center p-0.5 group-hover:scale-105 transition-transform">
                        <img src="${appImage}" alt="app" class="w-full h-full object-cover rounded-[12px] bg-white">
                    </div>
                    
                    <div class="flex-1 min-w-0 px-3.5">
                        <h4 class="text-[14.5px] font-black text-slate-900 truncate mb-0.5 tracking-tight">${task.title}</h4>
                        <div class="text-[10px] text-slate-500 font-semibold truncate bg-slate-50 inline-block px-2 py-0.5 rounded border border-slate-100">${shortDesc}</div>
                        <div class="flex items-center gap-2 mt-1.5">
                            <span class="${badgeColor} text-[8px] font-black px-1.5 py-0.5 rounded shadow-sm tracking-wide border border-white">${difficulty}</span>
                            <span class="text-[9px] text-slate-400 font-bold flex items-center gap-0.5">
                                <svg class="w-3 h-3 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ~${timeEst}
                            </span>
                        </div>
                    </div>

                    <div class="shrink-0 flex flex-col items-end pl-2 border-l border-slate-100 min-w-[75px]">
                        <span class="text-[17px] font-black ${rewardColor} mb-1.5 tracking-tighter">₹${reward.toFixed(0)}</span>
                        <div class="w-full ${btnBg} ${btnTextColor} text-[9px] font-black py-2 rounded-xl shadow-sm text-center uppercase tracking-widest transition-colors">${btnText}</div>
                    </div>
                </div>`;
                delay += 0.06; 
            });
            
            taskList.innerHTML = html;
        }

        // --- MODAL & VERCEL UPLOAD LOGIC ---
        const taskListContainer = document.getElementById("task-list");
        const modalOverlay = document.getElementById("modalOverlay");
        const modalSheet = document.getElementById("modalSheet");
        const modalDynamicContent = document.getElementById("modalDynamicContent");
        const closeModalArea = document.getElementById("closeModalArea");

        const VERCEL_API_URL = "/api/submit"; 

        window.openModal = function(taskId) {
            const task = tasksDataMap[taskId];
            if (!task) return;

            const reward = parseFloat(task.reward || 0);
            const fullDesc = task.desc || "Install and open the app. Take a screenshot for proof.";
            const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(task.title)}&background=F2F5F8&color=0B100E&rounded=true&bold=true&size=128`;
            const appImage = task.image || task.logo || task.icon || defaultAvatar;
            
            let trackingLink = task.link;
            trackingLink += trackingLink.includes('?') ? `&subid=${userPhone}` : `?subid=${userPhone}`;

            modalDynamicContent.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-16 h-16 bg-slate-50 rounded-[18px] border border-slate-100 overflow-hidden shadow-sm p-1 shrink-0">
                        <img src="${appImage}" alt="app" class="w-full h-full object-cover rounded-[14px]">
                    </div>
                    <div>
                        <h2 class="text-[20px] font-black text-slate-900 leading-tight mb-1 tracking-tight">${task.title}</h2>
                        <span class="text-[12px] font-black text-emerald-700 bg-emerald-50 px-2.5 py-1 rounded-lg border border-emerald-100 inline-block shadow-sm">Reward: ₹${reward.toFixed(2)}</span>
                    </div>
                </div>

                <div class="bg-[#F8FAFC] rounded-[20px] p-5 border border-slate-200 mb-5 shadow-sm">
                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2">Step 1: Instructions</h3>
                    <p class="text-[13px] text-slate-700 font-semibold leading-relaxed whitespace-pre-wrap">${fullDesc}</p>
                    
                    <a href="${trackingLink}" target="_blank" class="mt-4 w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 text-[14px] font-bold py-3 rounded-xl flex justify-center items-center gap-2 active:scale-95 transition-all shadow-sm">
                        Go To Task Link
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    </a>
                </div>

                <div class="bg-white rounded-[20px] p-5 border border-slate-200 mb-6 shadow-sm">
                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-3">Step 2: Upload Proof</h3>
                    
                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-200 border-dashed rounded-2xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-all overflow-hidden relative group" id="uploadLabel">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6 group-hover:scale-105 transition-transform" id="uploadPlaceholder">
                            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm border border-slate-100 mb-2">
                                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                            </div>
                            <p class="text-[12px] text-slate-500 font-semibold"><span class="font-bold text-slate-800">Tap to upload</span> screenshot</p>
                        </div>
                        <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-cover opacity-95" />
                        <input id="screenshotInput" type="file" accept="image/*" class="hidden" onchange="window.previewImage(event)" />
                    </label>
                </div>

                <button id="submitBtn" onclick="window.submitTask('${taskId}', '${task.title.replace(/'/g, "\\'")}')" class="w-full bg-slate-900 hover:bg-black text-white text-[15px] font-black py-4 rounded-[18px] shadow-[0_8px_20px_rgba(0,0,0,0.15)] flex justify-center items-center gap-2 active:scale-95 transition-all disabled:opacity-80 disabled:active:scale-100">
                    <span id="btnText">SUBMIT VERIFICATION</span>
                    <div id="btnLoader" class="loader hidden"></div>
                </button>
            `;

            modalOverlay.classList.add("pointer-events-auto");
            modalOverlay.style.opacity = "1";
            modalSheet.style.transform = "translateY(0)";
        }

        window.previewImage = function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('uploadPlaceholder').classList.add('hidden');
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        window.submitTask = async function(taskId, taskTitle) {
            const fileInput = document.getElementById('screenshotInput');
            const file = fileInput.files[0];
            
            if (!file) {
                showToast("Please upload a screenshot proof first!", "error");
                return;
            }

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');

            try {
                // 1. Send Image to Vercel -> Discord
                const formData = new FormData();
                formData.append('image', file);
                formData.append('userPhone', userPhone);
                formData.append('taskId', taskId);
                formData.append('taskTitle', taskTitle);

                const vercelRes = await fetch(VERCEL_API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!vercelRes.ok) throw new Error("Backend submission failed");

                // 2. Safely Store Status in Firebase (Admin Tracker)
                const uniqueId = `${userPhone}_${taskId}`;
                await setDoc(doc(db, "submissions", uniqueId), {
                    userPhone: userPhone,
                    taskId: taskId,
                    taskTitle: taskTitle,
                    status: "PENDING",
                    timestamp: new Date().toISOString()
                });

                showToast("Submitted successfully! Admin will verify.", "success");
                closeModalFn();

            } catch (error) {
                console.error(error);
                showToast("Something went wrong. Try again.", "error");
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        }

        function closeModalFn() {
            modalOverlay.style.opacity = "0";
            modalSheet.style.transform = "translateY(100%)";
            setTimeout(() => { modalOverlay.classList.remove("pointer-events-auto"); }, 300);
            
            setTimeout(() => {
                const preview = document.getElementById('imagePreview');
                const placeholder = document.getElementById('uploadPlaceholder');
                const fileInput = document.getElementById('screenshotInput');
                if(preview) preview.classList.add('hidden');
                if(placeholder) placeholder.classList.remove('hidden');
                if(fileInput) fileInput.value = '';
            }, 350);
        }

        taskListContainer.addEventListener("click", (e) => {
            const card = e.target.closest(".task-card");
            if (card) {
                const taskId = card.getAttribute("data-task-id");
                openModal(taskId);
            }
        });

        modalOverlay.addEventListener("click", closeModalFn);
        closeModalArea.addEventListener("click", closeModalFn);
    </script>
</body>
</html>
