<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | App Installs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        // Secure Auth Check - Untouched
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken) {
            window.location.replace("login.html");
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth Entry Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Modal Transitions */
        .modal-overlay { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="bg-[#F4F7F9] font-['Inter'] antialiased text-slate-900 selection:bg-emerald-100 flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-[#F4F7F9] relative shadow-2xl overflow-x-hidden overflow-y-auto min-h-screen flex flex-col">
        
        <div class="px-5 pt-6 pb-4 bg-white/80 backdrop-blur-md sticky top-0 z-30 shadow-sm border-b border-slate-200/60">
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center gap-4">
                    <button onclick="window.history.back()" class="p-2.5 bg-white shadow-sm rounded-full active:scale-90 transition-transform border border-slate-200 text-slate-700">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </button>
                    <div>
                        <h3 class="font-black text-[20px] tracking-tight text-slate-900 leading-tight">App Hub</h3>
                        <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Earn Rewards</p>
                    </div>
                </div>
                <div id="task-count" class="bg-indigo-50 text-indigo-600 font-bold text-[11px] px-3.5 py-2 rounded-xl border border-indigo-100 shadow-inner flex items-center gap-1.5 transition-all">
                    <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                    Loading
                </div>
            </div>

            <div class="flex overflow-x-auto gap-2.5 no-scrollbar pb-1">
                <button class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-[12px] font-bold whitespace-nowrap active:scale-95 transition-all shadow-md">All Apps</button>
                <button class="bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 px-5 py-2.5 rounded-xl text-[12px] font-bold whitespace-nowrap active:scale-95 transition-all shadow-sm">🎮 Gaming</button>
                <button class="bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 px-5 py-2.5 rounded-xl text-[12px] font-bold whitespace-nowrap active:scale-95 transition-all shadow-sm">🛠 Utilities</button>
            </div>
        </div>

        <div class="px-5 mt-5 space-y-4 pb-24 flex-1" id="task-list">
            <div class="bg-white rounded-[24px] p-4 shadow-sm border border-slate-100 flex items-center justify-between animate-pulse">
                <div class="flex items-center gap-4 w-full">
                    <div class="w-14 h-14 bg-slate-100 rounded-[18px]"></div>
                    <div class="space-y-3 flex-1 pr-4">
                        <div class="w-3/4 h-4 bg-slate-100 rounded-md"></div>
                        <div class="w-1/2 h-3 bg-slate-100 rounded-md"></div>
                    </div>
                </div>
                <div class="w-16 h-10 bg-slate-100 rounded-xl shrink-0"></div>
            </div>
        </div>

    </div>

    <div id="instructionModal" class="fixed inset-0 z-50 flex items-end justify-center pointer-events-none">
        <div id="modalOverlay" class="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px] opacity-0 modal-overlay transition-opacity duration-300"></div>
        
        <div id="modalSheet" class="relative w-full max-w-md bg-white rounded-t-[32px] shadow-2xl translate-y-full modal-content pointer-events-auto flex flex-col max-h-[85vh]">
            <div class="w-full flex justify-center pt-4 pb-2" id="closeModalArea">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full"></div>
            </div>
            
            <div class="px-6 pb-8 pt-2 overflow-y-auto no-scrollbar" id="modalDynamicContent">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🔥 Firebase Config - Untouched
        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", 
            authDomain: "earnproxuc.firebaseapp.com", 
            projectId: "earnproxuc", 
            storageBucket: "earnproxuc.firebasestorage.app", 
            messagingSenderId: "411733884378", 
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // Store active tasks globally for the modal
        let tasksDataMap = {};

        const q = query(collection(db, "gigs"), where("category", "in", ["Normal Task", "App Install"]));
        
        onSnapshot(q, (snapshot) => {
            const taskList = document.getElementById("task-list");
            const taskCount = document.getElementById("task-count");
            
            tasksDataMap = {}; // Reset map on new snapshot
            
            if (snapshot.empty) {
                taskCount.innerHTML = `<span class="w-2 h-2 rounded-full bg-slate-400"></span> 0 Apps`;
                taskList.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 opacity-80 animate-fade-in-up">
                        <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4 shadow-inner text-4xl">🚀</div>
                        <h4 class="font-black text-slate-800 text-lg">All Caught Up!</h4>
                        <p class="text-[13px] font-medium text-slate-500 mt-2 text-center px-6 leading-relaxed">Admin is preparing new premium apps for you. Check back shortly!</p>
                    </div>`;
                return;
            }

            taskCount.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span> ${snapshot.size} Available`;
            taskCount.className = "bg-emerald-50 text-emerald-700 font-bold text-[11px] px-3.5 py-2 rounded-xl border border-emerald-100 flex items-center gap-1.5";
            
            let html = "";
            let delay = 0;

            snapshot.forEach((doc) => {
                const task = doc.data();
                const taskId = doc.id;
                const reward = parseFloat(task.reward || 0);
                
                // Save task safely into Map to use in Modal without breaking HTML quotes
                tasksDataMap[taskId] = task;
                
                // Gamified Logic
                let difficulty = "Easy"; let barColor = "bg-[#00A87A]"; let badgeColor = "bg-emerald-100 text-emerald-700"; let icon = "🎯"; let timeEst = "~2 mins"; let rewardColor = "text-[#00A87A]";
                
                if (reward > 10 && reward <= 25) {
                    difficulty = "Medium"; barColor = "bg-amber-400"; badgeColor = "bg-amber-100 text-amber-700"; icon = "🛒"; timeEst = "~5 mins"; rewardColor = "text-amber-500";
                } else if (reward > 25) {
                    difficulty = "Hard"; barColor = "bg-rose-500"; badgeColor = "bg-rose-100 text-rose-700"; icon = "🔥"; timeEst = "~10 mins"; rewardColor = "text-rose-600";
                }

                const shortDesc = task.desc ? (task.desc.length > 20 ? task.desc.substring(0, 18) + ".." : task.desc) : "View Instructions";

                // We change "a href" to "button" to trigger Modal first!
                html += `
                <div class="bg-white rounded-[24px] p-2 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 flex items-center justify-between pr-4 relative overflow-hidden mb-4 transition-all active:scale-[0.98] hover:-translate-y-0.5 animate-fade-in-up task-card cursor-pointer" data-task-id="${taskId}" style="animation-delay: ${delay}s; opacity: 0;">
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 ${barColor} opacity-90"></div>
                    
                    <div class="flex items-center gap-3 py-2 pl-4 w-full pointer-events-none">
                        <div class="relative shrink-0">
                            <div class="w-14 h-14 bg-slate-50 rounded-[18px] flex items-center justify-center p-2 shadow-sm border border-slate-100">
                                <span class="text-3xl">${icon}</span>
                            </div>
                            <span class="absolute -bottom-2 -right-2 ${badgeColor} text-[8.5px] font-black px-1.5 py-0.5 rounded-lg uppercase shadow-sm border border-white">${difficulty}</span>
                        </div>
                        
                        <div class="flex-1 pr-2 min-w-0">
                            <h4 class="text-[14.5px] font-black text-slate-900 mb-1 truncate">${task.title}</h4>
                            <div class="flex items-center gap-2 mb-1.5">
                                <span class="bg-slate-100 text-slate-600 text-[9px] font-bold px-2 py-0.5 rounded-md uppercase whitespace-nowrap truncate max-w-[120px] border border-slate-200/60">${shortDesc}</span>
                            </div>
                            <div class="flex items-center gap-1 text-[10px] text-slate-400 font-semibold">
                                <svg class="w-3.5 h-3.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ${timeEst}
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col items-end gap-2 shrink-0 pl-2 border-l border-slate-50 pointer-events-none">
                        <span class="text-[17px] font-black ${rewardColor}">₹${reward.toFixed(0)}</span>
                        <div class="bg-slate-900 text-white text-[10px] font-bold px-5 py-2 rounded-xl shadow-md uppercase tracking-wider block">View</div>
                    </div>
                </div>`;
                delay += 0.05; 
            });
            
            taskList.innerHTML = html;
        });

        // --- MODAL LOGIC (Event Delegation so it scales safely) ---
        const taskListContainer = document.getElementById("task-list");
        const modalOverlay = document.getElementById("modalOverlay");
        const modalSheet = document.getElementById("modalSheet");
        const modalDynamicContent = document.getElementById("modalDynamicContent");
        const closeModalArea = document.getElementById("closeModalArea");

        function openModal(taskId) {
            const task = tasksDataMap[taskId];
            if (!task) return;

            const reward = parseFloat(task.reward || 0);
            const fullDesc = task.desc || "Install and open the app to get your reward.";
            
            // Affiliate Tracking Link Logic (Executed at the very end when user confirms)
            let trackingLink = task.link;
            trackingLink += trackingLink.includes('?') ? `&subid=${userPhone}` : `?subid=${userPhone}`;

            // Inject Content into Modal
            modalDynamicContent.innerHTML = `
                <div class="flex items-start justify-between mb-6">
                    <div>
                        <h2 class="text-[22px] font-black text-slate-900 leading-tight mb-1">${task.title}</h2>
                        <span class="text-[13px] font-bold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-md border border-emerald-100">Reward: ₹${reward.toFixed(2)}</span>
                    </div>
                    <div class="w-14 h-14 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-center text-3xl shadow-sm shrink-0">📱</div>
                </div>

                <div class="bg-slate-50 rounded-[20px] p-5 border border-slate-100 mb-6">
                    <h3 class="text-[12px] font-black text-slate-400 uppercase tracking-wider mb-3">Task Instructions</h3>
                    <p class="text-[14px] text-slate-700 font-medium leading-relaxed whitespace-pre-wrap">${fullDesc}</p>
                </div>

                <div class="bg-amber-50 border border-amber-100 rounded-[16px] p-4 mb-6 flex gap-3">
                    <span class="text-xl">⚠️</span>
                    <p class="text-[11px] font-semibold text-amber-800 leading-snug">Note: Follow all instructions carefully. Fake tasks or uninstalling immediately may result in rejection of the reward by the admin.</p>
                </div>

                <a href="${trackingLink}" target="_blank" onclick="closeModalFn()" class="w-full bg-slate-900 hover:bg-black text-white text-[15px] font-bold py-4 rounded-[16px] shadow-[0_8px_20px_rgba(0,0,0,0.15)] flex justify-center items-center gap-2 active:scale-95 transition-all">
                    Start Task Now
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </a>
            `;

            // Animate Modal In
            modalOverlay.classList.add("pointer-events-auto");
            modalOverlay.style.opacity = "1";
            modalSheet.style.transform = "translateY(0)";
        }

        function closeModalFn() {
            modalOverlay.style.opacity = "0";
            modalSheet.style.transform = "translateY(100%)";
            setTimeout(() => {
                modalOverlay.classList.remove("pointer-events-auto");
            }, 300); // Wait for transition to finish
        }

        // Attach Event Listeners
        taskListContainer.addEventListener("click", (e) => {
            const card = e.target.closest(".task-card");
            if (card) {
                const taskId = card.getAttribute("data-task-id");
                openModal(taskId);
            }
        });

        modalOverlay.addEventListener("click", closeModalFn);
        closeModalArea.addEventListener("click", closeModalFn);
    </script>
</body>
</html>
