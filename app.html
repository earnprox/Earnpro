<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | App Installs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F2F5F8] font-['Inter'] antialiased text-slate-900 selection:bg-emerald-100 flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-[#F2F5F8] relative shadow-2xl overflow-hidden min-h-screen flex flex-col">
        
        <!-- Header -->
        <div class="px-5 pt-6 pb-4 bg-white sticky top-0 z-40 shadow-[0_4px_20px_rgba(0,0,0,0.03)] border-b border-slate-100">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <button onclick="window.history.back()" class="p-2 bg-slate-50 hover:bg-slate-100 rounded-full active:scale-90 transition-all border border-slate-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </button>
                    <h3 class="font-black text-[18px] text-slate-900">App Hub</h3>
                </div>
                <div class="bg-slate-100 text-slate-500 font-bold text-xs px-3 py-1.5 rounded-lg border border-slate-200">12 Available</div>
            </div>

            <!-- Advanced Category Filters -->
            <div class="flex overflow-x-auto gap-2 no-scrollbar pb-1">
                <button class="bg-[#0B100E] text-white px-5 py-2 rounded-full text-[11px] font-bold whitespace-nowrap active:scale-95 transition-all">All Apps</button>
                <button class="bg-[#E8EBF0] text-slate-600 hover:bg-slate-200 px-5 py-2 rounded-full text-[11px] font-bold whitespace-nowrap active:scale-95 transition-all">🎮 Gaming</button>
                <button class="bg-[#E8EBF0] text-slate-600 hover:bg-slate-200 px-5 py-2 rounded-full text-[11px] font-bold whitespace-nowrap active:scale-95 transition-all">🛠 Utilities</button>
                <button class="bg-[#E8EBF0] text-slate-600 hover:bg-slate-200 px-5 py-2 rounded-full text-[11px] font-bold whitespace-nowrap active:scale-95 transition-all">🛍 Shopping</button>
            </div>
        </div>

        <!-- Task List -->
        <div class="px-5 mt-5 space-y-4 pb-20">
            
            <!-- Easy Gamified Task -->
            <div class="bg-white rounded-[24px] p-1 shadow-sm border border-slate-100 flex items-center justify-between pr-4 relative overflow-hidden">
                <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-[#00A87A]"></div>
                
                <div class="flex items-center gap-3 py-3 pl-4">
                    <div class="relative">
                        <div class="w-14 h-14 bg-[#F2F5F8] rounded-[18px] flex items-center justify-center p-2">
                            <span class="text-3xl">🎯</span>
                        </div>
                        <span class="absolute -bottom-2 -right-2 bg-emerald-100 border border-white text-emerald-600 text-[8px] font-black px-1.5 py-0.5 rounded-md uppercase">Easy</span>
                    </div>
                    <div>
                        <h4 class="text-[14px] font-black text-slate-900 mb-0.5">Winzo Games</h4>
                        <div class="flex items-center gap-2 mb-1.5">
                            <span class="bg-slate-100 text-slate-500 text-[9px] font-bold px-1.5 py-0.5 rounded uppercase">Install + Open</span>
                        </div>
                        <div class="flex items-center gap-1 text-[10px] text-slate-400 font-semibold">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Takes ~2 mins
                        </div>
                    </div>
                </div>

                <div class="flex flex-col items-end gap-2">
                    <span class="text-[16px] font-black text-[#00A87A]">₹12.00</span>
                    <button class="bg-[#0B100E] text-white text-[10px] font-bold px-5 py-2 rounded-xl shadow-md active:scale-90 transition-transform">Get</button>
                </div>
            </div>

            <!-- High Reward Gamified Task -->
            <div class="bg-white rounded-[24px] p-1 shadow-sm border border-slate-100 flex items-center justify-between pr-4 relative overflow-hidden">
                <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-amber-400"></div>
                
                <div class="flex items-center gap-3 py-3 pl-4">
                    <div class="relative">
                        <div class="w-14 h-14 bg-[#F2F5F8] rounded-[18px] flex items-center justify-center p-2">
                            <span class="text-3xl">🛒</span>
                        </div>
                        <span class="absolute -bottom-2 -right-2 bg-amber-100 border border-white text-amber-600 text-[8px] font-black px-1.5 py-0.5 rounded-md uppercase">Medium</span>
                    </div>
                    <div>
                        <h4 class="text-[14px] font-black text-slate-900 mb-0.5">Flipkart App</h4>
                        <div class="flex items-center gap-2 mb-1.5">
                            <span class="bg-slate-100 text-slate-500 text-[9px] font-bold px-1.5 py-0.5 rounded uppercase">Install + Register</span>
                        </div>
                        <div class="flex items-center gap-1 text-[10px] text-slate-400 font-semibold">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Takes ~5 mins
                        </div>
                    </div>
                </div>

                <div class="flex flex-col items-end gap-2">
                    <span class="text-[16px] font-black text-[#00A87A]">₹25.00</span>
                    <button class="bg-[#0B100E] text-white text-[10px] font-bold px-5 py-2 rounded-xl shadow-md active:scale-90 transition-transform">Get</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
