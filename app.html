<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | App Installs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        // Secure Auth Check
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken) {
            window.location.replace("login.html");
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .modal-overlay { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="bg-[#F4F7F9] font-['Inter'] antialiased text-slate-900 selection:bg-emerald-100 flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-[#F4F7F9] relative shadow-2xl overflow-x-hidden overflow-y-auto min-h-screen flex flex-col">
        
        <div class="px-5 pt-6 pb-4 bg-white/90 backdrop-blur-md sticky top-0 z-30 shadow-[0_2px_10px_rgba(0,0,0,0.02)] border-b border-slate-100">
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center gap-3">
                    <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center bg-white shadow-sm rounded-full active:scale-90 transition-transform border border-slate-200 text-slate-700">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </button>
                    <div>
                        <h3 class="font-black text-[20px] tracking-tight text-slate-900 leading-none mb-1">App Hub</h3>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Earn Rewards</p>
                    </div>
                </div>
                <div id="task-count" class="bg-indigo-50 text-indigo-600 font-bold text-[11px] px-3 py-1.5 rounded-lg border border-indigo-100 shadow-inner flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
                    Loading
                </div>
            </div>

            <div class="flex overflow-x-auto gap-2 no-scrollbar pb-1">
                <button class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-[12px] font-bold whitespace-nowrap active:scale-95 transition-all shadow-md">All Apps</button>
                <button class="bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 px-5 py-2.5 rounded-xl text-[12px] font-bold whitespace-nowrap active:scale-95 transition-all shadow-sm">🎮 Gaming</button>
                <button class="bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 px-5 py-2.5 rounded-xl text-[12px] font-bold whitespace-nowrap active:scale-95 transition-all shadow-sm">🛠 Utilities</button>
            </div>
        </div>

        <div class="px-4 mt-4 space-y-3 pb-24 flex-1" id="task-list">
            <div class="bg-white rounded-[20px] p-3 shadow-sm border border-slate-100 flex items-center justify-between animate-pulse">
                <div class="w-12 h-12 bg-slate-100 rounded-xl shrink-0"></div>
                <div class="flex-1 px-3 space-y-2">
                    <div class="w-3/4 h-3 bg-slate-100 rounded-md"></div>
                    <div class="w-1/2 h-2 bg-slate-100 rounded-md"></div>
                </div>
                <div class="w-14 h-8 bg-slate-100 rounded-lg shrink-0"></div>
            </div>
        </div>

    </div>

    <div id="instructionModal" class="fixed inset-0 z-50 flex items-end justify-center pointer-events-none">
        <div id="modalOverlay" class="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px] opacity-0 modal-overlay transition-opacity duration-300"></div>
        
        <div id="modalSheet" class="relative w-full max-w-md bg-white rounded-t-[32px] shadow-2xl translate-y-full modal-content pointer-events-auto flex flex-col max-h-[85vh]">
            <div class="w-full flex justify-center pt-4 pb-2" id="closeModalArea">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full cursor-pointer"></div>
            </div>
            <div class="px-6 pb-8 pt-2 overflow-y-auto no-scrollbar" id="modalDynamicContent">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🔥 Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", 
            authDomain: "earnproxuc.firebaseapp.com", 
            projectId: "earnproxuc", 
            storageBucket: "earnproxuc.firebasestorage.app", 
            messagingSenderId: "411733884378", 
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        let tasksDataMap = {};

        const q = query(collection(db, "gigs"), where("category", "in", ["Normal Task", "App Install"]));
        
        onSnapshot(q, (snapshot) => {
            const taskList = document.getElementById("task-list");
            const taskCount = document.getElementById("task-count");
            
            tasksDataMap = {}; 
            
            if (snapshot.empty) {
                taskCount.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span> 0 Apps`;
                taskList.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 opacity-80">
                        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-3 shadow-inner text-3xl">🚀</div>
                        <h4 class="font-black text-slate-800 text-lg">All Caught Up!</h4>
                        <p class="text-[12px] font-medium text-slate-500 mt-1 text-center px-6">Admin is preparing new premium apps for you.</p>
                    </div>`;
                return;
            }

            taskCount.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span> ${snapshot.size} Available`;
            taskCount.className = "bg-emerald-50 text-emerald-700 font-bold text-[11px] px-3 py-1.5 rounded-lg border border-emerald-100 flex items-center gap-1.5";
            
            let html = "";
            let delay = 0;

            snapshot.forEach((doc) => {
                const task = doc.data();
                const taskId = doc.id;
                const reward = parseFloat(task.reward || 0);
                
                tasksDataMap[taskId] = task;
                
                let difficulty = "EASY"; let barColor = "bg-[#00A87A]"; let badgeColor = "bg-emerald-100 text-emerald-700"; let timeEst = "2 mins"; let rewardColor = "text-[#00A87A]";
                
                if (reward > 10 && reward <= 25) {
                    difficulty = "MEDIUM"; barColor = "bg-amber-400"; badgeColor = "bg-amber-100 text-amber-700"; timeEst = "5 mins"; rewardColor = "text-amber-500";
                } else if (reward > 25) {
                    difficulty = "HARD"; barColor = "bg-rose-500"; badgeColor = "bg-rose-100 text-rose-700"; timeEst = "10 mins"; rewardColor = "text-rose-600";
                }

                const shortDesc = task.desc ? (task.desc.length > 25 ? task.desc.substring(0, 25) + "..." : task.desc) : "View Instructions";
                
                // Real Image Logic (Fallback to dynamic premium letter icon if admin didn't upload image)
                const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(task.title)}&background=F2F5F8&color=0B100E&rounded=true&bold=true&size=128`;
                const appImage = task.image || task.logo || task.icon || defaultAvatar;

                // Layout fixed: strict flex-1 and min-w-0 to prevent button push
                html += `
                <div class="bg-white rounded-[20px] p-3 shadow-sm border border-slate-100 flex items-center relative overflow-hidden mb-3 active:scale-[0.98] transition-all task-card cursor-pointer animate-fade-in-up" data-task-id="${taskId}" style="animation-delay: ${delay}s; opacity: 0;">
                    <div class="absolute left-0 top-0 bottom-0 w-[5px] ${barColor} opacity-90"></div>
                    
                    <div class="w-[50px] h-[50px] ml-1.5 shrink-0 bg-slate-50 rounded-[14px] border border-slate-100 overflow-hidden shadow-sm flex items-center justify-center p-0.5">
                        <img src="${appImage}" alt="app" class="w-full h-full object-cover rounded-[12px] bg-white">
                    </div>
                    
                    <div class="flex-1 min-w-0 px-3">
                        <h4 class="text-[14px] font-black text-slate-900 truncate mb-0.5">${task.title}</h4>
                        <div class="text-[10px] text-slate-500 font-medium truncate bg-slate-50 inline-block px-1.5 py-0.5 rounded">${shortDesc}</div>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="${badgeColor} text-[8px] font-black px-1.5 py-0.5 rounded shadow-sm">${difficulty}</span>
                            <span class="text-[9px] text-slate-400 font-bold flex items-center gap-0.5">
                                <svg class="w-3 h-3 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ~${timeEst}
                            </span>
                        </div>
                    </div>

                    <div class="shrink-0 flex flex-col items-end pl-2 border-l border-slate-100 min-w-[65px]">
                        <span class="text-[16px] font-black ${rewardColor} mb-1">₹${reward.toFixed(0)}</span>
                        <div class="w-full bg-[#0B100E] text-white text-[10px] font-bold py-1.5 rounded-lg shadow-md text-center uppercase tracking-wide">VIEW</div>
                    </div>
                </div>`;
                delay += 0.05; 
            });
            
            taskList.innerHTML = html;
        });

        // --- MODAL LOGIC ---
        const taskListContainer = document.getElementById("task-list");
        const modalOverlay = document.getElementById("modalOverlay");
        const modalSheet = document.getElementById("modalSheet");
        const modalDynamicContent = document.getElementById("modalDynamicContent");
        const closeModalArea = document.getElementById("closeModalArea");

        function openModal(taskId) {
            const task = tasksDataMap[taskId];
            if (!task) return;

            const reward = parseFloat(task.reward || 0);
            const fullDesc = task.desc || "Install and open the app to get your reward.";
            const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(task.title)}&background=F2F5F8&color=0B100E&rounded=true&bold=true&size=128`;
            const appImage = task.image || task.logo || task.icon || defaultAvatar;
            
            let trackingLink = task.link;
            trackingLink += trackingLink.includes('?') ? `&subid=${userPhone}` : `?subid=${userPhone}`;

            modalDynamicContent.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-16 h-16 bg-slate-50 rounded-[18px] border border-slate-100 overflow-hidden shadow-sm p-1 shrink-0">
                        <img src="${appImage}" alt="app" class="w-full h-full object-cover rounded-[14px]">
                    </div>
                    <div>
                        <h2 class="text-[20px] font-black text-slate-900 leading-tight mb-1">${task.title}</h2>
                        <span class="text-[12px] font-black text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-lg border border-emerald-100 inline-block">Reward: ₹${reward.toFixed(2)}</span>
                    </div>
                </div>

                <div class="bg-[#F8FAFC] rounded-[16px] p-4 border border-slate-200 mb-6">
                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2">Instructions</h3>
                    <p class="text-[13px] text-slate-700 font-semibold leading-relaxed whitespace-pre-wrap">${fullDesc}</p>
                </div>

                <a href="${trackingLink}" target="_blank" onclick="closeModalFn()" class="w-full bg-[#0B100E] text-white text-[15px] font-black py-4 rounded-[16px] shadow-[0_8px_20px_rgba(0,0,0,0.15)] flex justify-center items-center gap-2 active:scale-95 transition-all mb-2">
                    START TASK
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </a>
            `;

            modalOverlay.classList.add("pointer-events-auto");
            modalOverlay.style.opacity = "1";
            modalSheet.style.transform = "translateY(0)";
        }

        function closeModalFn() {
            modalOverlay.style.opacity = "0";
            modalSheet.style.transform = "translateY(100%)";
            setTimeout(() => { modalOverlay.classList.remove("pointer-events-auto"); }, 300);
        }

        taskListContainer.addEventListener("click", (e) => {
            const card = e.target.closest(".task-card");
            if (card) {
                const taskId = card.getAttribute("data-task-id");
                openModal(taskId);
            }
        });

        modalOverlay.addEventListener("click", closeModalFn);
        closeModalArea.addEventListener("click", closeModalFn);
    </script>
</body>
</html>
