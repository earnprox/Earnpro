<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | App Installs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken) {
            window.location.replace("login.html");
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F2F5F8] font-['Inter'] antialiased text-slate-900 selection:bg-emerald-100 flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-[#F2F5F8] relative shadow-2xl overflow-hidden min-h-screen flex flex-col">
        
        <div class="px-5 pt-6 pb-4 bg-white sticky top-0 z-40 shadow-[0_4px_20px_rgba(0,0,0,0.03)] border-b border-slate-100">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <button onclick="window.history.back()" class="p-2 bg-slate-50 hover:bg-slate-100 rounded-full active:scale-90 transition-all border border-slate-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </button>
                    <h3 class="font-black text-[18px] text-slate-900">App Hub</h3>
                </div>
                <div id="task-count" class="bg-slate-100 text-slate-500 font-bold text-xs px-3 py-1.5 rounded-lg border border-slate-200">
                    <span class="animate-pulse">Loading...</span>
                </div>
            </div>

            <div class="flex overflow-x-auto gap-2 no-scrollbar pb-1">
                <button class="bg-[#0B100E] text-white px-5 py-2 rounded-full text-[11px] font-bold whitespace-nowrap active:scale-95 transition-all">All Apps</button>
                <button class="bg-[#E8EBF0] text-slate-600 hover:bg-slate-200 px-5 py-2 rounded-full text-[11px] font-bold whitespace-nowrap active:scale-95 transition-all">🎮 Gaming</button>
                <button class="bg-[#E8EBF0] text-slate-600 hover:bg-slate-200 px-5 py-2 rounded-full text-[11px] font-bold whitespace-nowrap active:scale-95 transition-all">🛠 Utilities</button>
                <button class="bg-[#E8EBF0] text-slate-600 hover:bg-slate-200 px-5 py-2 rounded-full text-[11px] font-bold whitespace-nowrap active:scale-95 transition-all">🛍 Shopping</button>
            </div>
        </div>

        <div class="px-5 mt-5 space-y-4 pb-20 flex-1" id="task-list">
            
            <div class="bg-white rounded-[24px] p-4 shadow-sm border border-slate-100 flex items-center justify-between animate-pulse">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-slate-200 rounded-2xl"></div>
                    <div class="space-y-2">
                        <div class="w-24 h-4 bg-slate-200 rounded"></div>
                        <div class="w-16 h-3 bg-slate-200 rounded"></div>
                    </div>
                </div>
                <div class="w-12 h-8 bg-slate-200 rounded-xl"></div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🔥 Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", 
            authDomain: "earnproxuc.firebaseapp.com", 
            projectId: "earnproxuc", 
            storageBucket: "earnproxuc.firebasestorage.app", 
            messagingSenderId: "411733884378", 
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // Fetch Live Tasks (Checking both "Normal Task" and "App Install" categories just in case)
        const q = query(collection(db, "gigs"), where("category", "in", ["Normal Task", "App Install"]));
        
        onSnapshot(q, (snapshot) => {
            const taskList = document.getElementById("task-list");
            const taskCount = document.getElementById("task-count");
            
            if (snapshot.empty) {
                taskCount.innerText = "0 Available";
                taskList.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-10 opacity-70">
                        <span class="text-5xl mb-3 drop-shadow-md">🚀</span>
                        <h4 class="font-black text-slate-700">All Caught Up!</h4>
                        <p class="text-xs font-bold text-slate-400 mt-1 text-center px-4">Admin is uploading new amazing apps. Stay tuned!</p>
                    </div>`;
                return;
            }

            taskCount.innerText = `${snapshot.size} Available`;
            let html = "";

            snapshot.forEach((doc) => {
                const task = doc.data();
                const reward = parseFloat(task.reward || 0);
                
                // 🚀 Gamified Dynamic Logic based on Reward Amount
                let difficulty = "Easy"; let barColor = "bg-[#00A87A]"; let badgeColor = "bg-emerald-100 text-emerald-600 border-white"; let icon = "🎯"; let timeEst = "~2 mins";
                
                if (reward > 10 && reward <= 25) {
                    difficulty = "Medium"; barColor = "bg-amber-400"; badgeColor = "bg-amber-100 text-amber-600 border-white"; icon = "🛒"; timeEst = "~5 mins";
                } else if (reward > 25) {
                    difficulty = "Hard"; barColor = "bg-rose-500"; badgeColor = "bg-rose-100 text-rose-600 border-white"; icon = "🔥"; timeEst = "~10 mins";
                }

                // Shorten description for the tiny pill tag
                const shortDesc = task.desc ? (task.desc.length > 20 ? task.desc.substring(0, 18) + ".." : task.desc) : "Install & Open";

                // Affiliate Tracking Link
                let trackingLink = task.link;
                trackingLink += trackingLink.includes('?') ? `&subid=${userPhone}` : `?subid=${userPhone}`;

                html += `
                <div class="bg-white rounded-[24px] p-1 shadow-sm border border-slate-100 flex items-center justify-between pr-4 relative overflow-hidden mb-4 transition-transform active:scale-[0.98]">
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 ${barColor}"></div>
                    
                    <div class="flex items-center gap-3 py-3 pl-4 w-3/4">
                        <div class="relative shrink-0">
                            <div class="w-14 h-14 bg-[#F2F5F8] rounded-[18px] flex items-center justify-center p-2 shadow-inner border border-slate-50">
                                <span class="text-3xl">${icon}</span>
                            </div>
                            <span class="absolute -bottom-2 -right-2 ${badgeColor} border text-[8px] font-black px-1.5 py-0.5 rounded-md uppercase shadow-sm">${difficulty}</span>
                        </div>
                        <div class="pr-2">
                            <h4 class="text-[14px] font-black text-slate-900 mb-0.5 line-clamp-1">${task.title}</h4>
                            <div class="flex items-center gap-2 mb-1.5">
                                <span class="bg-slate-100 text-slate-500 text-[9px] font-bold px-1.5 py-0.5 rounded uppercase whitespace-nowrap truncate max-w-[120px]">${shortDesc}</span>
                            </div>
                            <div class="flex items-center gap-1 text-[10px] text-slate-400 font-semibold">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Takes ${timeEst}
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col items-end gap-2 shrink-0">
                        <span class="text-[16px] font-black text-[#00A87A]">₹${reward.toFixed(2)}</span>
                        <a href="${trackingLink}" target="_blank" class="bg-[#0B100E] hover:bg-slate-800 text-white text-[10px] font-bold px-5 py-2 rounded-xl shadow-md transition-all text-center uppercase tracking-widest block">Get</a>
                    </div>
                </div>`;
            });
            
            taskList.innerHTML = html;
        });
    </script>
</body>
</html>
