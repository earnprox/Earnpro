<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnproX | Recharge & Bills</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .hide-arrows::-webkit-outer-spin-button, .hide-arrows::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .hide-arrows[type=number] {
            -moz-appearance: textfield;
        }
        /* Modal Animation Setup */
        .modal-slide-up { transform: translateY(0%); }
        .modal-slide-down { transform: translateY(100%); }
        /* Toast Notification */
        #toast { visibility: hidden; min-width: 250px; background-color: #1E293B; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px); opacity: 0; transition: all 0.4s; font-weight: 600; font-size: 14px; }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen selection:bg-blue-100 pb-10">

    <div class="px-5 py-4 flex items-center justify-between bg-white border-b border-slate-100 shadow-[0_2px_15px_-5px_rgba(0,0,0,0.05)] sticky top-0 z-40">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='dashboard.html'" class="text-slate-800 p-2 active:scale-90 transition-all duration-200 bg-slate-50 rounded-full hover:bg-slate-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div>
                <h2 class="text-[18px] font-black text-slate-800 leading-tight tracking-tight">Recharge</h2>
                <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mt-0.5 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> 100% Secure
                </p>
            </div>
        </div>
        <div class="bg-slate-100 px-3 py-1.5 rounded-xl border border-slate-200 flex items-center gap-1.5 shadow-inner">
            <span class="text-[11px] font-bold text-slate-500">Wallet:</span>
            <span class="text-[13px] font-black text-slate-800" id="walletBalanceDisplay">₹0</span>
        </div>
    </div>

    <div class="max-w-md mx-auto pt-5">
        
        <div class="mx-5 mb-6 rounded-[1.5rem] bg-gradient-to-r from-[#6366F1] to-[#8B5CF6] p-6 text-white shadow-lg shadow-indigo-500/30 relative overflow-hidden group cursor-pointer">
            <div class="absolute -right-5 -top-5 w-32 h-32 bg-white/20 rounded-full blur-[20px] pointer-events-none transition-transform duration-700 group-hover:scale-110"></div>
            <div class="relative z-10">
                <h3 class="text-[20px] font-black mb-1.5 leading-tight flex items-center gap-2 drop-shadow-sm">
                    Get 5% Cashback 💸
                </h3>
                <p class="text-[13px] font-medium text-indigo-100 mb-5">On your mobile or DTH recharge!</p>
                <button class="bg-white/20 hover:bg-white/30 backdrop-blur-md border border-white/30 text-white text-[12px] font-bold px-6 py-2.5 rounded-full transition-all active:scale-95 shadow-sm">
                    Auto Applied
                </button>
            </div>
            <div class="absolute bottom-0 right-0 opacity-20 text-6xl transform translate-x-4 translate-y-4">🎁</div>
        </div>

        <div class="bg-white rounded-[1.5rem] p-5 mx-5 shadow-[0_8px_30px_-5px_rgba(0,0,0,0.03)] border border-slate-100 mb-6">
            <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-5 px-1">Categories</h3>
            <div class="grid grid-cols-4 gap-y-6 gap-x-2">
                <div class="flex flex-col items-center gap-2 cursor-pointer group">
                    <div class="w-[3.5rem] h-[3.5rem] bg-blue-50 rounded-2xl flex items-center justify-center text-3xl group-active:scale-95 transition-all duration-200 border border-blue-100/50 shadow-sm">📱</div>
                    <span class="text-[11px] font-bold text-slate-700 text-center group-hover:text-blue-600 transition-colors">Mobile</span>
                </div>
                <div class="flex flex-col items-center gap-2 cursor-pointer group" onclick="window.showToast('DTH coming soon!')">
                    <div class="w-[3.5rem] h-[3.5rem] bg-orange-50 rounded-2xl flex items-center justify-center text-3xl group-active:scale-95 transition-all duration-200 border border-orange-100/50 shadow-sm">📡</div>
                    <span class="text-[11px] font-bold text-slate-700 text-center group-hover:text-orange-600 transition-colors">DTH</span>
                </div>
                <div class="flex flex-col items-center gap-2 cursor-pointer group" onclick="window.showToast('Electricity coming soon!')">
                    <div class="w-[3.5rem] h-[3.5rem] bg-amber-50 rounded-2xl flex items-center justify-center text-3xl group-active:scale-95 transition-all duration-200 border border-amber-100/50 shadow-sm">💡</div>
                    <span class="text-[11px] font-bold text-slate-700 text-center group-hover:text-amber-600 transition-colors">Electricity</span>
                </div>
                <div class="flex flex-col items-center gap-2 cursor-pointer group" onclick="window.showToast('FASTag coming soon!')">
                    <div class="w-[3.5rem] h-[3.5rem] bg-emerald-50 rounded-2xl flex items-center justify-center text-3xl group-active:scale-95 transition-all duration-200 border border-emerald-100/50 shadow-sm">🚘</div>
                    <span class="text-[11px] font-bold text-slate-700 text-center group-hover:text-emerald-600 transition-colors">FASTag</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[1.5rem] p-6 mx-5 shadow-[0_8px_30px_-5px_rgba(0,0,0,0.04)] border border-slate-100 mb-8 relative overflow-hidden">
            <h3 class="text-[16px] font-black text-slate-800 tracking-tight mb-5 flex items-center gap-2">
                <span class="bg-blue-50 p-2 rounded-xl text-blue-600 shadow-inner">⚡</span> Quick Recharge
            </h3>
            
            <div class="relative mb-4">
                <input type="number" id="mobileInput" placeholder="Enter Mobile Number" class="w-full bg-slate-50 border border-slate-200 text-slate-800 text-[16px] font-bold rounded-xl px-5 py-4 pl-12 outline-none focus:border-blue-500 focus:bg-white focus:shadow-[0_0_0_4px_rgba(59,130,246,0.1)] transition-all duration-200 hide-arrows tracking-wider" maxlength="10">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">📞</span>
            </div>

            <div class="relative mb-4">
                <select id="operatorSelect" class="w-full bg-slate-50 border border-slate-200 text-slate-800 text-[15px] font-bold rounded-xl px-5 py-4 pl-12 outline-none focus:border-blue-500 focus:bg-white focus:shadow-[0_0_0_4px_rgba(59,130,246,0.1)] transition-all duration-200 appearance-none">
                    <option value="" disabled selected>Select Operator</option>
                    <option value="1">Airtel</option>
                    <option value="2">Jio</option>
                    <option value="3">Vi</option>
                    <option value="4">BSNL</option>
                </select>
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">🏢</span>
            </div>

            <div class="relative mb-6">
                <input type="number" id="amountInput" placeholder="Enter Amount" class="w-full bg-slate-50 border border-slate-200 text-slate-800 text-[16px] font-bold rounded-xl px-5 py-4 pl-12 pr-32 outline-none focus:border-blue-500 focus:bg-white focus:shadow-[0_0_0_4px_rgba(59,130,246,0.1)] transition-all duration-200 hide-arrows tracking-wider">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">₹</span>
                
                <button onclick="openPlansModal()" class="absolute right-2 top-1/2 -translate-y-1/2 text-[11px] font-black text-blue-600 bg-blue-50 px-3 py-2 rounded-lg hover:bg-blue-100 active:scale-95 transition-all shadow-sm">
                    Browse Plans
                </button>
            </div>
            
            <button id="payBtn" onclick="window.processRechargeWithWallet()" class="w-full bg-[#0F172A] hover:bg-slate-800 text-white font-black py-4 rounded-xl text-[15px] active:scale-95 transition-all duration-300 shadow-[0_10px_20px_-10px_rgba(15,23,42,0.6)] flex justify-center items-center gap-2">
                Process Recharge <span class="text-xl leading-none">→</span>
            </button>
        </div>

    </div>

    <div id="plansModal" class="fixed inset-0 z-[100] hidden">
        <div id="modalBackdrop" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm opacity-0 transition-opacity duration-300" onclick="closePlansModal()"></div>
        
        <div id="plansSheet" class="absolute bottom-0 left-0 right-0 bg-[#F8FAFC] rounded-t-[2rem] h-[85vh] flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.1)] modal-slide-down transition-transform duration-300 ease-out">
            <div class="p-5 border-b border-slate-200 flex justify-between items-center bg-white rounded-t-[2rem] z-10 shrink-0">
                <div>
                    <h3 class="text-[18px] font-black text-slate-800" id="modalOperatorTitle">Browse Plans</h3>
                    <p class="text-[11px] font-bold text-blue-500 uppercase tracking-widest mt-0.5">Select your offer</p>
                </div>
                <button onclick="closePlansModal()" class="w-9 h-9 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 active:scale-90 transition-all hover:bg-slate-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="plansContainer" class="p-5 overflow-y-auto space-y-4 pb-10 flex-1">
                <div class="text-center text-slate-500 font-bold text-sm py-10 animate-pulse">Loading Plans...</div>
            </div>
        </div>
    </div>

    <div id="toast">Message Here</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI",
            authDomain: "earnproxuc.firebaseapp.com",
            projectId: "earnproxuc",
            storageBucket: "earnproxuc.firebasestorage.app",
            messagingSenderId: "411733884378",
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global Variables
        const userPhone = localStorage.getItem("earnprox_user_phone");
        if (!userPhone) window.location.href = "login.html";

        let userDocId = null;
        let walletBalance = 0;

        window.showToast = function(msg) { 
            const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show"); 
            setTimeout(()=>t.classList.remove("show"), 3000); 
        }

        // 1. Fetch User Balance on Load
        async function fetchUserBalance() {
            try {
                const q = query(collection(db, "users"), where("phone", "==", userPhone));
                const snap = await getDocs(q);
                if (!snap.empty) {
                    userDocId = snap.docs[0].id;
                    walletBalance = snap.docs[0].data().balance || 0;
                    document.getElementById('walletBalanceDisplay').innerText = '₹' + walletBalance.toFixed(2);
                } else {
                    window.location.href = "login.html";
                }
            } catch (error) {
                console.error("Error fetching wallet:", error);
                window.showToast("Failed to sync wallet.");
            }
        }
        document.addEventListener("DOMContentLoaded", fetchUserBalance);

        // 2. Recharge Process with Wallet Deduction
        window.processRechargeWithWallet = async function() {
            const mobile = document.getElementById('mobileInput').value;
            const operator = document.getElementById('operatorSelect').value;
            const amountStr = document.getElementById('amountInput').value;
            const amount = parseFloat(amountStr);
            const btn = document.getElementById('payBtn');

            if(!mobile || !operator || !amount) return window.showToast("⚠️ Fill all details");
            if(mobile.length !== 10) return window.showToast("⚠️ Invalid mobile number");
            if(amount < 10) return window.showToast("⚠️ Minimum amount is ₹10");

            // CHECK WALLET BALANCE
            if (walletBalance < amount) {
                return window.showToast("❌ Insufficient Wallet Balance! (₹" + walletBalance.toFixed(2) + ")");
            }

            const originalText = btn.innerHTML;
            btn.innerHTML = 'Connecting to Bank... <span class="animate-spin text-xl">⏳</span>';
            btn.disabled = true;
            btn.classList.add('opacity-80');

            try {
                // CALLING YOUR VERCEL API
                const response = await fetch('/api/recharge', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mobileNumber: mobile,
                        operatorCode: operator,
                        amount: amountStr
                    })
                });

                const data = await response.json();
                console.log("API Response:", data);
                
                // IF RECHARGE IS SUCCESSFUL (STATUS 1 or 2 as per your setup)
                if(data.STATUS == "2" || data.STATUS == "1") {
                    
                    // 1. Deduct Balance + Give 5% Cashback
                    const cashback = amount * 0.05;
                    const finalDeduction = amount - cashback;
                    walletBalance = walletBalance - finalDeduction;
                    
                    // Update Firebase User Document
                    await updateDoc(doc(db, "users", userDocId), { 
                        balance: walletBalance 
                    });
                    
                    // Update UI Balance
                    document.getElementById('walletBalanceDisplay').innerText = '₹' + walletBalance.toFixed(2);

                    // 2. Save Ledger History (Optional but recommended)
                    await addDoc(collection(db, "transactions"), {
                        phone: userPhone,
                        type: "recharge",
                        amount: amount,
                        targetNumber: mobile,
                        cashbackEarned: cashback,
                        refId: data.RPID || "N/A",
                        status: "success",
                        timestamp: new Date()
                    });

                    alert(`✅ Recharge Successful!\nRef ID: ${data.RPID}\nCashback Earned: ₹${cashback.toFixed(2)}`);
                    document.getElementById('amountInput').value = '';
                    document.getElementById('mobileInput').value = '';

                } else {
                    window.showToast("❌ Failed: " + (data.MSG || "API Error"));
                }
            } catch(error) {
                console.error("API Error:", error);
                window.showToast("❌ Server Error!");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-80');
            }
        }

        // 3. Modal and Plans Logic (Same as yours, moved to window scope)
        window.openPlansModal = function() {
            const opSelect = document.getElementById('operatorSelect');
            if(opSelect.selectedIndex === 0) return window.showToast("⚠️ Select Operator first!");

            const operatorName = opSelect.options[opSelect.selectedIndex].text;
            document.getElementById('modalOperatorTitle').innerText = operatorName + " Plans";
            
            const modal = document.getElementById('plansModal');
            const backdrop = document.getElementById('modalBackdrop');
            const sheet = document.getElementById('plansSheet');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                sheet.classList.remove('modal-slide-down');
                sheet.classList.add('modal-slide-up');
            }, 10);

            fetchAndRenderPlans(operatorName);
        }

        window.closePlansModal = function() {
            const backdrop = document.getElementById('modalBackdrop');
            const sheet = document.getElementById('plansSheet');
            
            backdrop.classList.add('opacity-0');
            sheet.classList.remove('modal-slide-up');
            sheet.classList.add('modal-slide-down');

            setTimeout(() => {
                document.getElementById('plansModal').classList.add('hidden');
            }, 300); 
        }

        window.selectPlan = function(price) {
            document.getElementById('amountInput').value = price;
            window.closePlansModal();
        }

        async function fetchAndRenderPlans(operatorName) {
            const container = document.getElementById('plansContainer');
            container.innerHTML = '<div class="text-center text-slate-500 font-bold text-sm py-10 animate-pulse">Fetching best offers... 🎁</div>';

            try {
                const response = await fetch('/plans.json');
                const data = await response.json();
                const plansList = data[operatorName];

                if(!plansList || plansList.length === 0) {
                    container.innerHTML = '<div class="text-center text-red-500 font-bold py-10">No plans found for this operator.</div>';
                    return;
                }

                container.innerHTML = ''; 
                
                plansList.forEach(plan => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-500 active:bg-blue-50 cursor-pointer transition-all duration-200 shadow-sm relative overflow-hidden group";
                    card.onclick = () => window.selectPlan(plan.price);
                    
                    const badge = plan.type ? `<span class="absolute top-0 right-0 bg-gradient-to-r from-[#6366F1] to-[#8B5CF6] text-white text-[10px] font-black uppercase tracking-wider px-3 py-1.5 rounded-bl-xl shadow-sm">${plan.type}</span>` : '';

                    card.innerHTML = `
                        ${badge}
                        <div class="flex justify-between items-center mb-3 mt-1 pr-16">
                            <h4 class="text-[26px] font-black text-slate-800 tracking-tight">₹${plan.price}</h4>
                        </div>
                        <div class="flex justify-between items-center bg-slate-50/50 p-3 rounded-xl border border-slate-100">
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Validity</p>
                                <p class="text-[13px] font-black text-slate-700">${plan.validity}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Data</p>
                                <p class="text-[13px] font-black text-blue-600">${plan.data}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Details</p>
                                <p class="text-[11px] font-bold text-slate-600 line-clamp-1 max-w-[100px]">${plan.desc}</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error("JSON Error:", error);
                container.innerHTML = '<div class="text-center text-red-500 font-bold text-sm py-10">Network error! Could not fetch plans.</div>';
            }
        }
    </script>
</body>
</html>
