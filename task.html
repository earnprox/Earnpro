<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnprox - Daily Tasks</title>
    <style>
        /* --- CSS STYLING --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --primary-pink: #ff477e;
            --gradient-pink: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --yellow-coin: #ffc107;
            --bg-color: #f8f9fc;
            --text-dark: #1e2335;
            --text-muted: #888ea8;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #e0e5ec; /* Outer background to simulate mobile screen */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile App Container */
        .app-container {
            width: 100%;
            max-width: 400px; /* Mobile width */
            background-color: var(--bg-color);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: var(--card-bg);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-dark);
            cursor: pointer;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .balance-badge {
            background-color: var(--text-dark);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .coin {
            color: var(--yellow-coin);
        }

        /* Main Content */
        .content {
            padding: 20px;
        }

        /* Status Card */
        .status-card {
            background: var(--gradient-pink);
            border-radius: 20px;
            padding: 20px;
            color: white;
            margin-bottom: 25px;
            box-shadow: 0 8px 15px rgba(255, 71, 126, 0.3);
        }

        .status-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            height: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: #fff;
            height: 100%;
            width: 0%; /* Will be updated by JS */
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .status-text {
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }

        /* Task List */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .task-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }

        .task-card:active {
            transform: scale(0.98);
        }

        .task-icon {
            width: 50px;
            height: 50px;
            background-color: #fff0f3;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .task-details {
            flex: 1;
            padding: 0 15px;
        }

        .task-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .task-reward {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .task-reward span {
            color: var(--yellow-coin);
            font-weight: 700;
        }

        .action-btn {
            background: var(--gradient-pink);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 117, 140, 0.3);
            transition: all 0.3s;
        }

        .action-btn.completed {
            background: #e2e8f0;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }
        
        /* Toast Notification */
        #toast { visibility: hidden; min-width: 250px; background-color: #1E293B; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px); opacity: 0; transition: all 0.4s; font-weight: 600; font-size: 14px; }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <button class="back-btn" onclick="window.location.href='dashboard.html'">&#8592;</button>
            <h1 class="header-title">Daily Active Tasks</h1>
            <div class="balance-badge">
                <span class="coin">&#128176;</span> <span id="userBalance">₹0.00</span>
            </div>
        </header>

        <div class="content">
            <div class="status-card">
                <h3>Stay Active Today</h3>
                <div class="progress-container">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="status-text">
                    <span id="taskCountText">0/3 Tasks Completed</span>
                    <span>Bonus: ₹5.00</span>
                </div>
            </div>

            <h2 class="section-title">Today's Tasks</h2>

            <div class="task-card">
                <div class="task-icon">&#127873;</div> 
                <div class="task-details">
                    <div class="task-title">Daily Check-in</div>
                    <div class="task-reward">Reward: <span>₹1.00</span></div>
                </div>
                <button class="action-btn" id="btn-task-1" onclick="window.completeTask(this, 1, 'task1')">Claim</button>
            </div>

            <div class="task-card">
                <div class="task-icon">&#128241;</div> 
                <div class="task-details">
                    <div class="task-title">Share with 1 Friend</div>
                    <div class="task-reward">Reward: <span>₹2.00</span></div>
                </div>
                <button class="action-btn" id="btn-task-2" onclick="window.completeTask(this, 2, 'task2')">Share</button>
            </div>

            <div class="task-card">
                <div class="task-icon">&#128065;</div> 
                <div class="task-details">
                    <div class="task-title">View Sponsered Post</div>
                    <div class="task-reward">Reward: <span>₹2.00</span></div>
                </div>
                <button class="action-btn" id="btn-task-3" onclick="window.completeTask(this, 2, 'task3')">View</button>
            </div>

        </div>
    </div>
    
    <div id="toast">Message Here</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI",
            authDomain: "earnproxuc.firebaseapp.com",
            projectId: "earnproxuc",
            storageBucket: "earnproxuc.firebasestorage.app",
            messagingSenderId: "411733884378",
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Security Check
        const userPhone = localStorage.getItem("earnprox_user_phone");
        if (!userPhone) {
            window.location.href = "login.html";
        }

        let userDocId = null;
        let currentBalance = 0;
        let completedTasksCount = 0;
        const totalTasks = 3;
        
        // Get Today's Date String (YYYY-MM-DD)
        const todayStr = new Date().toISOString().split('T')[0];

        window.showToast = function(msg) { 
            const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show"); 
            setTimeout(()=>t.classList.remove("show"), 3000); 
        }

        // 1. Fetch User Data & Today's Status on Load
        async function fetchUserData() {
            try {
                // Get User Balance
                const q = query(collection(db, "users"), where("phone", "==", userPhone));
                const snap = await getDocs(q);
                if (!snap.empty) {
                    userDocId = snap.docs[0].id;
                    const data = snap.docs[0].data();
                    currentBalance = data.balance || 0;
                    document.getElementById('userBalance').innerText = '₹' + currentBalance.toFixed(2);
                } else {
                    window.location.href = "login.html"; return;
                }

                // Get Today's Task Status
                const trackerRef = doc(db, "dailyTasks", `${userPhone}_${todayStr}`);
                const trackerSnap = await getDoc(trackerRef);
                
                if (trackerSnap.exists()) {
                    const tasks = trackerSnap.data();
                    if(tasks.task1) markButtonCompleted('btn-task-1', 'Claimed');
                    if(tasks.task2) markButtonCompleted('btn-task-2', 'Shared');
                    if(tasks.task3) markButtonCompleted('btn-task-3', 'Viewed');
                    
                    if(tasks.bonusClaimed) {
                         completedTasksCount = 3;
                    }
                } else {
                    // Create tracker document for today if it doesn't exist
                    await setDoc(trackerRef, { task1: false, task2: false, task3: false, bonusClaimed: false });
                }
                
                updateUIProgress();

            } catch (error) {
                console.error("Error fetching data:", error);
                window.showToast("Connection Error!");
            }
        }

        // 2. Helper to style buttons
        function markButtonCompleted(btnId, text) {
            const btn = document.getElementById(btnId);
            if(btn && !btn.classList.contains('completed')) {
                btn.innerText = text;
                btn.classList.add('completed');
                completedTasksCount++;
            }
        }

        // 3. Helper to update Progress Bar
        function updateUIProgress() {
            let progressPercentage = (completedTasksCount / totalTasks) * 100;
            document.getElementById('progressBar').style.width = progressPercentage + '%';
            document.getElementById('taskCountText').innerText = `${completedTasksCount}/${totalTasks} Tasks Completed`;
        }

        // 4. Complete Task Function (Called when user clicks)
        window.completeTask = async function(buttonElement, rewardAmount, taskId) {
            if (buttonElement.classList.contains('completed')) return;
            
            buttonElement.innerText = "Processing...";
            
            try {
                // Update Balance in DB
                currentBalance += rewardAmount;
                await updateDoc(doc(db, "users", userDocId), { balance: currentBalance });
                document.getElementById('userBalance').innerText = '₹' + currentBalance.toFixed(2);
                
                // Save Task Status in DB for Today
                const trackerRef = doc(db, "dailyTasks", `${userPhone}_${todayStr}`);
                await updateDoc(trackerRef, { [taskId]: true });

                // Update UI
                if(taskId === 'task1') markButtonCompleted(buttonElement.id, 'Claimed');
                if(taskId === 'task2') markButtonCompleted(buttonElement.id, 'Shared');
                if(taskId === 'task3') markButtonCompleted(buttonElement.id, 'Viewed');
                
                updateUIProgress();
                window.showToast(`+ ₹${rewardAmount.toFixed(2)} Added!`);

                // Check for Bonus
                if(completedTasksCount === totalTasks) {
                    setTimeout(async () => {
                        currentBalance += 5.00;
                        await updateDoc(doc(db, "users", userDocId), { balance: currentBalance });
                        await updateDoc(trackerRef, { bonusClaimed: true });
                        document.getElementById('userBalance').innerText = '₹' + currentBalance.toFixed(2);
                        alert("🎉 Congratulations! You are ACTIVE for today. Bonus ₹5.00 added to your wallet.");
                    }, 500);
                }

            } catch (error) {
                console.error("Task Error:", error);
                window.showToast("Failed to complete task. Try again.");
                buttonElement.innerText = "Try Again";
            }
        }

        // Initialize on page load
        document.addEventListener("DOMContentLoaded", fetchUserData);

    </script>

</body>
</html>
