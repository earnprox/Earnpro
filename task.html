<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | App Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F2F5F8] font-['Inter'] antialiased pb-10">

    <div class="px-5 py-5 flex items-center bg-white border-b border-slate-100 sticky top-0 z-50">
        <button onclick="window.history.back()" class="p-2 bg-slate-50 rounded-full mr-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg></button>
        <h3 class="font-black text-slate-800">App Install Tasks</h3>
    </div>

    <div class="p-5">
        <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 flex gap-3">
            <span class="text-xl">⚡</span>
            <p class="text-[11px] font-bold text-emerald-700 leading-tight">These tasks are auto-verified. Money will be added instantly after completing the action.</p>
        </div>
    </div>

    <div class="px-5 space-y-3" id="task-list">
        <div class="bg-white rounded-[24px] p-4 shadow-sm border border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center overflow-hidden">
                    <img src="https://cdn-icons-png.flaticon.com/512/888/888841.png" class="w-8 h-8 object-contain">
                </div>
                <div>
                    <h4 class="text-[14px] font-bold text-slate-800">Install PhonePe</h4>
                    <p class="text-[10px] font-semibold text-[#00A87A]">Reward: ₹5.00</p>
                </div>
            </div>
            <a href="https://your-tracking-link.com?subid=USER_ID" class="bg-[#0B100E] text-white px-5 py-2.5 rounded-xl text-[12px] font-bold active:scale-90 transition-all">Start Task</a>
        </div>
    </div>

</body>
</html>
