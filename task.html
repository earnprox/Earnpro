<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Daily Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F2F5F8] font-['Inter'] antialiased text-slate-900 selection:bg-emerald-100 flex justify-center min-h-screen">

    <!-- Mobile App Container constraint -->
    <div class="w-full max-w-md bg-[#F2F5F8] relative pb-20 shadow-2xl overflow-hidden min-h-screen flex flex-col">
        
        <!-- Top Header -->
        <div class="px-5 py-5 flex items-center justify-between bg-white border-b border-slate-100 sticky top-0 z-50 shadow-sm">
            <!-- Back to dashboard (simulate) -->
            <button onclick="window.history.back()" class="text-slate-800 p-2 bg-slate-50 hover:bg-slate-100 rounded-full active:scale-90 transition-all border border-slate-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </button>
            <h3 class="font-black text-[15px] text-slate-800">Daily Active Tasks</h3>
            <div class="bg-emerald-50 px-3 py-1.5 rounded-xl flex items-center gap-1.5 border border-emerald-100 shadow-sm">
                <span class="text-emerald-500 font-bold text-sm">₹</span>
                <span class="text-[13px] font-black text-[#00A87A]" id="header-balance">35.50</span>
            </div>
        </div>

        <!-- Progress Hero Section (Matches 'Your Wealth' card theme) -->
        <div class="px-5 mt-6 mb-2 relative z-10">
            <div class="bg-[#0B100E] rounded-[24px] p-6 shadow-xl relative overflow-hidden border border-white/5">
                <!-- Glow Effect -->
                <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-[#00A87A] rounded-full blur-[50px] opacity-20 z-0"></div>
                
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 relative z-10">Today's Progress</p>
                <div class="flex items-baseline gap-1 relative z-10 mb-4">
                    <h2 class="text-4xl font-black text-white leading-none tracking-tight" id="completed-count">0</h2>
                    <span class="text-xl font-bold text-slate-500">/<span id="total-count">0</span></span>
                </div>
                
                <!-- Progress Bar -->
                <div class="w-full h-2.5 bg-white/10 rounded-full mb-3 relative z-10 overflow-hidden shadow-inner">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-[#00E5A0] to-[#00A87A] rounded-full transition-all duration-700 w-[0%]"></div>
                </div>
                
                <div class="flex justify-between items-center relative z-10">
                    <p class="text-[11px] font-medium text-slate-400">Finish all for bonus</p>
                    <span class="bg-white/10 px-2 py-1 rounded-md text-[10px] font-black text-[#00E5A0] tracking-wider uppercase">+₹5.00 Bonus</span>
                </div>
            </div>
        </div>

        <!-- Admin Notice / Alert -->
        <div class="px-5 mb-5 mt-2">
            <div class="bg-rose-50 border border-rose-100 rounded-xl p-3 flex gap-3 items-start">
                <span class="text-rose-500 text-lg">💡</span>
                <p class="text-[11px] font-bold text-rose-600 leading-snug">Tasks reset every night at 12:00 AM. Fake proofs will result in permanent account ban.</p>
            </div>
        </div>

        <!-- Task List Container -->
        <div class="px-5 pb-10 space-y-3 relative z-10 flex-1" id="task-list-container">
            <!-- Dynamic Tasks will be injected here by JS -->
        </div>

        <!-- Toast Notification (Matches existing app theme) -->
        <div id="toast" class="fixed z-[1000] left-1/2 bottom-[40px] -translate-x-1/2 bg-[#0B100E] text-white font-bold text-[13px] px-6 py-3 rounded-full shadow-2xl opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4 w-max whitespace-nowrap border border-white/10 flex items-center gap-2">
            <span id="toast-icon">✅</span>
            <span id="toast-msg">Task Completed!</span>
        </div>

    </div>

    <!-- JavaScript simulating Admin Control & Backend API -->
    <script>
        // 1. ADMIN DATA SIMULATION (This data will come from your backend database)
        // Admin can add, remove, or edit these parameters in the database.
        const adminTasksAPI = [
            {
                id: "tsk_101",
                title: "Daily Login Bonus",
                subtitle: "Open the app today",
                reward: 1.00,
                icon: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Wrapped%20gift/3D/wrapped_gift_3d.png",
                isCompleted: false,
                type: "instant" // Admin parameter for instant claim
            },
            {
                id: "tsk_102",
                title: "Follow on Instagram",
                subtitle: "Follow @EarnproX official",
                reward: 2.50,
                icon: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Mobile%20phone/3D/mobile_phone_3d.png",
                isCompleted: false,
                type: "link" // Admin parameter to redirect
            },
            {
                id: "tsk_103",
                title: "Watch Ad Video",
                subtitle: "Watch 30 sec sponsor video",
                reward: 1.50,
                icon: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Television/3D/television_3d.png",
                isCompleted: false,
                type: "video"
            }
        ];

        // System State
        let userBalance = 35.50; // Fetch from session in real app
        let tasks = [...adminTasksAPI];

        // 2. RENDER TASKS DYNAMICALLY
        function renderTasks() {
            const container = document.getElementById('task-list-container');
            container.innerHTML = ''; // Clear existing

            let completedTasksCount = 0;

            tasks.forEach(task => {
                if(task.isCompleted) completedTasksCount++;

                // Build Card HTML dynamically
                const card = document.createElement('div');
                card.className = "bg-white rounded-[20px] p-3.5 shadow-sm border border-slate-100 flex items-center justify-between transition-transform active:scale-[0.98]";
                
                // Content based on completion state
                const buttonClass = task.isCompleted 
                    ? "bg-slate-100 text-slate-400 cursor-not-allowed shadow-none" 
                    : "bg-[#00A87A] text-white active:scale-90 shadow-[0_4px_10px_rgba(0,168,122,0.3)]";
                
                const buttonText = task.isCompleted ? "Claimed" : "Start";

                card.innerHTML = `
                    <div class="flex items-center gap-3.5">
                        <div class="w-12 h-12 bg-[#E8EBF0] rounded-2xl flex items-center justify-center p-2 relative overflow-hidden">
                            <img src="${task.icon}" class="w-full h-full object-contain drop-shadow-sm relative z-10">
                        </div>
                        <div>
                            <h4 class="text-[14px] font-bold text-slate-800 leading-tight mb-0.5">${task.title}</h4>
                            <div class="flex items-center gap-2">
                                <span class="text-[11px] font-medium text-slate-500">${task.subtitle}</span>
                                <span class="text-[9px] font-black bg-emerald-50 text-emerald-600 px-1.5 py-0.5 rounded uppercase tracking-wider">+₹${task.reward.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                    <button id="btn-${task.id}" onclick="handleTaskAction('${task.id}')" class="${buttonClass} px-4 py-2 rounded-xl text-[12px] font-bold transition-all relative z-10" ${task.isCompleted ? 'disabled' : ''}>
                        ${buttonText}
                    </button>
                `;
                container.appendChild(card);
            });

            // Update UI Counters
            document.getElementById('completed-count').innerText = completedTasksCount;
            document.getElementById('total-count').innerText = tasks.length;
            
            // Update Progress Bar
            const progressPercent = (completedTasksCount / tasks.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;

            // Check for Bonus
            if(completedTasksCount === tasks.length && completedTasksCount > 0) {
                setTimeout(() => { showToast("All Tasks Done! ₹5.00 Bonus Added", "🎁"); }, 500);
            }
        }

        // 3. HANDLE TASK ACTIONS
        function handleTaskAction(taskId) {
            const taskIndex = tasks.findIndex(t => t.id === taskId);
            if (taskIndex === -1 || tasks[taskIndex].isCompleted) return;

            const task = tasks[taskIndex];
            const btn = document.getElementById(`btn-${task.id}`);
            
            // Show loading state on button
            btn.innerHTML = `<svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            // Simulate Network Request / Task Logic
            setTimeout(() => {
                // Update Logic
                tasks[taskIndex].isCompleted = true;
                userBalance += task.reward;
                
                // Update Balance UI
                document.getElementById('header-balance').innerText = userBalance.toFixed(2);
                
                // Show Success Toast
                showToast(`+₹${task.reward.toFixed(2)} Added to Vault`, "💸");
                
                // Re-render UI
                renderTasks();
            }, 800);
        }

        // 4. TOAST NOTIFICATION SYSTEM
        function showToast(message, icon = "✅") {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            document.getElementById('toast-icon').innerText = icon;
            
            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }, 3000);
        }

        // INITIALIZE APP
        document.addEventListener('DOMContentLoaded', () => {
            renderTasks();
        });

    </script>
</body>
</html>
