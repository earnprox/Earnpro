<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnprox - Daily Tasks</title>
    <style>
        /* --- CSS STYLING --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --primary-pink: #ff477e;
            --gradient-pink: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --yellow-coin: #ffc107;
            --bg-color: #f8f9fc;
            --text-dark: #1e2335;
            --text-muted: #888ea8;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #e0e5ec; /* Outer background to simulate mobile screen */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile App Container */
        .app-container {
            width: 100%;
            max-width: 400px; /* Mobile width */
            background-color: var(--bg-color);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: var(--card-bg);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-dark);
            cursor: pointer;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .balance-badge {
            background-color: var(--text-dark);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .coin {
            color: var(--yellow-coin);
        }

        /* Main Content */
        .content {
            padding: 20px;
        }

        /* Status Card */
        .status-card {
            background: var(--gradient-pink);
            border-radius: 20px;
            padding: 20px;
            color: white;
            margin-bottom: 25px;
            box-shadow: 0 8px 15px rgba(255, 71, 126, 0.3);
        }

        .status-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            height: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: #fff;
            height: 100%;
            width: 0%; /* Will be updated by JS */
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .status-text {
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }

        /* Task List */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .task-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }

        .task-card:active {
            transform: scale(0.98);
        }

        .task-icon {
            width: 50px;
            height: 50px;
            background-color: #fff0f3;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .task-details {
            flex: 1;
            padding: 0 15px;
        }

        .task-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .task-reward {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .task-reward span {
            color: var(--yellow-coin);
            font-weight: 700;
        }

        .action-btn {
            background: var(--gradient-pink);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 117, 140, 0.3);
        }

        .action-btn.completed {
            background: #e2e8f0;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <button class="back-btn" onclick="goBack()">&#8592;</button>
            <h1 class="header-title">Daily Active Tasks</h1>
            <div class="balance-badge">
                <span class="coin">&#128176;</span> <span id="userBalance">₹30</span>
            </div>
        </header>

        <div class="content">
            <div class="status-card">
                <h3>Stay Active Today</h3>
                <div class="progress-container">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="status-text">
                    <span id="taskCountText">0/3 Tasks Completed</span>
                    <span>Reward: ₹5.00</span>
                </div>
            </div>

            <h2 class="section-title">Today's Tasks</h2>

            <div class="task-card">
                <div class="task-icon">&#127873;</div> <div class="task-details">
                    <div class="task-title">Daily Check-in</div>
                    <div class="task-reward">Reward: <span>₹1.00</span></div>
                </div>
                <button class="action-btn" onclick="completeTask(this, 1)">Claim</button>
            </div>

            <div class="task-card">
                <div class="task-icon">&#128241;</div> <div class="task-details">
                    <div class="task-title">Share with 1 Friend</div>
                    <div class="task-reward">Reward: <span>₹2.00</span></div>
                </div>
                <button class="action-btn" onclick="completeTask(this, 2)">Share</button>
            </div>

            <div class="task-card">
                <div class="task-icon">&#128065;</div> <div class="task-details">
                    <div class="task-title">View Sponsered Post</div>
                    <div class="task-reward">Reward: <span>₹2.00</span></div>
                </div>
                <button class="action-btn" onclick="completeTask(this, 2)">View</button>
            </div>

        </div>
    </div>

    <script>
        // Variables setup
        let totalTasks = 3;
        let completedTasks = 0;
        let balance = 30.00;

        function completeTask(buttonElement, rewardAmount) {
            // Agar pehle se complete hai toh kuch mat karo
            if (buttonElement.classList.contains('completed')) return;

            // Button update karo
            buttonElement.innerText = "Completed";
            buttonElement.classList.add('completed');

            // Balance update karo
            balance += rewardAmount;
            document.getElementById('userBalance').innerText = '₹' + balance.toFixed(2);

            // Progress bar update karo
            completedTasks++;
            let progressPercentage = (completedTasks / totalTasks) * 100;
            document.getElementById('progressBar').style.width = progressPercentage + '%';
            document.getElementById('taskCountText').innerText = `${completedTasks}/${totalTasks} Tasks Completed`;

            // Agar saare task ho gaye
            if(completedTasks === totalTasks) {
                setTimeout(() => {
                    alert("Congratulations! You are ACTIVE for today. Bonus ₹5.00 added.");
                    // Bonus add
                    balance += 5.00;
                    document.getElementById('userBalance').innerText = '₹' + balance.toFixed(2);
                }, 300);
            }
        }

        function goBack() {
            // Ye function back button ke liye hai (dashboard pe wapas jaane ke liye)
            alert("This will navigate back to Dashboard (dashboard.html)");
            // window.location.href = 'dashboard.html';
        }
    </script>

</body>
</html>
