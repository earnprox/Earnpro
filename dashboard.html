<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Secure Login & Setup</title>
    
    <meta name="description" content="Secure login to EarnproX. Complete simple digital tasks and receive rewards.">
    <meta name="robots" content="noindex, nofollow"> 
    <link rel="icon" type="image/png" href="favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; color: #0F172A; overflow-x: hidden; }
        .premium-card { background: #FFFFFF; border: 1px solid #E2E8F0; box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05); }
        .form-step { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; position: absolute; top: 0; left: 0; padding: 24px; visibility: hidden; }
        .step-out-left { transform: translateX(-120%); opacity: 0; pointer-events: none; visibility: hidden; }
        .step-in-right { transform: translateX(120%); opacity: 0; pointer-events: none; visibility: hidden; }
        .step-active { transform: translateX(0); opacity: 1; pointer-events: auto; position: relative; padding: 0; visibility: visible; }
        
        .otp-box, .pin-box { width: 45px; height: 55px; text-align: center; font-size: 24px; font-weight: 800; border-radius: 12px; border: 2px solid #E2E8F0; background: #F1F5F9; outline: none; transition: all 0.2s; color: #0F172A; }
        .otp-box:focus, .pin-box:focus { border-color: #FACC15; background: #FFFFFF; box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.15); }
        @media (max-width: 380px) { .otp-box { width: 38px; height: 50px; font-size: 20px; } .pin-box { width: 40px; height: 50px; font-size: 20px; } }
        
        #toast { visibility: hidden; min-width: 250px; background-color: #1E293B; color: #fff; text-align: center; border-radius: 99px; padding: 12px 24px; position: fixed; z-index: 1000; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(20px); opacity: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 600; font-size: 14px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
        #global-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); z-index: 9998; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #F8FAFC; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease-out, visibility 0.5s ease-out; }
        #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .pulse-logo { animation: pulse 1.5s infinite cubic-bezier(0.4, 0, 0.6, 1); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
    <script>
        const storedPhone = localStorage.getItem("earnprox_user_phone");
        const storedToken = sessionStorage.getItem("earnprox_secure_token");
        if (storedPhone && storedToken) { window.location.replace("dashboard.html"); }
    </script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-5 selection:bg-yellow-200 selection:text-yellow-900 relative overflow-hidden">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] sm:w-[500px] sm:h-[500px] bg-yellow-400 rounded-full blur-[100px] sm:blur-[120px] opacity-15 pointer-events-none -z-10"></div>

    <div id="global-loader">
        <svg class="animate-spin h-10 w-10 text-yellow-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <p class="text-sm font-bold text-slate-700 animate-pulse">Securing Connection...</p>
    </div>

    <div id="splash-screen">
        <div class="relative w-56 h-16 mx-auto overflow-hidden pulse-logo mb-3">
            <img src="logo.png" alt="EarnproX Logo" onerror="this.style.display='none'; document.getElementById('splash-text').classList.remove('hidden');" class="absolute top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 h-[250%] max-w-none">
            <span id="splash-text" class="font-black text-3xl hidden text-slate-900 absolute top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 w-full text-center">EarnproX</span>
        </div>
        <div class="mt-4 flex gap-2 justify-center items-center">
            <div class="w-2.5 h-2.5 bg-yellow-500 rounded-full animate-bounce"></div>
            <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
            <div class="w-2.5 h-2.5 bg-yellow-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
        </div>
    </div>

    <div class="text-center mb-8 mt-2 relative z-10">
        <a href="index.html" class="block relative w-48 h-12 mx-auto overflow-hidden mb-2 transition-transform active:scale-95">
            <img src="logo.png" alt="EarnproX Logo" onerror="this.style.display='none'; document.getElementById('header-text').classList.remove('hidden');" class="absolute top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 h-[250%] max-w-none drop-shadow-sm">
            <span id="header-text" class="font-black text-2xl hidden text-slate-900 absolute top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 w-full text-center">EarnproX</span>
        </a>
        <p class="text-xs sm:text-sm text-slate-500 font-semibold mt-1">Complete digital tasks securely.</p>
    </div>

    <div class="premium-card rounded-[2rem] p-6 sm:p-8 w-full max-w-md relative overflow-hidden min-h-[460px] flex flex-col justify-start z-10 border-t-4 border-t-yellow-400">
        
        <div id="step-1" class="form-step step-active">
            <h2 class="text-2xl sm:text-3xl font-black text-slate-900 mb-2">Let's get started</h2>
            <p class="text-sm text-slate-500 mb-8 font-medium">Enter your mobile number to securely login or create an account.</p>
            <div class="mb-6">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Mobile Number</label>
                <div class="relative flex items-center bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-1 focus-within:border-yellow-400 focus-within:ring-4 focus-within:ring-yellow-400/20 transition duration-300 shadow-sm">
                    <span class="text-slate-400 font-black mr-3 border-r-2 border-slate-200 pr-3">+91</span>
                    <input type="tel" inputmode="numeric" pattern="[0-9]*" id="mobile-input" maxlength="10" placeholder="98765 43210" oninput="this.value = this.value.replace(/[^0-9]/g, '')" onkeyup="if(this.value.length === 10) window.checkUserAndProceed()" class="w-full text-xl font-black text-slate-800 bg-transparent outline-none py-3 tracking-wider placeholder:font-semibold placeholder:text-slate-300">
                </div>
            </div>
            <button onclick="window.checkUserAndProceed()" id="send-otp-btn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-slate-900 font-black py-4 rounded-xl shadow-[0_8px_20px_rgba(250,204,21,0.3)] text-lg active:scale-95 transition flex justify-center items-center gap-2 mt-auto focus:outline-none focus:ring-4 focus:ring-yellow-400/50">
                Continue <span class="text-xl">→</span>
            </button>
        </div>

        <div id="step-pin" class="form-step step-in-right">
            <button onclick="window.goBack('step-pin', 'step-1')" class="text-slate-400 hover:text-slate-800 mb-6 transition flex items-center gap-1 -ml-2 p-2 rounded-lg hover:bg-slate-50 focus:outline-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span class="text-xs font-bold uppercase tracking-wider">Back</span>
            </button>
            <h2 class="text-2xl sm:text-3xl font-black text-slate-900 mb-2">Welcome Back!</h2>
            <p class="text-sm text-slate-500 mb-8 font-medium">Enter your 4-digit PIN for <b id="display-number-pin" class="text-slate-800 tracking-wider"></b></p>
            <div class="mb-6">
                <div class="flex gap-3 justify-center">
                    <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pin-box" id="l-pin1" onkeyup="window.moveToNext(this, 'l-pin2', event, 'login')">
                    <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pin-box" id="l-pin2" onkeyup="window.moveToNext(this, 'l-pin3', event, 'login')">
                    <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pin-box" id="l-pin3" onkeyup="window.moveToNext(this, 'l-pin4', event, 'login')">
                    <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pin-box" id="l-pin4" onkeyup="window.moveToNext(this, null, event, 'login')">
                </div>
            </div>
            <div class="text-center mb-8">
                <button onclick="window.triggerForgotPin()" class="text-xs font-bold text-yellow-600 hover:underline">Forgot PIN? Login via OTP</button>
            </div>
            <button onclick="window.loginWithPIN()" id="pin-login-btn" class="w-full bg-slate-900 hover:bg-black text-white font-black py-4 rounded-xl shadow-lg text-lg active:scale-95 transition mt-auto flex justify-center items-center gap-2">
                Secure Login
            </button>
        </div>

        <div id="step-otp" class="form-step step-in-right">
            <button id="back-btn-otp" onclick="window.goBack('step-otp', 'step-1')" class="text-slate-400 hover:text-slate-800 mb-4 transition flex items-center gap-1 -ml-2 p-2 rounded-lg hover:bg-slate-50">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span class="text-xs font-bold uppercase tracking-wider">Back</span>
            </button>
            <h2 class="text-2xl font-black text-slate-900 mb-2" id="otp-heading">Verify & Setup</h2>
            <p class="text-xs sm:text-sm text-slate-500 mb-4 font-medium">OTP sent to <b id="display-number-otp" class="text-slate-800 tracking-wider"></b></p>
            
            <div id="new-user-fields" class="mb-4">
                <input type="text" id="name-input" placeholder="What's your full name?" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-800 font-bold rounded-xl px-4 py-3 outline-none focus:border-yellow-400 transition mb-3">
                <input type="text" id="refer-input" placeholder="Invite Code (Optional)" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-800 font-bold rounded-xl px-4 py-3 outline-none focus:border-emerald-400 transition uppercase tracking-widest">
            </div>

            <div class="mb-4">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center" id="pin-setup-label">Set a New 4-Digit PIN</label>
                <div class="flex gap-3 justify-center">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box !border-yellow-300" id="s-pin1" onkeyup="window.moveToNext(this, 's-pin2', event, 'setup')">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box !border-yellow-300" id="s-pin2" onkeyup="window.moveToNext(this, 's-pin3', event, 'setup')">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box !border-yellow-300" id="s-pin3" onkeyup="window.moveToNext(this, 's-pin4', event, 'setup')">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box !border-yellow-300" id="s-pin4" onkeyup="window.moveToNext(this, 'otp1', event, 'setup')">
                </div>
            </div>

            <div class="mb-4 border-t-2 border-slate-100 pt-4 relative">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center">Enter 4-Digit SMS OTP</label>
                <div class="flex gap-2 sm:gap-3 justify-center" id="otp-container">
                    <input type="tel" autocomplete="one-time-code" maxlength="1" class="otp-box !text-lg" id="otp1" onkeyup="window.moveToNext(this, 'otp2', event, 'setup')">
                    <input type="tel" autocomplete="one-time-code" maxlength="1" class="otp-box !text-lg" id="otp2" onkeyup="window.moveToNext(this, 'otp3', event, 'setup')">
                    <input type="tel" autocomplete="one-time-code" maxlength="1" class="otp-box !text-lg" id="otp3" onkeyup="window.moveToNext(this, 'otp4', event, 'setup')">
                    <input type="tel" autocomplete="one-time-code" maxlength="1" class="otp-box !text-lg" id="otp4" onkeyup="window.moveToNext(this, null, event, 'setup')">
                </div>
                
                <p id="otp-timer-container" class="text-center text-xs font-bold text-slate-400 mt-4 hidden">
                    Resend OTP in <span id="otp-timer-count" class="text-yellow-600">30</span>s
                </p>
                <button id="resend-otp-btn" onclick="window.resendOTP()" class="w-full text-center text-xs font-bold text-yellow-600 hover:underline mt-4 hidden focus:outline-none">
                    Resend OTP Now
                </button>
            </div>

            <button onclick="window.verifyOTPAndSave()" id="verify-btn" class="w-full bg-slate-900 hover:bg-black text-white font-black py-4 rounded-xl shadow-lg text-lg active:scale-95 transition mt-auto flex justify-center items-center gap-2">
                Complete Setup
            </button>
        </div>
    </div>
    
    <div id="toast">Message Here</div>
    <script>
        let isNewUser = true; 
        let isForgotPin = false;
        window.currentOtpSessionId = null; 
        let otpInterval = null;

        function triggerHaptic() { if ("vibrate" in navigator) navigator.vibrate(50); }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { 
                const splash = document.getElementById('splash-screen');
                if(splash) splash.classList.add('hidden'); 
                setTimeout(() => document.getElementById('mobile-input').focus(), 300);
            }, 1200); 

            document.getElementById("otp-container").addEventListener("paste", (e) => {
                e.preventDefault();
                let paste = (e.clipboardData || window.clipboardData).getData('text').trim();
                if(/^\d{4}$/.test(paste)){
                    paste.split('').forEach((num, i)=>{
                        const otpBox = document.getElementById(`otp${i+1}`);
                        if(otpBox) { otpBox.value = num; window.moveToNext(otpBox, i < 3 ? `otp${i+2}` : null, {key: ''}, 'setup'); }
                    });
                }
            });
        });

        function showLoader(show) { document.getElementById('global-loader').style.display = show ? 'flex' : 'none'; }
        window.showToast = function(msg) { 
            const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show"); 
            triggerHaptic(); setTimeout(()=>t.classList.remove("show"), 3500); 
        }
        
        function startOtpTimer() {
            let timer = 30;
            document.getElementById('resend-otp-btn').classList.add('hidden');
            document.getElementById('otp-timer-container').classList.remove('hidden');
            document.getElementById('otp-timer-count').innerText = timer;
            
            clearInterval(otpInterval);
            otpInterval = setInterval(() => {
                timer--; document.getElementById('otp-timer-count').innerText = timer;
                if(timer <= 0) {
                    clearInterval(otpInterval);
                    document.getElementById('otp-timer-container').classList.add('hidden');
                    document.getElementById('resend-otp-btn').classList.remove('hidden');
                }
            }, 1000);
        }

        window.moveToNext = function(current, nextId, event, type) { 
            current.value = current.value.replace(/[^0-9]/g, '');
            if (current.value.length === 1 && nextId && document.getElementById(nextId)) document.getElementById(nextId).focus(); 
            if (event.key === "Backspace" && current.value === "") { 
                const prevId = current.id.replace(/\d+$/, (num) => parseInt(num) - 1); 
                const prevElem = document.getElementById(prevId);
                if (current.id === "otp1" && document.getElementById('s-pin4')) document.getElementById('s-pin4').focus();
                else if(prevElem) prevElem.focus(); 
            } 
            if(type === 'login' && current.value.length === 1) {
                const fullLoginPin = document.getElementById('l-pin1').value + document.getElementById('l-pin2').value + document.getElementById('l-pin3').value + document.getElementById('l-pin4').value;
                if(fullLoginPin.length === 4) window.loginWithPIN();
            } else if (type === 'setup' && current.value.length === 1) {
                const fullSetupPin = document.getElementById('s-pin1').value + document.getElementById('s-pin2').value + document.getElementById('s-pin3').value + document.getElementById('s-pin4').value;
                const fullOtp = document.getElementById('otp1').value + document.getElementById('otp2').value + document.getElementById('otp3').value + document.getElementById('otp4').value;
                if(fullSetupPin.length === 4 && fullOtp.length === 4) window.verifyOTPAndSave();
            }
        }

        function switchStep(fromId, toId) {
            document.getElementById(fromId).classList.remove('step-active'); document.getElementById(fromId).classList.add('step-out-left');
            document.getElementById(toId).classList.remove('step-in-right'); document.getElementById(toId).classList.add('step-active');
        }

        window.goBack = function(currentStepId, targetStepId) {
            triggerHaptic();
            document.getElementById(currentStepId).classList.remove('step-active'); document.getElementById(currentStepId).classList.add('step-in-right');
            document.getElementById(targetStepId).classList.remove('step-out-left'); document.getElementById(targetStepId).classList.add('step-active');
            if(targetStepId === 'step-1') isForgotPin = false; 
            document.querySelectorAll(`#${currentStepId} input`).forEach(input => input.value = '');
        }

        function handleApiError(response, data) {
            if(response.status === 429) window.showToast("⏳ Too many attempts. Try again later.");
            else window.showToast("❌ " + (data.error || "Server Error. Please try again."));
        }

        window.checkUserAndProceed = async function() {
            triggerHaptic();
            const phone = document.getElementById('mobile-input').value.trim();
            if(phone.length !== 10 || !/^[6-9]\d{9}$/.test(phone)) return window.showToast("⚠️ Enter a valid 10-digit Indian mobile number.");
            
            showLoader(true);
            try {
                const response = await fetch('/api/check-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                
                const data = await response.json();
                if (response.ok && data.exists) {
                    if(data.status === "blocked") { showLoader(false); return window.showToast("🚫 Account Suspended."); }
                    isNewUser = false;
                    document.getElementById('display-number-pin').innerText = "+91 " + phone;
                    switchStep('step-1', 'step-pin');
                    setTimeout(() => { document.getElementById('l-pin1').focus(); showLoader(false); }, 400);
                } else if(response.ok && !data.exists) {
                    isNewUser = true;
                    document.getElementById('new-user-fields').style.display = 'block';
                    document.getElementById('otp-heading').innerText = "Register Account";
                    document.getElementById('back-btn-otp').onclick = () => window.goBack('step-otp', 'step-1');
                    await trigger2FactorOTP(phone, 'step-1'); 
                } else { handleApiError(response, data); showLoader(false); }
            } catch(error) { window.showToast("❌ Network Error!"); showLoader(false); } 
        }

        async function trigger2FactorOTP(phone, fromStep) {
            document.getElementById('display-number-otp').innerText = "+91 " + phone;
            try {
                const response = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone }) 
                });
                const data = await response.json();
                if (response.ok && data.sessionId) {
                    window.currentOtpSessionId = data.sessionId;
                    window.showToast("📲 Security OTP Sent!");
                    switchStep(fromStep, 'step-otp');
                    startOtpTimer(); 
                    setTimeout(() => { if(isNewUser) document.getElementById('name-input').focus(); else document.getElementById('s-pin1').focus(); showLoader(false); }, 400);
                } else { handleApiError(response, data); showLoader(false); }
            } catch (error) { window.showToast("❌ Network Connection Failed."); showLoader(false); }
        }

        window.resendOTP = async function() { triggerHaptic(); showLoader(true); await trigger2FactorOTP(document.getElementById('mobile-input').value.trim(), 'step-otp'); }

        window.triggerForgotPin = async function() {
            triggerHaptic(); isForgotPin = true;
            document.getElementById('new-user-fields').style.display = 'none'; 
            document.getElementById('otp-heading').innerText = "Reset PIN";
            document.getElementById('pin-setup-label').innerText = "Create New 4-Digit PIN";
            document.getElementById('back-btn-otp').onclick = () => window.goBack('step-otp', 'step-pin');
            showLoader(true); await trigger2FactorOTP(document.getElementById('mobile-input').value.trim(), 'step-pin');
        }

        window.loginWithPIN = async function() {
            triggerHaptic();
            const enteredPin = document.getElementById('l-pin1').value + document.getElementById('l-pin2').value + document.getElementById('l-pin3').value + document.getElementById('l-pin4').value;
            if(enteredPin.length < 4) return window.showToast("⚠️ Enter complete 4-digit PIN.");
            
            showLoader(true);
            const phone = document.getElementById('mobile-input').value.trim();

            try {
                const response = await fetch('/api/login-pin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone, pin: enteredPin }) // 🔥 अब हैशिंग हट गई है, सीधा PIN जा रहा है
                });
                const data = await response.json();
                if(response.ok && data.token) {
                    localStorage.setItem("earnprox_user_phone", phone);
                    sessionStorage.setItem("earnprox_secure_token", data.token); 
                    window.location.href = "dashboard.html";
                } else {
                    handleApiError(response, data);
                    document.querySelectorAll('#step-pin .pin-box').forEach(el => el.value = '');
                    document.getElementById('l-pin1').focus();
                    showLoader(false);
                }
            } catch (e) { window.showToast("❌ Connection Error."); showLoader(false); } 
        }

        window.verifyOTPAndSave = async function() {
            triggerHaptic();
            const phone = document.getElementById('mobile-input').value.trim();
            const enteredOtp = document.getElementById('otp1').value + document.getElementById('otp2').value + document.getElementById('otp3').value + document.getElementById('otp4').value;
            const setupPin = document.getElementById('s-pin1').value + document.getElementById('s-pin2').value + document.getElementById('s-pin3').value + document.getElementById('s-pin4').value;
            
            let finalName = "", referCode = "None";
            if(isNewUser) {
                finalName = document.getElementById('name-input').value.trim();
                if(!/^[a-zA-Z .]{3,}$/.test(finalName)) return window.showToast("⚠️ Enter a valid Full Name.");
                referCode = document.getElementById('refer-input').value.trim().toUpperCase();
                if(referCode && referCode.length !== 7) referCode = "None";
            }

            if(setupPin.length < 4) return window.showToast("⚠️ Set a complete 4-Digit PIN.");
            if(enteredOtp.length < 4) return window.showToast("⚠️ Enter the complete 4-digit OTP.");

            showLoader(true);
            try {
                const response = await fetch('/api/verify-setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: window.currentOtpSessionId, otpEntered: enteredOtp, phone: phone, pin: setupPin, isNewUser, isForgotPin, name: finalName, referCode }) // 🔥 सीधा PIN जा रहा है
                });

                const data = await response.json();
                if (!response.ok) { handleApiError(response, data); showLoader(false); return; }

                localStorage.setItem("earnprox_user_phone", phone);
                sessionStorage.setItem("earnprox_secure_token", data.token); 
                window.location.href = "dashboard.html";
            } catch (error) { window.showToast("❌ Setup Failed! Network Error."); showLoader(false); }
        }
    </script>

</body>
</html>
