<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnproX | Login & Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F4F7F9; color: #0F172A; overflow-x: hidden; }
        .premium-card { background: #FFFFFF; border: 1px solid #E2E8F0; box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08); }
        .form-step { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; position: absolute; top: 0; left: 0; padding: 24px; visibility: hidden; }
        .step-out-left { transform: translateX(-120%); opacity: 0; pointer-events: none; visibility: hidden; }
        .step-in-right { transform: translateX(120%); opacity: 0; pointer-events: none; visibility: hidden; }
        .step-active { transform: translateX(0); opacity: 1; pointer-events: auto; position: relative; padding: 0; visibility: visible; }
        
        .otp-box, .pin-box { width: 42px; height: 55px; text-align: center; font-size: 22px; font-weight: 800; border-radius: 12px; border: 2px solid #E2E8F0; background: #F8FAFC; outline: none; transition: all 0.2s; }
        .otp-box:focus, .pin-box:focus { border-color: #EC4899; background: #FFFFFF; box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.15); }
        @media (max-width: 380px) { .otp-box, .pin-box { width: 36px; height: 50px; font-size: 18px; } }
        
        #toast { visibility: hidden; min-width: 250px; background-color: #1E293B; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px); opacity: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 600; font-size: 14px; }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #F4F7F9; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease-out, visibility 0.5s ease-out; }
        #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .pulse-logo { animation: pulse 1.5s infinite cubic-bezier(0.4, 0, 0.6, 1); }
        @keyframes pulse { 0%, 100% { transform: scale(1) rotate(-6deg); } 50% { transform: scale(1.1) rotate(-6deg); } }
    </style>

    <script>
        // 🔒 SECURE REDIRECT CHECK
        const storedPhone = localStorage.getItem("earnprox_user_phone");
        const storedToken = localStorage.getItem("earnprox_secure_token");
        if (storedPhone && storedToken) {
            window.location.replace("dashboard.html");
        }
    </script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5 selection:bg-pink-200 selection:text-pink-900 relative overflow-hidden">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-pink-500 rounded-full blur-[120px] opacity-10 pointer-events-none -z-10"></div>

    <div id="splash-screen">
        <div class="w-20 h-20 bg-pink-600 rounded-[1.5rem] mx-auto flex items-center justify-center mb-4 shadow-[0_10px_20px_rgba(219,39,119,0.4)] pulse-logo">
            <span class="text-4xl text-white font-black">E</span>
        </div>
        <h1 class="text-2xl font-black tracking-tight text-slate-900 mt-2">Earnpro<span class="text-pink-600">X</span></h1>
        <div class="mt-8 flex gap-2 justify-center items-center">
            <div class="w-2.5 h-2.5 bg-pink-600 rounded-full animate-bounce"></div>
            <div class="w-2.5 h-2.5 bg-pink-600 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
            <div class="w-2.5 h-2.5 bg-pink-600 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
        </div>
    </div>

    <div class="text-center mb-8 mt-4 relative z-10">
        <div class="w-16 h-16 bg-pink-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-[0_10px_20px_rgba(219,39,119,0.3)] transform -rotate-6">
            <span class="text-3xl text-white font-black">E</span>
        </div>
        <h1 class="text-3xl font-black tracking-tight text-slate-900">Earnpro<span class="text-pink-600">X</span></h1>
        <p class="text-sm text-slate-500 font-medium mt-1">Complete micro-tasks, earn real money.</p>
    </div>

    <div class="premium-card rounded-[2rem] p-6 w-full max-w-md relative overflow-hidden min-h-[420px] flex flex-col justify-start z-10">
        
        <div id="step-1" class="form-step step-active">
            <h2 class="text-2xl font-black text-slate-800 mb-2">Let's get started</h2>
            <p class="text-sm text-slate-500 mb-8">Enter your mobile number to login or create a new account.</p>
            
            <div class="mb-5">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Mobile Number</label>
                <div class="relative flex items-center bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-1 focus-within:border-pink-500 focus-within:ring-4 focus-within:ring-pink-500/10 transition duration-300">
                    <span class="text-slate-500 font-bold mr-2 border-r border-slate-300 pr-2">+91</span>
                    <input type="tel" id="mobile-input" maxlength="10" placeholder="98765 43210" class="w-full text-lg font-bold text-slate-800 bg-transparent outline-none py-3 tracking-wider">
                </div>
            </div>

            <button onclick="window.checkUserAndProceed()" id="send-otp-btn" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-black py-4 rounded-xl shadow-[0_10px_20px_rgba(219,39,119,0.3)] text-lg active:scale-95 transition flex justify-center items-center gap-2 mt-auto">
                Continue <span class="text-xl">→</span>
            </button>
        </div>

        <div id="step-pin" class="form-step step-in-right">
            <button onclick="window.goBack('step-pin')" class="text-slate-400 hover:text-slate-800 mb-4 transition flex items-center gap-1 -ml-2">
                <span class="text-xs font-bold">← Back</span>
            </button>
            <h2 class="text-2xl font-black text-slate-800 mb-2">Welcome Back!</h2>
            <p class="text-sm text-slate-500 mb-6">Enter your 4-digit PIN for <b id="display-number-pin" class="text-slate-800"></b></p>
            
            <div class="mb-6">
                <div class="flex gap-3 justify-center">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box" id="l-pin1" onkeyup="window.moveToNext(this, 'l-pin2', event)">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box" id="l-pin2" onkeyup="window.moveToNext(this, 'l-pin3', event)">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box" id="l-pin3" onkeyup="window.moveToNext(this, 'l-pin4', event)">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box" id="l-pin4" onkeyup="window.checkBackspace(this, 'l-pin3', event)">
                </div>
            </div>

            <div class="text-center mb-8">
                <button onclick="window.triggerForgotPin()" class="text-xs font-bold text-pink-600 hover:underline">Forgot PIN? Login via OTP</button>
            </div>

            <button onclick="window.loginWithPIN()" id="pin-login-btn" class="w-full bg-[#1E293B] hover:bg-black text-white font-black py-4 rounded-xl shadow-lg text-lg active:scale-95 transition mt-auto flex justify-center items-center gap-2">
                Secure Login
            </button>
        </div>

        <div id="step-otp" class="form-step step-in-right">
            <button onclick="window.goBack('step-otp')" class="text-slate-400 hover:text-slate-800 mb-4 transition flex items-center gap-1 -ml-2">
                <span class="text-xs font-bold">← Back</span>
            </button>
            <h2 class="text-2xl font-black text-slate-800 mb-2">Verify & Setup</h2>
            <p class="text-sm text-slate-500 mb-6">OTP sent to <b id="display-number-otp" class="text-slate-800"></b></p>
            
            <div id="new-user-fields" class="mb-4">
                <input type="text" id="name-input" placeholder="What's your full name?" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-800 font-bold rounded-xl px-4 py-3 outline-none focus:border-pink-500 transition mb-3">
                <input type="text" id="refer-input" placeholder="Invite Code (Optional)" class="w-full bg-slate-50 border-2 border-slate-200 text-slate-800 font-bold rounded-xl px-4 py-3 outline-none focus:border-pink-500 transition uppercase tracking-widest">
            </div>

            <div class="mb-4">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 text-center">Set a 4-Digit PIN</label>
                <div class="flex gap-3 justify-center">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box !border-pink-200" id="s-pin1" onkeyup="window.moveToNext(this, 's-pin2', event)">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box !border-pink-200" id="s-pin2" onkeyup="window.moveToNext(this, 's-pin3', event)">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box !border-pink-200" id="s-pin3" onkeyup="window.moveToNext(this, 's-pin4', event)">
                    <input type="password" inputmode="numeric" maxlength="1" class="pin-box !border-pink-200" id="s-pin4" onkeyup="window.checkBackspace(this, 's-pin3', event)">
                </div>
            </div>

            <div class="mb-6 border-t border-slate-100 pt-4">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 text-center">Enter 6-Digit SMS OTP</label>
                <div class="flex gap-1 justify-center">
                    <input type="tel" maxlength="1" class="otp-box !w-9 !h-12 !text-lg" id="otp1" onkeyup="window.moveToNext(this, 'otp2', event)">
                    <input type="tel" maxlength="1" class="otp-box !w-9 !h-12 !text-lg" id="otp2" onkeyup="window.moveToNext(this, 'otp3', event)">
                    <input type="tel" maxlength="1" class="otp-box !w-9 !h-12 !text-lg" id="otp3" onkeyup="window.moveToNext(this, 'otp4', event)">
                    <input type="tel" maxlength="1" class="otp-box !w-9 !h-12 !text-lg" id="otp4" onkeyup="window.moveToNext(this, 'otp5', event)">
                    <input type="tel" maxlength="1" class="otp-box !w-9 !h-12 !text-lg" id="otp5" onkeyup="window.moveToNext(this, 'otp6', event)">
                    <input type="tel" maxlength="1" class="otp-box !w-9 !h-12 !text-lg" id="otp6" onkeyup="window.checkBackspace(this, 'otp5', event)">
                </div>
            </div>

            <button onclick="window.verifyOTPAndSave()" id="verify-btn" class="w-full bg-[#1E293B] hover:bg-black text-white font-black py-4 rounded-xl shadow-lg text-lg active:scale-95 transition mt-auto flex justify-center items-center gap-2">
                Complete Setup
            </button>
        </div>
    </div>

    <div class="text-center mt-6 mb-4 w-full max-w-md relative z-10">
        <p class="text-[9px] text-slate-400 mt-4 leading-tight font-medium">
            &copy; 2026 EarnproX. All rights reserved.
        </p>
    </div>
    
    <div id="toast">Message Here</div>

    <script type="module">
        // सिर्फ Firestore को इम्पोर्ट कर रहे हैं
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI",
          authDomain: "earnproxuc.firebaseapp.com",
          projectId: "earnproxuc",
          storageBucket: "earnproxuc.firebasestorage.app",
          messagingSenderId: "411733884378",
          appId: "1:411733884378:web:b3944ee303740e4ae1d4e3"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let isNewUser = true; 
        let isForgotPin = false;
        let existingUserData = null; 
        let existingUserDocId = null;
        const REFER_BONUS_AMOUNT = 5; 
        window.currentOtpSessionId = null; // 2factor API का Session ID सेव करने के लिए

        const spinnerSVG = `<svg class="animate-spin h-6 w-6 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

        function generateSecureToken() {
            return Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { 
                const splash = document.getElementById('splash-screen');
                if(splash) splash.classList.add('hidden'); 
            }, 800);
            
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if(refCode) {
                const rInput = document.getElementById('refer-input');
                if(rInput) {
                    rInput.value = refCode.toUpperCase();
                    rInput.classList.add('border-emerald-300', 'bg-emerald-50');
                }
            }
        });

        window.showToast = function(msg) { 
            const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show"); 
            setTimeout(()=>t.classList.remove("show"), 3000); 
        }
        
        window.moveToNext = function(c, n, e) { 
            if (c.value.length >= 1 && document.getElementById(n)) document.getElementById(n).focus(); 
            if (e && e.key === "Backspace" && c.value === "") { 
                const pId = c.id.replace(/\d/, (num) => parseInt(num) - 1); 
                if(document.getElementById(pId)) document.getElementById(pId).focus(); 
            } 
        }
        window.checkBackspace = function(c, p, e) { 
            if (e.key === "Backspace" && c.value === "") document.getElementById(p).focus(); 
        }

        function switchStep(fromId, toId) {
            document.getElementById(fromId).classList.remove('step-active'); 
            document.getElementById(fromId).classList.add('step-out-left');
            document.getElementById(toId).classList.remove('step-in-right'); 
            document.getElementById(toId).classList.add('step-active');
        }

        window.goBack = function(currentStepId) {
            document.getElementById(currentStepId).classList.remove('step-active'); 
            document.getElementById(currentStepId).classList.add('step-in-right');
            document.getElementById('step-1').classList.remove('step-out-left'); 
            document.getElementById('step-1').classList.add('step-active');
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => { if(input.id !== 'mobile-input') input.value = ''; });
        }

        window.checkUserAndProceed = async function() {
            const phone = document.getElementById('mobile-input').value.trim();
            if(phone.length !== 10) return window.showToast("⚠️ Enter a valid 10-digit number.");
            
            const btn = document.getElementById('send-otp-btn'); 
            const originalHTML = btn.innerHTML; 
            btn.innerHTML = `${spinnerSVG} Processing...`; 
            btn.disabled = true;

            try {
                // चेक कर रहे हैं कि यूज़र डेटाबेस में है या नहीं
                const q = query(collection(db, "users"), where("phone", "==", phone));
                const snap = await getDocs(q);
                
                if (!snap.empty) {
                    existingUserDocId = snap.docs[0].id;
                    existingUserData = snap.docs[0].data();
                    if(existingUserData.status === "blocked") {
                        window.showToast("🚫 Account Suspended.");
                        btn.innerHTML = originalHTML; btn.disabled = false;
                        return; 
                    }
                    isNewUser = false;
                    document.getElementById('display-number-pin').innerText = "+91 " + phone;
                    switchStep('step-1', 'step-pin');
                    btn.innerHTML = originalHTML; btn.disabled = false;
                } else {
                    isNewUser = true;
                    document.getElementById('new-user-fields').style.display = 'block';
                    await trigger2FactorOTP(phone, btn, originalHTML); // नया Vercel API कॉल
                }
            } catch(error) { 
                console.error(error);
                window.showToast("❌ Server Error!");
                btn.innerHTML = originalHTML; btn.disabled = false;
            }
        }

        // नया Vercel (2factor.in) OTP फंक्शन
        async function trigger2FactorOTP(phone, btnElement, originalHTML, fromStep = 'step-1') {
            document.getElementById('display-number-otp').innerText = "+91 " + phone;

            try {
                const response = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: phone })
                });
                
                const data = await response.json();

                if (response.ok && data.sessionId) {
                    window.currentOtpSessionId = data.sessionId;
                    window.showToast("📲 OTP Sent Successfully!");
                    switchStep(fromStep, 'step-otp');
                } else {
                    window.showToast("❌ " + (data.error || "Failed to send OTP"));
                }
            } catch (error) {
                console.error("OTP Error:", error);
                window.showToast("❌ Network Error! Try later.");
            } finally {
                if(btnElement) { btnElement.innerHTML = originalHTML; btnElement.disabled = false; }
            }
        }

        window.triggerForgotPin = async function() {
            isForgotPin = true;
            document.getElementById('new-user-fields').style.display = 'none'; 
            const phone = document.getElementById('mobile-input').value.trim();
            const btn = document.getElementById('pin-login-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `${spinnerSVG} Sending OTP...`; btn.disabled = true;
            await trigger2FactorOTP(phone, btn, originalHTML, 'step-pin');
        }

        window.loginWithPIN = async function() {
            const enteredPin = document.getElementById('l-pin1').value + document.getElementById('l-pin2').value + document.getElementById('l-pin3').value + document.getElementById('l-pin4').value;
            if(enteredPin.length < 4) return window.showToast("⚠️ Enter 4-digit PIN.");
            const btn = document.getElementById('pin-login-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `${spinnerSVG} Verifying...`; btn.disabled = true;

            if(existingUserData.pin && existingUserData.pin === enteredPin) {
                const newToken = generateSecureToken();
                await updateDoc(doc(db, "users", existingUserDocId), { sessionToken: newToken });
                localStorage.setItem("earnprox_user_phone", existingUserData.phone);
                localStorage.setItem("earnprox_secure_token", newToken);
                window.location.href = "dashboard.html";
            } else {
                window.showToast("❌ Incorrect PIN!");
                btn.innerHTML = originalHTML; btn.disabled = false;
            }
        }

        window.verifyOTPAndSave = async function() {
            const btn = document.getElementById('verify-btn');
            const originalHTML = btn.innerHTML;
            const enteredOtp = document.getElementById('otp1').value + document.getElementById('otp2').value + document.getElementById('otp3').value + document.getElementById('otp4').value + document.getElementById('otp5').value + document.getElementById('otp6').value;
            const setupPin = document.getElementById('s-pin1').value + document.getElementById('s-pin2').value + document.getElementById('s-pin3').value + document.getElementById('s-pin4').value;
            
            if(setupPin.length < 4) return window.showToast("⚠️ Set 4-Digit PIN.");
            if(enteredOtp.length < 6) return window.showToast("⚠️ Enter 6-digit OTP.");

            btn.innerHTML = `${spinnerSVG} Verifying...`; btn.disabled = true;
            const phone = document.getElementById('mobile-input').value.trim();

            try {
                // Vercel (2factor.in) OTP वेरिफिकेशन API को कॉल कर रहे हैं
                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sessionId: window.currentOtpSessionId, 
                        otpEntered: enteredOtp 
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    window.showToast("❌ " + (data.error || "Invalid OTP!"));
                    btn.innerHTML = originalHTML; btn.disabled = false;
                    return; // अगर OTP गलत है, तो यहीं रोक दें
                }

                // अगर OTP सही है, तो Firestore में डेटा सेव करें
                const newToken = generateSecureToken();

                if(isNewUser) {
                    const finalName = document.getElementById('name-input').value.trim();
                    if(finalName.length < 3) { window.showToast("⚠️ Enter Name."); btn.innerHTML = originalHTML; btn.disabled = false; return; }
                    
                    let referCode = document.getElementById('refer-input').value.trim().toUpperCase() || "None";
                    const myOwnCode = (finalName.substring(0,3) + phone.substring(6)).toUpperCase();

                    await addDoc(collection(db, "users"), {
                        phone: phone, name: finalName, pin: setupPin, sessionToken: newToken,
                        balance: 0, ownReferCode: myOwnCode, referCodeUsed: referCode,
                        status: "active", timestamp: new Date()
                    });

                    if(referCode !== "None") {
                        const refSnap = await getDocs(query(collection(db, "users"), where("ownReferCode", "==", referCode)));
                        if(!refSnap.empty) {
                            const rDoc = refSnap.docs[0];
                            await updateDoc(doc(db, "users", rDoc.id), { balance: (rDoc.data().balance || 0) + REFER_BONUS_AMOUNT });
                        }
                    }
                } else if (isForgotPin) {
                    await updateDoc(doc(db, "users", existingUserDocId), { pin: setupPin, sessionToken: newToken });
                }

                localStorage.setItem("earnprox_user_phone", phone);
                localStorage.setItem("earnprox_secure_token", newToken);
                window.location.href = "dashboard.html";
                
            } catch (error) {
                console.error(error);
                window.showToast("❌ Server Error!");
                btn.innerHTML = originalHTML; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
