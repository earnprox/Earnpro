<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Spin & Win</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken) {
            window.location.replace("login.html");
        }
    </script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #051334; /* Deep Navy Blue */
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Neon Perspective Grid Floor */
        .grid-floor {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40%;
            background-image: 
                linear-gradient(rgba(34, 211, 238, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(600px) rotateX(65deg);
            transform-origin: bottom;
            z-index: 0;
            pointer-events: none;
        }

        /* 🎡 Patterned Golden Rim */
        .wheel-rim {
            position: relative;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: repeating-conic-gradient(
                from 0deg,
                #FBBF24 0deg 5deg, 
                #B45309 5deg 10deg,
                #FDE68A 10deg 15deg
            );
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.2), inset 0 0 10px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Spinning Wheel (6 Segments alternating blue) */
        .wheel-container {
            position: relative;
            width: 310px;
            height: 310px;
            border-radius: 50%;
            border: 4px solid #051334;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: transform 4.5s cubic-bezier(0.17, 0.67, 0.1, 1);
            background: conic-gradient(
                #13B9E6 0deg 60deg,   /* Light Blue */
                #0B2A6B 60deg 120deg, /* Dark Blue */
                #13B9E6 120deg 180deg,
                #0B2A6B 180deg 240deg,
                #13B9E6 240deg 300deg,
                #0B2A6B 300deg 360deg
            );
        }

        /* Separation Lines */
        .wheel-lines {
            position: absolute; inset: 0; border-radius: 50%;
            background: 
                linear-gradient(0deg, transparent 49.7%, rgba(255,255,255,0.5) 49.7%, rgba(255,255,255,0.5) 50.3%, transparent 50.3%),
                linear-gradient(60deg, transparent 49.7%, rgba(255,255,255,0.5) 49.7%, rgba(255,255,255,0.5) 50.3%, transparent 50.3%),
                linear-gradient(120deg, transparent 49.7%, rgba(255,255,255,0.5) 49.7%, rgba(255,255,255,0.5) 50.3%, transparent 50.3%);
            z-index: 1;
        }

        /* Text placements on the wheel */
        .slice-text {
            position: absolute;
            width: 50%; height: 20px;
            top: 50%; left: 50%;
            transform-origin: 0% 50%;
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 35px;
            font-weight: 900; color: white; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
            font-size: 22px;
            z-index: 2;
        }

        .t-1 { transform: translateY(-50%) rotate(30deg); }   
        .t-2 { transform: translateY(-50%) rotate(90deg); }   
        .t-3 { transform: translateY(-50%) rotate(150deg); }  
        .t-4 { transform: translateY(-50%) rotate(210deg); font-size: 14px; } 
        .t-5 { transform: translateY(-50%) rotate(270deg); }  
        .t-6 { transform: translateY(-50%) rotate(330deg); color: #FFD700; } 

        /* Golden Center Pin */
        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 45px; height: 45px;
            background: radial-gradient(circle at 30% 30%, #FDE68A 0%, #D97706 80%, #92400E 100%);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7), inset 0 -2px 6px rgba(0,0,0,0.4);
        }

        /* Top Blue Layered Pointer */
        .pointer-container {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.6));
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .pointer-outer {
            width: 0; height: 0;
            border-left: 24px solid transparent;
            border-right: 24px solid transparent;
            border-top: 35px solid #00E5A0; /* Light Cyan/Blue */
            position: relative;
        }
        .pointer-inner {
            width: 0; height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 22px solid #0B2A6B; /* Dark Blue */
            position: absolute;
            top: -35px; left: -14px;
        }

        /* Advanced 3D Bottom SPIN Button */
        .btn-3d {
            background: linear-gradient(to bottom, #40dbff, #12b5e6);
            border-radius: 50%;
            border: 2px solid #0ba1d1;
            /* Box shadow magic to create 3D depth without inner divs */
            box-shadow: 
                0 8px 0 #0e5bc2, 
                0 16px 0 #063b82, 
                0 25px 20px rgba(0,0,0,0.6),
                inset 0 3px 5px rgba(255,255,255,0.6);
            color: white;
            text-shadow: 1px 2px 2px rgba(0,0,0,0.3);
            transition: all 0.15s ease;
        }
        .btn-3d:active {
            transform: translateY(12px);
            box-shadow: 
                0 0px 0 #0e5bc2, 
                0 4px 0 #063b82, 
                0 10px 10px rgba(0,0,0,0.6),
                inset 0 3px 5px rgba(255,255,255,0.6);
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col relative overflow-hidden selection:bg-cyan-500/30">

    <div class="grid-floor"></div>

    <div class="relative z-20 flex items-center justify-between p-5 pt-8">
        <button onclick="window.history.back()" class="p-2 active:scale-90 transition-transform">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <h1 class="text-xl font-bold tracking-wide">Spin and Win</h1>
        <button class="p-2 active:scale-90 transition-transform opacity-0 pointer-events-none">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
        </button>
    </div>

    <div class="relative z-10 flex-1 flex flex-col items-center justify-center px-6 mt-4">
        
        <div class="relative mb-16 drop-shadow-[0_15px_30px_rgba(0,0,0,0.5)]">
            <div class="pointer-container">
                <div class="pointer-outer">
                    <div class="pointer-inner"></div>
                </div>
            </div>
            
            <div class="wheel-rim">
                <div class="wheel-center"></div>
                
                <div id="wheel" class="wheel-container">
                    <div class="wheel-lines"></div>
                    <div class="slice-text t-1">₹1</div>
                    <div class="slice-text t-2">₹2</div>
                    <div class="slice-text t-3">₹3</div>
                    <div class="slice-text t-4">Oops!</div>
                    <div class="slice-text t-5">₹5</div>
                    <div class="slice-text t-6">₹10</div>
                </div>
            </div>
        </div>

        <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Wrapped%20gift/3D/wrapped_gift_3d.png" class="absolute bottom-6 left-2 w-24 h-24 object-contain z-10 opacity-90 drop-shadow-xl" style="transform: rotate(-15deg);">
        <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Wrapped%20gift/3D/wrapped_gift_3d.png" class="absolute bottom-6 right-2 w-28 h-28 object-contain z-10 opacity-90 drop-shadow-xl" style="filter: hue-rotate(240deg); transform: rotate(10deg);">

        <div class="relative mb-8 z-20">
            <button id="spin-btn" onclick="startAdAndSpin()" class="btn-3d w-[130px] h-[130px] text-3xl font-black italic tracking-wider cursor-pointer outline-none">
                SPIN
            </button>
            
            <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-[#0B2A6B] border-2 border-yellow-400 text-yellow-400 font-bold px-4 py-1 rounded-full text-sm flex items-center gap-1.5 shadow-lg pointer-events-none">
                <span class="w-3 h-3 rounded-full bg-[#13B9E6] drop-shadow-md"></span> 3
            </div>
        </div>

    </div>

    <div id="ad-overlay" class="fixed inset-0 z-[100] bg-[#051334] flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-slate-800 border-t-[#13B9E6] rounded-full animate-spin mx-auto mb-6 shadow-[0_0_15px_rgba(19,185,230,0.5)]"></div>
            <h3 class="text-xl font-black text-white mb-2">Connecting to Server...</h3>
            <p class="text-cyan-200 text-sm font-bold bg-[#0B2A6B] px-4 py-2 rounded-full mt-4 border border-cyan-800">Spin starts in <span id="ad-timer" class="text-yellow-400 text-lg">3</span>s</p>
        </div>
    </div>

    <div id="result-overlay" class="fixed inset-0 z-[150] bg-[#051334]/90 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 px-5">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-[320px] text-center shadow-2xl transform scale-90 transition-transform duration-300 relative overflow-hidden" id="result-card">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-cyan-100 rounded-full blur-3xl z-0"></div>
            <div class="relative z-10">
                <div id="result-icon" class="text-6xl mb-4 drop-shadow-md">🎉</div>
                <h3 id="result-title" class="text-2xl font-black text-[#0B2A6B] mb-2 tracking-tight">Congratulations!</h3>
                <p id="result-msg" class="text-slate-600 font-bold mb-8 text-sm">You won ₹5 in your vault.</p>
                <button onclick="window.location.href='dashboard.html'" class="w-full bg-[#0B2A6B] text-white font-black py-4 rounded-xl active:scale-95 transition-transform shadow-lg text-[14px]">Claim & Go to Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        let isSpinning = false;

        // Backend Se Prize aayega toh kis angle pe rokna hai?
        // Mapping: Index 0 = ₹1, 1 = ₹2, 2 = ₹3, 3 = Loss, 4 = ₹5, 5 = ₹10
        const prizeMap = {
            1: { index: 0, title: "Small Win!", icon: "👍" },
            2: { index: 1, title: "Nice Job!", icon: "✌️" },
            3: { index: 2, title: "Great Win!", icon: "🎉" },
            0: { index: 3, title: "Better Luck!", icon: "😢", msg: "Oops! You missed it today." },
            5: { index: 4, title: "Awesome!", icon: "🔥" },
            10:{ index: 5, title: "JACKPOT!", icon: "🎰" }
        };

        async function startAdAndSpin() {
            if(isSpinning) return;
            isSpinning = true;
            
            // 1. Show Fake Ad (3 seconds)
            const adOverlay = document.getElementById("ad-overlay");
            adOverlay.classList.remove("pointer-events-none", "opacity-0");
            
            let timeLeft = 3;
            const timerEl = document.getElementById("ad-timer");
            timerEl.innerText = timeLeft;
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    adOverlay.classList.add("pointer-events-none", "opacity-0");
                    executeRealSpin(); // Call API After Ad
                }
            }, 1000);
        }

        async function executeRealSpin() {
            const spinBtn = document.getElementById("spin-btn");
            spinBtn.innerHTML = "Processing...";
            spinBtn.style.fontSize = "16px"; 
            spinBtn.style.fontStyle = "normal";

            try {
                // 2. Call Secure Backend API
                const response = await fetch('/api/spin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: userPhone, token: userToken })
                });

                const data = await response.json();

                if (response.ok) {
                    const rewardAmt = data.reward;
                    spinTheWheel(rewardAmt);
                } else {
                    alert(data.error); 
                    window.location.href = "dashboard.html";
                }
            } catch (error) {
                alert("Network Error! Try again.");
                isSpinning = false;
                spinBtn.innerHTML = "SPIN";
                spinBtn.style.fontSize = "30px";
                spinBtn.style.fontStyle = "italic";
            }
        }

        function spinTheWheel(rewardAmt) {
            const wheel = document.getElementById("wheel");
            const prizeInfo = prizeMap[rewardAmt];
            
            const sliceDegree = 60;
            const randomOffset = Math.floor(Math.random() * 40) + 10; 
            
            const targetDegree = (5 * 360) + (360 - (prizeInfo.index * sliceDegree)) - sliceDegree/2 + randomOffset;

            wheel.style.transform = `rotate(${targetDegree}deg)`;

            setTimeout(() => {
                showResult(rewardAmt, prizeInfo);
            }, 4600); 
        }

        function showResult(amt, info) {
            const overlay = document.getElementById("result-overlay");
            const card = document.getElementById("result-card");
            
            document.getElementById("result-icon").innerText = info.icon;
            document.getElementById("result-title").innerText = info.title;
            
            if(amt > 0) {
                document.getElementById("result-msg").innerText = `You won ₹${amt} in your vault!`;
            } else {
                document.getElementById("result-msg").innerText = info.msg;
            }

            overlay.classList.remove("pointer-events-none", "opacity-0");
            setTimeout(() => card.classList.remove("scale-90"), 50);
        }
    </script>

</body>
</html>
