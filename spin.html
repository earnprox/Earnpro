<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Premium Spin & Win</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken) {
            window.location.replace("login.html");
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* 🎡 Premium 3D Wheel Styling */
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            /* Metallic Rim Effect */
            border: 12px solid #1C211F;
            box-shadow: 0 0 50px rgba(0, 168, 122, 0.2), inset 0 0 30px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: transform 4.5s cubic-bezier(0.17, 0.67, 0.1, 1); /* Realistic friction spin */
            background: conic-gradient(
                #EF4444 0deg 60deg,   /* ₹1 - Red */
                #F59E0B 60deg 120deg, /* ₹2 - Orange */
                #3B82F6 120deg 180deg,/* ₹3 - Blue */
                #313439 180deg 240deg,/* Better Luck - Dark */
                #00A87A 240deg 300deg,/* ₹5 - Theme Emerald */
                #8B5CF6 300deg 360deg /* ₹10 Jackpot - Purple */
            );
        }

        /* 3D Inner Sphere Overlay */
        .wheel-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 5;
        }

        /* Separation Lines inside the wheel */
        .wheel-lines {
            position: absolute; inset: 0; border-radius: 50%;
            background: 
                linear-gradient(0deg, transparent 49.6%, rgba(255,255,255,0.4) 49.6%, rgba(255,255,255,0.4) 50.4%, transparent 50.4%),
                linear-gradient(60deg, transparent 49.6%, rgba(255,255,255,0.4) 49.6%, rgba(255,255,255,0.4) 50.4%, transparent 50.4%),
                linear-gradient(120deg, transparent 49.6%, rgba(255,255,255,0.4) 49.6%, rgba(255,255,255,0.4) 50.4%, transparent 50.4%);
            z-index: 1;
        }

        /* Text placements on the wheel slices */
        .slice-text {
            position: absolute;
            width: 50%; height: 20px;
            top: 50%; left: 50%;
            transform-origin: 0% 50%;
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 35px;
            font-weight: 900; color: white; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            font-size: 20px;
            z-index: 2;
        }

        .t-1 { transform: translateY(-50%) rotate(30deg); }   
        .t-2 { transform: translateY(-50%) rotate(90deg); }   
        .t-3 { transform: translateY(-50%) rotate(150deg); }  
        .t-4 { transform: translateY(-50%) rotate(210deg); font-size: 13px; color: #cbd5e1;} 
        .t-5 { transform: translateY(-50%) rotate(270deg); }  
        .t-6 { transform: translateY(-50%) rotate(330deg); color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5);} 

        /* Realistic Center Bolt */
        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            background: radial-gradient(circle, #E8EBF0 0%, #94A3B8 100%);
            border: 6px solid #0B100E;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6), inset 0 -2px 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wheel-center::after {
            content: '';
            width: 15px; height: 15px;
            background: #313439;
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Premium Pointer at the top */
        .pointer {
            position: absolute;
            top: -25px; left: 50%;
            transform: translateX(-50%);
            width: 34px; height: 40px;
            background: linear-gradient(to bottom, #FFD700, #F59E0B);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 20;
            filter: drop-shadow(0 6px 4px rgba(0,0,0,0.6));
        }
    </style>
</head>
<body class="bg-[#0B100E] text-white min-h-screen flex flex-col relative overflow-hidden selection:bg-[#00A87A]/30">

    <!-- Premium Glow Background -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[400px] bg-[#00A87A] rounded-full blur-[120px] opacity-10"></div>
    </div>

    <!-- Header -->
    <div class="relative z-10 flex items-center justify-between p-6">
        <button onclick="window.location.href='dashboard.html'" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center backdrop-blur-md active:scale-90 transition-transform">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h1 class="text-[13px] font-black tracking-[0.2em] text-slate-300 uppercase">Lucky Spin</h1>
        <div class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">
            <span class="text-sm">🎡</span>
        </div>
    </div>

    <div class="relative z-10 flex-1 flex flex-col items-center justify-center p-6 pb-20">
        
        <div class="mb-12 text-center">
            <h2 class="text-3xl font-black mb-2 text-white tracking-tight">Test Your <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#00E5A0] to-[#00A87A]">Luck!</span></h2>
            <p class="text-slate-400 text-[13px] font-medium leading-relaxed max-w-[250px] mx-auto">Watch 1 short Ad to unlock your spin. Win up to <span class="text-[#FFD700] font-bold">₹10</span> instantly.</p>
        </div>

        <!-- Wheel Section -->
        <div class="relative mb-14 drop-shadow-2xl">
            <div class="pointer"></div>
            <div class="wheel-center"></div>
            
            <div id="wheel" class="wheel-container">
                <div class="wheel-overlay"></div>
                <div class="wheel-lines"></div>
                <div class="slice-text t-1">₹1</div>
                <div class="slice-text t-2">₹2</div>
                <div class="slice-text t-3">₹3</div>
                <div class="slice-text t-4">Oops!</div>
                <div class="slice-text t-5">₹5</div>
                <div class="slice-text t-6">₹10</div>
            </div>
        </div>

        <!-- Call to Action Button -->
        <button id="spin-btn" onclick="startAdAndSpin()" class="w-full max-w-[300px] bg-gradient-to-r from-[#00A87A] to-[#00E5A0] text-slate-900 font-black py-4 rounded-2xl shadow-[0_10px_25px_rgba(0,168,122,0.3)] text-[15px] active:scale-95 transition-all flex items-center justify-center gap-2 group relative overflow-hidden">
            <div class="absolute inset-0 bg-white/20 transform -skew-x-12 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
            Watch Ad to Spin
        </button>

    </div>

    <!-- Ad Overlay -->
    <div id="ad-overlay" class="fixed inset-0 z-[100] bg-[#0B100E] flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-slate-800 border-t-[#00A87A] rounded-full animate-spin mx-auto mb-6 shadow-[0_0_15px_rgba(0,168,122,0.5)]"></div>
            <h3 class="text-xl font-black text-white mb-2">Sponsor Ad Playing...</h3>
            <p class="text-slate-400 text-sm font-bold bg-slate-800/50 px-4 py-2 rounded-full mt-4">Reward in <span id="ad-timer" class="text-[#00E5A0]">3</span>s</p>
        </div>
    </div>

    <!-- Result Overlay -->
    <div id="result-overlay" class="fixed inset-0 z-[150] bg-[#0B100E]/90 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 px-5">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-[320px] text-center shadow-2xl transform scale-90 transition-transform duration-300 relative overflow-hidden" id="result-card">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-emerald-100 rounded-full blur-3xl z-0"></div>
            
            <div class="relative z-10">
                <div id="result-icon" class="text-6xl mb-4 drop-shadow-md">🎉</div>
                <h3 id="result-title" class="text-2xl font-black text-slate-900 mb-2 tracking-tight">Congratulations!</h3>
                <p id="result-msg" class="text-slate-500 font-bold mb-8 text-sm">You won ₹5 in your vault.</p>
                <button onclick="window.location.href='dashboard.html'" class="w-full bg-[#0B100E] text-white font-black py-4 rounded-xl active:scale-95 transition-transform shadow-lg text-[14px]">Claim & Go to Dashboard</button>
            </div>
        </div>
    </div>

    <style>
        @keyframes shimmer {
            100% { transform: skewX(-12deg) translateX(200%); }
        }
    </style>

    <script>
        let isSpinning = false;

        // Backend Se Prize aayega toh kis angle pe rokna hai?
        // Mapping: Index 0 = ₹1, 1 = ₹2, 2 = ₹3, 3 = Loss, 4 = ₹5, 5 = ₹10
        const prizeMap = {
            1: { index: 0, title: "Small Win!", icon: "👍" },
            2: { index: 1, title: "Nice Job!", icon: "✌️" },
            3: { index: 2, title: "Great Win!", icon: "🎉" },
            0: { index: 3, title: "Better Luck!", icon: "😢", msg: "Oops! You missed it today." },
            5: { index: 4, title: "Awesome!", icon: "🔥" },
            10:{ index: 5, title: "JACKPOT!", icon: "🎰" }
        };

        async function startAdAndSpin() {
            if(isSpinning) return;
            isSpinning = true;
            
            // 1. Show Fake Ad (3 seconds) - Real App me yahan AdMob Network load hoga
            const adOverlay = document.getElementById("ad-overlay");
            adOverlay.classList.remove("pointer-events-none", "opacity-0");
            
            let timeLeft = 3;
            const timerEl = document.getElementById("ad-timer");
            timerEl.innerText = timeLeft;
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    adOverlay.classList.add("pointer-events-none", "opacity-0");
                    executeRealSpin(); // Call API After Ad
                }
            }, 1000);
        }

        async function executeRealSpin() {
            const spinBtn = document.getElementById("spin-btn");
            spinBtn.innerHTML = "Processing...";
            spinBtn.classList.add("opacity-50");

            try {
                // 2. Call Secure Backend API
                const response = await fetch('/api/spin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: userPhone, token: userToken })
                });

                const data = await response.json();

                if (response.ok) {
                    const rewardAmt = data.reward;
                    spinTheWheel(rewardAmt);
                } else {
                    alert(data.error); // E.g., "Already spinned today"
                    window.location.href = "dashboard.html";
                }
            } catch (error) {
                alert("Network Error! Try again.");
                isSpinning = false;
                spinBtn.innerHTML = "Watch Ad to Spin";
                spinBtn.classList.remove("opacity-50");
            }
        }

        function spinTheWheel(rewardAmt) {
            const wheel = document.getElementById("wheel");
            const prizeInfo = prizeMap[rewardAmt];
            
            // Calculation: 6 segments = 60 degrees each.
            // Formula to land on correct slice (with 5 full rotations extra for effect)
            // Extra random degree added so pointer doesn't land exactly on the line
            const sliceDegree = 60;
            const randomOffset = Math.floor(Math.random() * 40) + 10; // 10 to 50
            
            // 360 - (index * 60) aligns the slice to the top pointer
            const targetDegree = (5 * 360) + (360 - (prizeInfo.index * sliceDegree)) - sliceDegree/2 + randomOffset;

            // Start Rotation CSS Animation
            wheel.style.transform = `rotate(${targetDegree}deg)`;

            // Wait 4 Seconds for wheel to stop, then show popup
            setTimeout(() => {
                showResult(rewardAmt, prizeInfo);
            }, 4600); // Thoda time badhaya for smoother stop
        }

        function showResult(amt, info) {
            const overlay = document.getElementById("result-overlay");
            const card = document.getElementById("result-card");
            
            document.getElementById("result-icon").innerText = info.icon;
            document.getElementById("result-title").innerText = info.title;
            
            if(amt > 0) {
                document.getElementById("result-msg").innerText = `You won ₹${amt} in your vault!`;
            } else {
                document.getElementById("result-msg").innerText = info.msg;
            }

            overlay.classList.remove("pointer-events-none", "opacity-0");
            setTimeout(() => card.classList.remove("scale-90"), 50);
        }
    </script>
</body>
</html>
