<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Social Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F2F5F8] font-['Inter'] antialiased pb-20">

    <div class="px-5 py-5 flex items-center bg-white border-b border-slate-100 sticky top-0 z-50">
        <button onclick="window.history.back()" class="p-2 bg-slate-50 rounded-full mr-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg></button>
        <h3 class="font-black text-slate-800">Follow & Earn</h3>
    </div>

    <div class="p-5">
        <div class="bg-amber-50 border border-amber-100 rounded-2xl p-4 flex gap-3">
            <span class="text-xl">📸</span>
            <p class="text-[11px] font-bold text-amber-700 leading-tight">Follow the account and upload a screenshot for manual verification. Proof will be checked within 24 hours.</p>
        </div>
    </div>

    <div class="px-5">
        <div class="bg-white rounded-[28px] p-6 shadow-sm border border-slate-100">
            <div class="flex flex-col items-center text-center mb-6">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="w-16 h-16 mb-3">
                <h4 class="text-lg font-black text-slate-800">Follow on Instagram</h4>
                <p class="text-xs font-bold text-slate-400">Handle: @Earnprox_Official</p>
                <a href="https://instagram.com/yourhandle" class="mt-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white px-8 py-2.5 rounded-full font-bold text-sm active:scale-95 transition-all">Go to Profile</a>
            </div>

            <div class="border-2 border-dashed border-slate-200 rounded-[20px] p-5 flex flex-col items-center justify-center relative bg-slate-50/50" id="drop-zone">
                <input type="file" id="ss-input" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                <div id="preview-container" class="hidden flex flex-col items-center">
                    <img id="image-preview" src="" class="w-32 h-32 rounded-lg object-cover mb-3 border border-slate-200">
                    <p class="text-[10px] text-emerald-500 font-black">Image Selected!</p>
                </div>
                <div id="upload-placeholder" class="text-center">
                    <div class="text-2xl mb-1">📁</div>
                    <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Select Screenshot</p>
                </div>
            </div>

            <button id="submit-proof-btn" onclick="uploadAndSubmit()" class="w-full mt-6 bg-[#0B100E] text-white font-black py-4 rounded-2xl text-sm shadow-xl active:scale-95 transition-all hidden">Submit Proof</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('ss-input');
        const preview = document.getElementById('image-preview');
        const previewCont = document.getElementById('preview-container');
        const placeholder = document.getElementById('upload-placeholder');
        const submitBtn = document.getElementById('submit-proof-btn');

        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                previewCont.classList.remove('hidden');
                placeholder.classList.add('hidden');
                submitBtn.classList.remove('hidden');
            }
        };

        async function uploadAndSubmit() {
            const file = input.files[0];
            submitBtn.disabled = true;
            submitBtn.innerText = "Uploading to BBImage...";

            // BBImage API Logic (Using FormData)
            const formData = new FormData();
            formData.append("image", file);
            
            try {
                // Replace 'YOUR_API_KEY' with your actual BBImage/ImgBB API Key
                const response = await fetch("https://api.imgbb.com/1/upload?key=YOUR_API_KEY", {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();
                
                if(data.success) {
                    const imageUrl = data.data.url;
                    console.log("Uploaded Image URL:", imageUrl);
                    
                    // Now send 'imageUrl' to your own Backend Database
                    submitBtn.innerText = "Verifying with Admin...";
                    
                    // Simple Success Simulation
                    setTimeout(() => {
                        alert("Proof submitted successfully! Please wait for admin approval.");
                        window.location.reload();
                    }, 1500);
                }
            } catch (error) {
                alert("Upload failed. Try again.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Proof";
            }
        }
    </script>
</body>
</html>
