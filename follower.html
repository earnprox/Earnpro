<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Social Quests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken) {
            window.location.replace("login.html");
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth Bottom Sheet Animation */
        .bottom-sheet { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .bottom-sheet.active { transform: translateY(0); }
        .overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        
        /* Premium Soft Shadows */
        .premium-shadow { box-shadow: 0 12px 35px -10px rgba(0,0,0,0.05), 0 4px 10px -4px rgba(0,0,0,0.02); }
    </style>
</head>
<body class="antialiased pb-24 min-h-screen flex flex-col relative overflow-x-hidden">

    <div class="px-5 py-5 flex items-center bg-white/80 backdrop-blur-xl border-b border-slate-100 sticky top-0 z-40">
        <button onclick="window.history.back()" class="p-2 bg-slate-50 hover:bg-slate-100 rounded-full mr-3 active:scale-95 transition-transform">
            <svg class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <div>
            <h3 class="font-black text-slate-800 text-lg leading-tight">Social Quests</h3>
            <p class="text-[10px] font-bold text-slate-400">Follow & Upload Proof</p>
        </div>
    </div>

    <div class="p-5">
        <div class="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-100 rounded-2xl p-4 flex gap-4 shadow-sm relative overflow-hidden">
            <div class="absolute -right-4 -top-4 w-16 h-16 bg-amber-200/50 rounded-full blur-2xl"></div>
            <span class="text-3xl relative z-10 drop-shadow-sm">📸</span>
            <div class="relative z-10">
                <h4 class="text-xs font-black text-amber-800 uppercase tracking-wider mb-1">Manual Verification</h4>
                <p class="text-[11px] font-bold text-amber-700/80 leading-snug">Complete the task and upload a valid screenshot. Admin will verify and credit your wallet within 24 hours.</p>
            </div>
        </div>
    </div>

    <div class="px-5 space-y-4 flex-1" id="task-list">
        <div class="bg-white rounded-[24px] p-5 border border-slate-100 premium-shadow animate-pulse">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-14 h-14 bg-slate-200 rounded-2xl"></div>
                <div class="flex-1 space-y-2"><div class="w-2/3 h-4 bg-slate-200 rounded"></div><div class="w-1/3 h-3 bg-slate-200 rounded"></div></div>
            </div>
            <div class="flex gap-2"><div class="flex-1 h-12 bg-slate-200 rounded-xl"></div><div class="flex-1 h-12 bg-slate-200 rounded-xl"></div></div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeUploadModal()" class="overlay fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50"></div>
    <div id="upload-sheet" class="bottom-sheet fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] z-50 p-6 pt-2 pb-10 shadow-[0_-20px_40px_rgba(0,0,0,0.1)]">
        
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto my-3"></div>
        
        <h3 class="text-xl font-black text-slate-800 text-center mb-1">Submit Proof</h3>
        <p id="modal-task-name" class="text-xs font-bold text-slate-400 text-center mb-6 line-clamp-1">Task Name Here</p>

        <div class="border-2 border-dashed border-indigo-200 rounded-[24px] p-6 flex flex-col items-center justify-center relative bg-indigo-50/30 hover:bg-indigo-50/60 transition-colors" id="drop-zone">
            <input type="file" id="ss-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" accept="image/jpeg, image/png, image/webp">
            
            <div id="preview-container" class="hidden flex-col items-center relative z-20 pointer-events-none">
                <img id="image-preview" src="" class="w-32 h-64 object-cover rounded-xl mb-3 shadow-md border-2 border-white">
                <p class="text-[11px] text-indigo-600 font-black uppercase tracking-widest bg-indigo-100 px-3 py-1 rounded-full">Proof Attached ✅</p>
            </div>
            
            <div id="upload-placeholder" class="text-center relative z-0">
                <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm mx-auto mb-3 text-2xl border border-slate-100">📁</div>
                <p class="text-sm font-black text-slate-700">Tap to Select Screenshot</p>
                <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">JPG, PNG format only</p>
            </div>
        </div>

        <button id="submit-proof-btn" onclick="processUpload()" class="w-full mt-6 bg-slate-900 text-white font-black py-4 rounded-2xl text-sm shadow-xl active:scale-95 transition-all opacity-50 pointer-events-none flex justify-center items-center gap-2">
            Upload & Submit
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", 
            authDomain: "earnproxuc.firebaseapp.com", 
            projectId: "earnproxuc", 
            storageBucket: "earnproxuc.firebasestorage.app", 
            messagingSenderId: "411733884378", 
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // IMGBB API KEY (Put your actual key here)
        const IMGBB_API_KEY = "64639912061deae5ec9fb0a24eb5ef9c"; // Replace with your ImgBB key

        let activeUploadData = null; // Stores task data temporarily for the modal

        // Fetch Live Tasks for "Follower Task" Category
        const q = query(collection(db, "gigs"), where("category", "==", "Follower Task"));
        
        onSnapshot(q, (snapshot) => {
            const taskList = document.getElementById("task-list");
            
            if (snapshot.empty) {
                taskList.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 opacity-70">
                        <span class="text-6xl mb-4 drop-shadow-sm">🏜️</span>
                        <h4 class="font-black text-slate-800 text-lg">No Quests Available</h4>
                        <p class="text-xs font-bold text-slate-400 mt-1 text-center px-8">We are brewing new social tasks for you. Come back soon!</p>
                    </div>`;
                return;
            }

            let html = "";
            snapshot.forEach((doc) => {
                const task = doc.data();
                const taskId = doc.id;
                
                // Escape quotes for inline JSON passing
                const taskJson = JSON.stringify({ id: taskId, title: task.title, reward: task.reward }).replace(/"/g, '&quot;');

                html += `
                <div class="bg-white rounded-[24px] p-5 premium-shadow border border-slate-100 flex flex-col gap-4">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-gradient-to-br from-indigo-50 to-purple-50 rounded-[18px] flex items-center justify-center border border-indigo-100 shrink-0 text-3xl shadow-inner">
                            🎯
                        </div>
                        <div class="flex-1">
                            <h4 class="text-[16px] font-black text-slate-800 leading-tight">${task.title}</h4>
                            <div class="flex items-center gap-2 mt-1.5">
                                <span class="bg-emerald-50 text-emerald-600 text-[9px] font-black uppercase px-2 py-1 rounded tracking-widest border border-emerald-100">₹${parseFloat(task.reward).toFixed(2)}</span>
                                <span class="text-[10px] font-bold text-slate-400">Manual Check</span>
                            </div>
                        </div>
                    </div>
                    ${task.desc ? `<p class="text-xs font-semibold text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-100">${task.desc}</p>` : ''}
                    
                    <div class="flex gap-2 mt-1">
                        <a href="${task.link}" target="_blank" class="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-[12px] font-black py-3.5 rounded-xl text-center uppercase tracking-wider active:scale-95 transition-all border border-indigo-100">
                            Go To Link
                        </a>
                        <button onclick="window.openUploadModal('${taskJson}')" class="flex-1 bg-slate-900 hover:bg-black text-white text-[12px] font-black py-3.5 rounded-xl uppercase tracking-wider active:scale-95 transition-all shadow-md">
                            Upload Proof
                        </button>
                    </div>
                </div>`;
            });
            taskList.innerHTML = html;
        });

        // ======================= MODAL & UPLOAD LOGIC =======================
        
        const input = document.getElementById('ss-input');
        const preview = document.getElementById('image-preview');
        const previewCont = document.getElementById('preview-container');
        const placeholder = document.getElementById('upload-placeholder');
        const submitBtn = document.getElementById('submit-proof-btn');

        window.openUploadModal = (taskDataStr) => {
            activeUploadData = JSON.parse(taskDataStr.replace(/&quot;/g, '"'));
            document.getElementById('modal-task-name').innerText = activeUploadData.title;
            
            // Reset modal state
            input.value = "";
            preview.src = "";
            previewCont.classList.add('hidden');
            placeholder.classList.remove('hidden');
            submitBtn.classList.add('opacity-50', 'pointer-events-none');
            submitBtn.innerHTML = `Upload & Submit <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;

            document.getElementById('modal-overlay').classList.add('active');
            document.getElementById('upload-sheet').classList.add('active');
        };

        window.closeUploadModal = () => {
            document.getElementById('modal-overlay').classList.remove('active');
            document.getElementById('upload-sheet').classList.remove('active');
            activeUploadData = null;
        };

        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                // Validate size (e.g., max 5MB)
                if(file.size > 5 * 1024 * 1024) {
                    alert("Image is too large! Please select an image under 5MB.");
                    input.value = "";
                    return;
                }
                preview.src = URL.createObjectURL(file);
                previewCont.classList.remove('hidden');
                placeholder.classList.add('hidden');
                
                // Enable button
                submitBtn.classList.remove('opacity-50', 'pointer-events-none');
            }
        };

        window.processUpload = async () => {
            const file = input.files[0];
            if(!file || !activeUploadData) return;

            // UI Loading State
            submitBtn.classList.add('opacity-50', 'pointer-events-none');
            submitBtn.innerHTML = `<div class="w-5 h-5 border-4 border-slate-500 border-t-white rounded-full animate-spin"></div> Uploading Image...`;

            // 1. Upload to ImgBB
            const formData = new FormData();
            formData.append("image", file);
            
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();
                
                if(data.success) {
                    const imageUrl = data.data.url;
                    submitBtn.innerHTML = `<div class="w-5 h-5 border-4 border-slate-500 border-t-white rounded-full animate-spin"></div> Securing Data...`;
                    
                    // 2. Save to Firebase task_submissions collection
                    await addDoc(collection(db, "task_submissions"), {
                        taskId: activeUploadData.id,
                        gigName: activeUploadData.title,
                        gigReward: activeUploadData.reward,
                        userPhone: userPhone,
                        proofLink: imageUrl,
                        status: "Pending Approval",
                        remark: "No Remark",
                        timestamp: serverTimestamp()
                    });

                    // Success UI
                    submitBtn.innerHTML = `Success! 🎉`;
                    submitBtn.classList.remove('bg-slate-900');
                    submitBtn.classList.add('bg-emerald-500');
                    
                    setTimeout(() => {
                        alert(`Proof submitted for "${activeUploadData.title}"! Admin will review it soon.`);
                        closeUploadModal();
                    }, 1000);

                } else {
                    throw new Error("ImgBB Upload Failed");
                }
            } catch (error) {
                console.error("Upload Error:", error);
                alert("❌ Upload failed. Please check your internet and try again.");
                submitBtn.classList.remove('opacity-50', 'pointer-events-none');
                submitBtn.innerHTML = `Try Again`;
            }
        }
    </script>
</body>
</html>
