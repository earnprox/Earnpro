<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | X Coin Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const userPhone = localStorage.getItem("earnprox_user_phone");
        const userToken = sessionStorage.getItem("earnprox_secure_token");
        if (!userPhone || !userToken || userToken === "null") {
            window.location.replace("login.html");
        }
    </script>

    <style>
        :root {
            --bg-color: #09090B; --text-color: #FFFFFF;
            --glass-bg: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            --glass-border: rgba(255,255,255,0.08); --muted-text: #94A3B8;
        }
        body.light-mode {
            --bg-color: #F8FAFC; --text-color: #0F172A;
            --glass-bg: rgba(255, 255, 255, 0.7); --glass-border: rgba(0,0,0,0.05); --muted-text: #64748B;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-color); color: var(--text-color); transition: all 0.4s ease; overflow-x: hidden; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(24px); border: 1px solid var(--glass-border); box-shadow: 0 30px 60px rgba(0,0,0,0.05); color: var(--text-color); }
        .text-muted { color: var(--muted-text); }

        /* Premium Circular UI */
        .circular-progress {
            position: relative; width: 280px; height: 280px; border-radius: 50%;
            background: conic-gradient(rgba(245, 158, 11, 0.2) 100%, transparent 0);
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.1), 0 10px 40px rgba(0,0,0,0.05);
        }
        .circular-inner {
            width: 220px; height: 220px; border-radius: 50%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); transition: background-color 0.4s ease;
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen relative pb-10">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-64 bg-amber-500/10 blur-[80px] pointer-events-none z-0"></div>

    <div class="w-full max-w-md flex flex-col min-h-screen relative z-10 pt-6 px-5">
        
        <div class="flex items-center justify-between mb-10">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center glass-card rounded-full active:scale-90 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h3 class="font-black text-xl tracking-tight">Convert <span class="text-amber-500">X Coin</span></h3>
            <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center glass-card rounded-full active:scale-90 transition-all" id="theme-btn">🌞</button>
        </div>

        <div class="flex items-center justify-center mb-10 relative">
            <div class="circular-progress" id="circle-bar">
                <div class="circular-inner text-center">
                    <p class="text-[10px] font-black text-muted uppercase tracking-widest mb-1">X Coin Balance</p>
                    <h2 class="text-4xl font-black text-amber-500 tracking-tighter flex items-center justify-center gap-1">
                        <span id="display-coins">0</span>
                    </h2>
                    
                    <div class="w-1/2 h-[1px] bg-white/10 my-4"></div>
                    
                    <p class="text-[9px] font-black text-emerald-500 uppercase tracking-widest">Main Wallet Cash</p>
                    <h2 class="text-2xl font-bold tracking-tight mt-1" id="display-cash">₹0.00</h2>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <span class="text-xs font-bold text-muted">Conversion Rate</span>
                <span class="text-xs font-black text-amber-500 bg-amber-500/10 px-3 py-1 rounded-lg border border-amber-500/20">1000 X Coin = ₹1</span>
            </div>
            <div class="w-full h-[1px] bg-white/5 mb-4"></div>
            <div class="flex justify-between items-center">
                <span class="text-xs font-bold text-muted">Estimated Value</span>
                <span class="text-lg font-black text-emerald-400" id="est-value">₹0.00</span>
            </div>
        </div>

        <div class="mt-auto">
            <button id="convert-action-btn" onclick="secureConvertCoins()" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-slate-900 text-[15px] font-black py-4 rounded-xl uppercase tracking-widest shadow-[0_8px_25px_rgba(245,158,11,0.3)] active:scale-95 transition-all flex justify-center items-center gap-2">
                Convert to Main Wallet 💸
            </button>
            <p class="text-center text-[10px] font-bold text-muted mt-4">Securely processed by Server 🛡️</p>
        </div>
    </div>

    <div id="toast" class="fixed z-[1000] left-1/2 top-[40px] -translate-x-1/2 bg-emerald-500 border border-emerald-400 text-white font-black text-[12px] px-6 py-3.5 rounded-full shadow-[0_10px_30px_rgba(16,185,129,0.3)] opacity-0 pointer-events-none transition-all duration-300 transform -translate-y-4 w-max whitespace-nowrap">
        Success!
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, query, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", authDomain: "earnproxuc.firebaseapp.com", projectId: "earnproxuc", storageBucket: "earnproxuc.firebasestorage.app", messagingSenderId: "411733884378", appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        let userId = "";
        let currentCoins = 0;
        let currentCash = 0;
        const SECURE_API_TOKEN = "RashiAkash@2026_Secure";

        // 🌗 THEME LOGIC
        window.toggleTheme = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('earnprox_theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-btn').innerText = isLight ? '🌙' : '🌞';
        };

        if (localStorage.getItem('earnprox_theme') === 'light') { document.body.classList.add('light-mode'); document.getElementById('theme-btn').innerText = '🌙'; }

        // 🟢 LOAD REAL-TIME DATA
        async function initWallet() {
            const q = query(collection(db, "users"), where("phone", "==", userPhone));
            const snap = await getDocs(q);
            
            if(!snap.empty) {
                userId = snap.docs[0].id;
                
                // Real-time listener for UI updates
                onSnapshot(doc(db, "users", userId), (docSnap) => {
                    const data = docSnap.data();
                    currentCoins = data.coinBalance || 0;
                    currentCash = parseFloat(data.balance || 0);
                    updateUI();
                });
            }
        }
        initWallet();

        function updateUI() {
            // Numbers
            document.getElementById('display-coins').innerText = currentCoins.toLocaleString();
            document.getElementById('display-cash').innerText = `₹${currentCash.toFixed(2)}`;
            
            // Estimated Value (Allows fractional paisa e.g. ₹0.01)
            const estVal = currentCoins / 1000;
            document.getElementById('est-value').innerText = `₹${estVal.toFixed(3)}`;

            // Button State
            const btn = document.getElementById('convert-action-btn');
            if (currentCoins > 0) {
                btn.classList.remove('opacity-50', 'pointer-events-none', 'grayscale');
            } else {
                btn.classList.add('opacity-50', 'pointer-events-none', 'grayscale');
            }
        }

        // 🛡️ LEVEL-2 SECURE CONVERSION (VERCEL API CALL)
        window.secureConvertCoins = async () => {
            if (currentCoins <= 0) return;

            const btn = document.getElementById('convert-action-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-slate-900 border-t-transparent rounded-full animate-spin mx-auto"></div>`;
            btn.disabled = true;

            try {
                // Hitting the secure server
                const response = await fetch('/api/Rashiandakash', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'convert_coins', 
                        payload: { userPhone: userPhone },
                        secureToken: SECURE_API_TOKEN
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast(`Success! ₹${data.added.toFixed(2)} added to Main Wallet. 💸`);
                } else {
                    showToast(`❌ Error: ${data.error}`);
                }
            } catch (error) {
                showToast("❌ Network error. Try again.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
            }, 3000);
        }
    </script>
</body>
</html>
