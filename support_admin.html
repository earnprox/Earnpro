<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnproX | Support Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #E8EBF0; margin: 0; height: 100vh; overflow: hidden; }
        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        .dark-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        
        .user-card.active { background: #1C211F; border-left: 4px solid #00A87A; }
    </style>
</head>
<body class="flex h-screen selection:bg-emerald-100">

    <div class="w-full md:w-[350px] bg-[#0B100E] h-full flex flex-col border-r border-slate-800 shadow-2xl relative z-20 transition-transform duration-300" id="sidebar">
        
        <div class="p-6 border-b border-white/5">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-emerald-500/20 rounded-xl flex items-center justify-center text-emerald-400 text-xl shadow-inner border border-emerald-500/10">👨‍💻</div>
                <div>
                    <h1 class="font-black text-white text-[16px] tracking-wide">Support Desk</h1>
                    <p class="text-[11px] text-[#00A87A] font-bold uppercase tracking-widest">Admin Portal</p>
                </div>
            </div>
            <div class="bg-[#1C211F] rounded-full p-2 flex items-center gap-2 border border-white/5 focus-within:border-[#00A87A] transition-colors">
                <svg class="w-4 h-4 text-slate-400 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" placeholder="Search user phone..." class="bg-transparent border-none outline-none text-white text-xs w-full placeholder-slate-500">
            </div>
        </div>

        <div class="flex-1 overflow-y-auto dark-scrollbar p-3 space-y-2" id="user-list">
            
            <div class="user-card active p-4 rounded-2xl cursor-pointer hover:bg-[#1C211F] transition-colors flex items-center justify-between" onclick="openChat('9876543210', 'Akash Kumar')">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-white font-bold border border-white/10 shrink-0">A</div>
                    <div class="truncate">
                        <h3 class="text-white font-bold text-[13px] truncate">9876543210</h3>
                        <p class="text-slate-400 text-[11px] truncate">Withdrawal nhi aya bhai...</p>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-1 shrink-0">
                    <span class="text-[9px] text-slate-500 font-bold">10:45 AM</span>
                    <span class="w-4 h-4 bg-rose-500 rounded-full text-[9px] text-white flex items-center justify-center font-bold">1</span>
                </div>
            </div>

            <div class="user-card p-4 rounded-2xl cursor-pointer hover:bg-[#1C211F] transition-colors flex items-center justify-between" onclick="openChat('8888888888', 'Rahul')">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-white font-bold border border-white/10 shrink-0">R</div>
                    <div class="truncate">
                        <h3 class="text-white font-bold text-[13px] truncate">8888888888</h3>
                        <p class="text-slate-400 text-[11px] truncate">Task limit kab reset hogi?</p>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-1 shrink-0">
                    <span class="text-[9px] text-slate-500 font-bold">Yesterday</span>
                </div>
            </div>

        </div>
    </div>

    <div class="flex-1 bg-[#F8FAFC] h-full flex flex-col relative w-full absolute md:relative z-10 translate-x-full md:translate-x-0 transition-transform duration-300" id="chat-panel">
        
        <div class="bg-white p-5 border-b border-slate-200 shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button class="md:hidden p-2 bg-slate-100 rounded-full text-slate-600 mr-1" onclick="closeChat()">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <div class="w-11 h-11 rounded-full bg-slate-900 flex items-center justify-center text-white font-bold text-lg shadow-md" id="chat-header-avatar">A</div>
                <div>
                    <h2 class="font-bold text-slate-900 text-[16px]" id="chat-header-phone">9876543210</h2>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span class="w-2 h-2 bg-rose-500 rounded-full animate-pulse"></span>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Needs Reply</p>
                    </div>
                </div>
            </div>
            
            <button onclick="resolveTicket()" class="bg-emerald-50 text-[#00A87A] border border-emerald-200 px-4 py-2 rounded-xl text-[12px] font-bold flex items-center gap-2 hover:bg-emerald-100 transition-colors shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                Mark Resolved
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-5" id="admin-chat-box">
            
            <div class="flex items-end gap-2 w-full">
                <div class="w-8 h-8 rounded-full bg-slate-900 text-white flex-shrink-0 flex items-center justify-center text-xs font-bold shadow-sm mb-1">U</div>
                <div class="bg-white p-3.5 rounded-2xl rounded-bl-sm border border-slate-200 shadow-sm max-w-[70%]">
                    <p class="text-[13px] text-slate-700 font-medium leading-relaxed">Admin bhai, mera 100 rupaye ka withdrawal pending me hai. Kal lagaya tha.</p>
                    <span class="text-[9px] text-slate-400 mt-2 block font-bold">10:45 AM</span>
                </div>
            </div>

            </div>

        <div class="p-5 bg-white border-t border-slate-200">
            <div class="max-w-4xl mx-auto flex items-end gap-3">
                <div class="flex-1 bg-[#F8FAFC] border border-slate-200 rounded-[20px] p-2 focus-within:border-[#00A87A] focus-within:ring-2 focus-within:ring-emerald-500/10 transition-all shadow-inner">
                    <textarea id="admin-reply-input" rows="2" placeholder="Type your reply to user..." class="w-full bg-transparent border-none outline-none px-3 py-2 text-[13px] font-medium text-slate-800 placeholder-slate-400 resize-none"></textarea>
                </div>
                <button onclick="sendAdminReply()" class="w-12 h-12 bg-[#0B100E] text-white rounded-full flex items-center justify-center active:scale-95 transition-transform shadow-lg shrink-0">
                    <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
            <div class="max-w-4xl mx-auto mt-2 flex gap-2">
                <span onclick="quickReply('Check kar raha hu bhai, 5 minute dijiye.')" class="text-[10px] font-bold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full cursor-pointer hover:bg-slate-200">Check kar raha hu...</span>
                <span onclick="quickReply('Aapka withdrawal approve kar diya gaya hai! ✅')" class="text-[10px] font-bold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full cursor-pointer hover:bg-slate-200">Payment Approved ✅</span>
            </div>
        </div>

    </div>

    <script>
        const adminChatBox = document.getElementById('admin-chat-box');
        const adminReplyInput = document.getElementById('admin-reply-input');
        const chatPanel = document.getElementById('chat-panel');
        
        let currentChatUser = '9876543210';

        // 📱 Mobile View Logic
        function openChat(phone, name) {
            currentChatUser = phone;
            document.getElementById('chat-header-phone').innerText = phone;
            document.getElementById('chat-header-avatar').innerText = phone.charAt(0);
            
            // Slide in chat panel on mobile
            if(window.innerWidth < 768) {
                chatPanel.classList.remove('translate-x-full');
            }
        }

        function closeChat() {
            // Slide out chat panel on mobile
            chatPanel.classList.add('translate-x-full');
        }

        function scrollToBottom() {
            adminChatBox.scrollTop = adminChatBox.scrollHeight;
        }

        function quickReply(text) {
            adminReplyInput.value = text;
            adminReplyInput.focus();
        }

        function appendAdminMessage(msg) {
            const html = `
                <div class="flex items-end justify-end gap-2 w-full mt-4">
                    <div class="bg-[#0B100E] p-3.5 rounded-2xl rounded-br-sm shadow-md max-w-[70%] text-left">
                        <p class="text-[13px] text-white font-medium leading-relaxed">${msg}</p>
                        <div class="flex items-center justify-end gap-1 mt-2">
                            <span class="text-[9px] text-slate-400 font-bold">Just now</span>
                            <svg class="w-3 h-3 text-[#00A87A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                </div>`;
            adminChatBox.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        async function sendAdminReply() {
            const reply = adminReplyInput.value.trim();
            if(!reply) return;

            adminReplyInput.value = '';
            
            // Show UI immediately
            appendAdminMessage(reply);

            // 🚀 TO-DO: VERCEL / SUPABASE API CALL HERE
            /*
            await fetch('/api/Rashiandakash', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'reply_admin_chat', 
                    payload: { userPhone: currentChatUser, reply: reply },
                    secureToken: "RashiAkash@2026_Secure"
                })
            });
            */
        }

        function resolveTicket() {
            if(confirm('Are you sure you want to mark this ticket as resolved? This will clear the chat.')) {
                adminChatBox.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full opacity-50">
                        <div class="text-4xl mb-3">✅</div>
                        <p class="text-sm font-bold text-slate-500">Ticket Resolved & Cleared</p>
                    </div>
                `;
                // 🚀 TO-DO: API call to delete chat from Supabase to save DB space
            }
        }
    </script>
</body>
</html>
