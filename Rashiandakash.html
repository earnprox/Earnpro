<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Master Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }, colors: { primary: '#4680FF', bglight: '#F4F7FA', textdark: '#1D2630', textgray: '#5B6B79' } } } }
    </script>
    <style>
        body { background-color: #F4F7FA; color: #1D2630; overflow-x: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }
        @media (min-width: 768px) { body { padding-left: 260px; } }
        @media (max-width: 767px) { body { padding-top: 64px; padding-bottom: 30px; } }
        .light-card { background: #FFFFFF; box-shadow: 0px 4px 24px rgba(0, 0, 0, 0.03); border-radius: 16px; border: 1px solid #F3F5F7; overflow: hidden; position: relative; }
        .sidebar { background: #FFFFFF; box-shadow: 4px 0 24px rgba(0,0,0,0.05); }
        .nav-btn { color: #5B6B79; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
        .nav-active { background: #E8F0FE; color: #4680FF !important; font-weight: 700; border-right: 3px solid #4680FF; border-radius: 8px 0 0 8px; }
        .view-section { display: none; opacity: 0; transform: translateY(10px); }
        .view-section.active { display: block; opacity: 1; transform: translateY(0); transition: all 0.3s ease-out; }
        #auth-screen { display: flex; position: fixed; inset: 0; background: #F4F7FA; z-index: 9999; }
        #admin-app { display: none; }
        .authenticated #auth-screen { display: none; }
        .authenticated #admin-app { display: block; }
        .badge-green { background: #E6F4EA; color: #13C296; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; display: inline-flex; align-items: center; gap: 4px; }
        .badge-red { background: #FCEAEA; color: #DC2626; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; display: inline-flex; align-items: center; gap: 4px; }
    </style>
</head>
<body class="antialiased selection:bg-blue-100 selection:text-primary">

    <div id="auth-screen">
        <div class="light-card p-10 w-full max-w-sm text-center relative z-10 mx-auto mt-20">
            <h2 class="text-2xl font-black text-textdark mb-2">Admin Portal</h2>
            <input type="password" id="admin-pass" placeholder="Enter Master PIN" class="w-full bg-[#F8FAFC] p-4 rounded-xl mb-6 outline-none border border-slate-200 focus:border-primary font-bold text-center tracking-widest">
            <button onclick="window.doLogin(this)" class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">Secure Login</button>
        </div>
    </div>

    <div id="admin-app">
        <aside id="main-sidebar" class="sidebar fixed inset-y-0 left-0 w-[260px] flex flex-col z-[100] transform -translate-x-full md:translate-x-0 transition-transform duration-300">
            <div class="p-6 border-b border-slate-100 flex items-center gap-3">
                <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white font-black">E</div>
                <h1 class="text-xl font-black text-textdark">EarnproX</h1>
            </div>
            <div class="px-6 py-4 flex-1 overflow-y-auto">
                <nav class="flex flex-col gap-1">
                    <button onclick="window.switchView('dash', this)" class="nav-btn nav-active p-3 font-semibold rounded-lg transition">Analytics</button>
                    <button onclick="window.switchView('users', this)" class="nav-btn p-3 font-semibold rounded-lg transition">Manage Users</button>
                    <button onclick="window.switchView('reviews', this)" class="nav-btn p-3 font-semibold rounded-lg transition">Task Proofs</button>
                    <button onclick="window.switchView('payouts', this)" class="nav-btn p-3 font-semibold rounded-lg transition">Payout Queue</button>
                    <button onclick="window.switchView('gigs', this)" class="nav-btn p-3 font-semibold rounded-lg transition">Manage Gigs</button>
                    <button onclick="window.switchView('settings', this)" class="nav-btn p-3 font-semibold rounded-lg transition">Settings</button>
                </nav>
            </div>
            <div class="p-6 border-t">
                <button onclick="window.doLogout()" class="w-full py-3 text-rose-500 font-bold bg-rose-50 rounded-xl transition">Logout</button>
            </div>
        </aside>

        <main class="p-5 md:p-8 max-w-7xl mx-auto">
            <section id="view-dash" class="view-section active">
                <h2 class="text-3xl font-extrabold text-textdark mb-6">Dashboard Overview</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="light-card p-6">
                        <p class="text-xs font-semibold text-textgray mb-1">Total Distributed</p>
                        <h3 id="stat-total-paid" class="text-3xl font-extrabold text-textdark">₹0</h3>
                    </div>
                    <div class="light-card p-6">
                        <p class="text-xs font-semibold text-textgray mb-1">Today's Pay Run</p>
                        <h3 id="stat-today-paid" class="text-3xl font-extrabold text-textdark">₹0</h3>
                    </div>
                    <div class="light-card p-6">
                        <p class="text-xs font-semibold text-textgray mb-1">Total Users</p>
                        <h3 id="stat-users" class="text-3xl font-extrabold text-textdark">0</h3>
                    </div>
                </div>
            </section>

            <section id="view-users" class="view-section">
                <h2 class="text-2xl font-extrabold text-textdark mb-6">User Management</h2>
                <div id="user-list" class="grid gap-3"></div>
            </section>

            <section id="view-reviews" class="view-section">
                <h2 class="text-2xl font-extrabold text-textdark mb-6">New Task Proofs</h2>
                <div id="review-list" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                    </div>
            </section>

            <section id="view-payouts" class="view-section">
                <h2 class="text-2xl font-extrabold text-textdark mb-6">Payout Requests</h2>
                <div id="payouts-list" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3"></div>
            </section>

            <section id="view-gigs" class="view-section">
                <h2 class="text-2xl font-extrabold text-textdark mb-6">Create New Gig</h2>
                <div class="light-card p-6 space-y-4 mb-8">
                    <input type="text" id="gig-title" placeholder="Task Title" class="w-full p-3.5 rounded-xl border outline-none">
                    <div class="flex gap-4">
                        <input type="number" id="gig-reward" placeholder="Reward ₹" class="w-1/2 p-3.5 rounded-xl border outline-none font-bold text-emerald-600">
                        <select id="gig-category" class="w-1/2 p-3.5 rounded-xl border outline-none">
                            <option value="App Install">App Install</option>
                            <option value="Normal Task">Normal Task</option>
                        </select>
                    </div>
                    <input type="url" id="gig-link" placeholder="Link" class="w-full p-3.5 rounded-xl border outline-none">
                    <textarea id="gig-desc" placeholder="Instructions..." rows="3" class="w-full p-3.5 rounded-xl border outline-none"></textarea>
                    <button onclick="window.addGigToDB(this)" class="w-full bg-primary text-white font-bold py-3.5 rounded-xl shadow-md">Publish Gig</button>
                </div>
                <div id="live-gigs-list" class="grid md:grid-cols-2 gap-4"></div>
            </section>

            <section id="view-settings" class="view-section">
                <h2 class="text-2xl font-extrabold text-textdark mb-6">System Settings</h2>
                <div class="light-card p-6 space-y-4 border-l-4 border-l-primary">
                    <h3 class="font-bold text-lg">Change Master PIN</h3>
                    <input type="password" id="new-admin-pass" placeholder="Enter New PIN" class="w-full p-3.5 rounded-xl border outline-none text-center tracking-widest">
                    <button onclick="window.updateAdminPassword(this)" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl transition">Update PIN</button>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, query, where, onSnapshot, orderBy, updateDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI", 
            authDomain: "earnproxuc.firebaseapp.com", 
            projectId: "earnproxuc", 
            storageBucket: "earnproxuc.firebasestorage.app", 
            messagingSenderId: "411733884378", 
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        const SECURE_API_TOKEN = "RashiAkash@2026_Secure";
        let DB_HASH = null;
        let globalUsersData = {}; 

        // 🔐 Security Hash
        async function hashString(str) {
            const msgBuffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return [...new Uint8Array(hashBuffer)].map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 🛠 Admin API Helper (Stays Same)
        async function callAdminApi(actionName, payloadData, btnElement) {
            const ogText = btnElement ? btnElement.innerText : "";
            if(btnElement) { btnElement.innerText = "⏳"; btnElement.disabled = true; }
            try {
                const response = await fetch('/api/Rashiandakash', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: actionName, payload: payloadData, secureToken: SECURE_API_TOKEN }) });
                const data = await response.json();
                if (response.ok && data.success) return true; 
                else { alert("❌ Failed: " + (data.error || "Unknown")); return false; }
            } catch (error) { alert("❌ Connection lost!"); return false; } 
            finally { if(btnElement) { btnElement.innerText = ogText; btnElement.disabled = false; } }
        }

        window.startServerSync = function() {
            // Real-time Stats & Users
            onSnapshot(collection(db, "users"), (snap) => {
                document.getElementById('stat-users').innerText = snap.size;
                let html = "";
                snap.forEach(d => {
                    const u = d.data(); globalUsersData[d.id] = u;
                    html += `<div class="light-card p-4 flex justify-between items-center">
                        <div class="font-bold text-textdark">${u.name || u.phone}</div>
                        <div class="font-black text-primary">₹${parseFloat(u.balance || 0).toFixed(2)}</div>
                    </div>`;
                });
                document.getElementById('user-list').innerHTML = html;
            });

            // 🚀 NEW SYNC: Task Submissions (For Verification)
            onSnapshot(collection(db, "submissions"), (snap) => {
                let html = "";
                const subs = [];
                snap.forEach(d => subs.push({ id: d.id, ...d.data() }));
                subs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                subs.forEach(s => {
                    if(s.status === "PENDING") {
                        html += `
                        <div class="light-card p-5 border-l-4 border-l-indigo-500">
                            <span class="text-[9px] font-black text-indigo-600 bg-indigo-50 px-2 py-1 rounded inline-block mb-2 uppercase">New Proof</span>
                            <h4 class="font-bold text-sm leading-tight">${s.taskTitle}</h4>
                            <p class="text-[11px] font-bold text-slate-400 mt-1">User: +91 ${s.userPhone}</p>
                            <div class="flex gap-2 mt-4">
                                <a href="${s.screenshotUrl}" target="_blank" class="flex-1 bg-slate-100 text-center font-bold text-[10px] py-3 rounded-xl border transition">VIEW 🖼️</a>
                                <button onclick="window.processSubmission('${s.id}', 'COMPLETED', '${s.userPhone}', this)" class="flex-1 bg-emerald-500 text-white font-bold text-[10px] py-3 rounded-xl shadow-md transition">APPROVE</button>
                                <button onclick="window.processSubmission('${s.id}', 'REJECTED', '${s.userPhone}', this)" class="bg-rose-50 text-rose-500 font-bold px-4 py-3 rounded-xl text-[10px] transition">✖</button>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById('review-list').innerHTML = html || "<p class='text-slate-400 font-bold py-10 text-center col-span-full'>No pending proofs.</p>";
            });

            // Gigs Listener
            onSnapshot(collection(db, "gigs"), (snap) => {
                let html = ""; snap.forEach(d => { const g = d.data(); html += `<div class="light-card p-4 flex justify-between items-center"><h4 class="font-bold text-sm">${g.title}</h4><button onclick="window.deleteGig('${d.id}', this)" class="text-rose-500 font-bold">DEL</button></div>`; });
                document.getElementById('live-gigs-list').innerHTML = html;
            });
        };

        // 🚀 SUBMISSION PROCESSOR (Syncs with user app)
        window.processSubmission = async (docId, newStatus, phone, btn) => {
            if(!confirm(`Mark this task as ${newStatus}?`)) return;
            const ogText = btn.innerText; btn.innerText = "⏳"; btn.disabled = true;

            try {
                // Update submission status
                await updateDoc(doc(db, "submissions", docId), { status: newStatus, processedAt: new Date().toISOString() });

                // If Approved, trigger wallet update via your Vercel Admin API
                if(newStatus === 'COMPLETED') {
                    // Fetch submission data to get reward
                    const subSnap = await getDoc(doc(db, "submissions", docId));
                    const subData = subSnap.data();
                    
                    // Fetch gig to get exact reward amount
                    const gigQuery = query(collection(db, "gigs"), where("title", "==", subData.taskTitle));
                    const gigSnap = await getDoc(doc(db, "gigs", subData.taskId)); // Assuming taskId is the doc ID in gigs
                    
                    const reward = gigSnap.exists() ? gigSnap.data().reward : 0;

                    // Call your existing Vercel API action to update balance
                    await callAdminApi('approve_task', { 
                        taskId: docId, 
                        userPhone: phone, 
                        reward: reward 
                    }, btn);
                }
                alert(`Task ${newStatus}!`);
            } catch (e) {
                console.error(e);
                alert("Processing failed.");
            } finally {
                btn.innerText = ogText; btn.disabled = false;
            }
        };

        // Auth & Login
        window.doLogin = async (btn) => {
            const pass = document.getElementById('admin-pass').value.trim();
            btn.innerText = "Verifying...";
            try {
                const docSnap = await getDoc(doc(db, "app_settings", "master_config"));
                const dbHash = docSnap.exists() ? docSnap.data().adminHash : null;
                const inputHash = await hashString(pass);
                if ((dbHash && inputHash === dbHash) || (!dbHash && pass === "Akash@2026")) {
                    sessionStorage.setItem("secure_master_session", "verified");
                    document.body.classList.add('authenticated');
                    window.startServerSync();
                } else { alert("Wrong PIN"); }
            } catch (e) { alert("Error"); }
            finally { btn.innerText = "Secure Login"; }
        };

        window.doLogout = () => { sessionStorage.removeItem("secure_master_session"); location.reload(); };
        window.switchView = (id, btn) => { 
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active')); 
            if(btn) btn.classList.add('nav-active');
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active')); 
            document.getElementById('view-' + id).classList.add('active'); 
        };

        window.addGigToDB = async (btn) => {
            const t = document.getElementById('gig-title').value;
            const r = parseFloat(document.getElementById('gig-reward').value);
            const c = document.getElementById('gig-category').value;
            const l = document.getElementById('gig-link').value;
            const d = document.getElementById('gig-desc').value;
            await callAdminApi('add_gig', { title: t, reward: r, category: c, link: l, desc: d }, btn);
        };

        window.deleteGig = async (id, btn) => { if(confirm("Delete?")) await callAdminApi('delete_gig', { gigId: id }, btn); };

        const savedSession = sessionStorage.getItem("secure_master_session");
        if(savedSession === "verified") { document.body.classList.add('authenticated'); window.startServerSync(); }
    </script>
</body>
</html>
