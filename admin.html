<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F9FAFB; color: #111827; padding-bottom: 80px; }
        @media (min-width: 768px) { body { padding-bottom: 0; padding-left: 280px; } }
        
        .nav-active { background: #EEF2FF; color: #4F46E5 !important; border-radius: 16px; font-weight: 800; }
        @media (max-width: 767px) { .nav-active { background: transparent; border-top: 4px solid #4F46E5; border-radius: 0; } }

        .view-section { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .view-section.active { display: block; opacity: 1; transform: translateY(0); }
        
        #auth-screen { display: flex; position: fixed; inset: 0; background: #0F172A; z-index: 9999; }
        #admin-app { display: none; }
        .authenticated #auth-screen { display: none; }
        .authenticated #admin-app { display: block; }
        
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 10000; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-screen" class="flex flex-col items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-sm shadow-2xl text-center">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl mb-6 mx-auto flex items-center justify-center text-white font-black text-2xl shadow-lg rotate-3 italic">X</div>
            <h2 class="text-2xl font-extrabold text-slate-900 mb-2">Command Center</h2>
            <p class="text-sm text-slate-400 mb-8 font-medium italic">Authorized Access Only</p>
            <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-slate-100 p-4 rounded-2xl mb-4 outline-none border-2 border-transparent focus:border-indigo-500 font-black text-center tracking-[0.5em]">
            <button onclick="window.doLogin()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-indigo-700 active:scale-95 transition">Verify ID 🔓</button>
        </div>
    </div>

    <div id="admin-app">
        <aside class="fixed left-0 top-0 bottom-0 w-[280px] bg-white border-r hidden md:flex flex-col p-8 z-50">
            <h1 class="text-2xl font-black mb-12 tracking-tighter">EarnproX<span class="text-indigo-600">.</span>Admin</h1>
            <nav class="flex flex-col gap-2">
                <button onclick="window.switchView('dash', this)" class="nav-btn nav-active p-4 text-left flex items-center gap-3 font-bold text-slate-500 transition">📊 Dashboard</button>
                <button onclick="window.switchView('users', this)" class="nav-btn p-4 text-left flex items-center gap-3 font-bold text-slate-500 transition">👥 User Base</button>
                <button onclick="window.switchView('reviews', this)" class="nav-btn p-4 text-left flex items-center gap-3 font-bold text-slate-500 transition relative">
                    🔍 Review Proofs
                    <span id="badge-count" class="absolute right-4 bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded-full hidden">0</span>
                </button>
                <button onclick="window.switchView('gigs', this)" class="nav-btn p-4 text-left flex items-center gap-3 font-bold text-slate-500 transition">🚀 Add Tasks</button>
            </nav>
            <button onclick="window.doLogout()" class="mt-auto p-4 text-rose-500 font-bold hover:bg-rose-50 rounded-xl transition flex items-center gap-2">🚪 Logout</button>
        </aside>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t md:hidden flex justify-around p-3 z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
            <button onclick="window.switchView('dash', this)" class="flex flex-col items-center p-2 nav-btn nav-active"><span class="text-xl">📊</span><span class="text-[10px] font-black uppercase mt-1">Dash</span></button>
            <button onclick="window.switchView('users', this)" class="flex flex-col items-center p-2 nav-btn"><span class="text-xl">👥</span><span class="text-[10px] font-black uppercase mt-1">Users</span></button>
            <button onclick="window.switchView('reviews', this)" class="flex flex-col items-center p-2 nav-btn"><span class="text-xl">🔍</span><span class="text-[10px] font-black uppercase mt-1">Review</span></button>
            <button onclick="window.switchView('gigs', this)" class="flex flex-col items-center p-2 nav-btn"><span class="text-xl">🚀</span><span class="text-[10px] font-black uppercase mt-1">Gigs</span></button>
        </nav>

        <main class="p-4 md:p-12 max-w-5xl mx-auto">
            
            <section id="view-dash" class="view-section active">
                <h2 class="text-3xl font-extrabold mb-8 tracking-tight">Overview</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                    <div class="bg-white p-6 rounded-[2rem] border shadow-sm"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Users</p><h3 id="stat-users" class="text-4xl font-black text-indigo-600 mt-1">0</h3></div>
                    <div class="bg-white p-6 rounded-[2rem] border shadow-sm"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pending</p><h3 id="stat-pending" class="text-4xl font-black text-orange-500 mt-1">0</h3></div>
                    <button onclick="location.reload()" class="bg-slate-900 text-white rounded-[2rem] font-bold shadow-lg flex items-center justify-center gap-2">🔄 Sync</button>
                </div>
            </section>

            <section id="view-users" class="view-section">
                <h2 class="text-3xl font-extrabold mb-8 tracking-tight">Manage Users</h2>
                <div id="user-list" class="grid gap-3">
                    <p class="text-slate-400 text-center py-20 font-bold italic">Contacting Firebase Database...</p>
                </div>
            </section>

            <section id="view-reviews" class="view-section">
                <h2 class="text-3xl font-extrabold mb-8 tracking-tight">Task Approvals</h2>
                <div id="review-list" class="grid gap-6">
                    <p class="text-slate-400 text-center py-20 font-bold italic">Everything is reviewed! ✨</p>
                </div>
            </section>

            <section id="view-gigs" class="view-section">
                <h2 class="text-3xl font-extrabold mb-8 tracking-tight">Post New Task</h2>
                <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm max-w-lg space-y-5">
                    <div class="bg-slate-50 p-4 rounded-2xl border">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Title</label>
                        <input type="text" id="gig-title" placeholder="Subscribe Channel" class="w-full bg-transparent font-bold outline-none">
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Reward (₹)</label>
                        <input type="number" id="gig-reward" placeholder="20" class="w-full bg-transparent font-black text-2xl text-emerald-600 outline-none">
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Instruction Link</label>
                        <input type="text" id="gig-link" placeholder="Drive or Youtube Link" class="w-full bg-transparent font-medium outline-none">
                    </div>
                    <button onclick="window.addGigToDB()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition text-lg">Push Live 🚀</button>
                </div>
            </section>

        </main>
    </div>

    <div id="modal-bal" class="modal p-4">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h3 class="text-xl font-extrabold text-slate-900 mb-1">Adjust Wallet</h3>
            <p id="target-user-name" class="text-xs text-slate-400 mb-6 font-bold"></p>
            <div class="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 mb-8">
                <input type="number" id="target-new-bal" class="w-full bg-transparent text-5xl font-black text-indigo-600 outline-none text-center" placeholder="0">
            </div>
            <div class="flex gap-3">
                <button onclick="window.updateBalanceInDB()" class="flex-1 bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">Save</button>
                <button onclick="document.getElementById('modal-bal').classList.remove('active')" class="flex-1 bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI",
            authDomain: "earnproxuc.firebaseapp.com",
            projectId: "earnproxuc",
            storageBucket: "earnproxuc.firebasestorage.app",
            messagingSenderId: "411733884378",
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeId = "";

        // --- AUTH ---
        window.doLogin = () => {
            if(document.getElementById('admin-pass').value === "admin123") {
                localStorage.setItem("admin_login_prox", "true");
                document.body.classList.add('authenticated');
                startSync();
            } else { alert("❌ Unauthorized!"); }
        };
        window.doLogout = () => { localStorage.removeItem("admin_login_prox"); location.reload(); };

        // --- NAVIGATION ---
        window.switchView = (id, btn) => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            if(btn) btn.classList.add('nav-active');
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
        };

        // --- REAL-TIME SYNC ---
        function startSync() {
            // Users List Sync
            onSnapshot(collection(db, "users"), (snap) => {
                document.getElementById('stat-users').innerText = snap.size;
                let html = "";
                snap.forEach(d => {
                    const u = d.data();
                    html += `
                    <div class="bg-white p-5 rounded-[2rem] border card-shadow flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center font-black italic border border-indigo-100">${u.name.charAt(0)}</div>
                            <div>
                                <p class="font-bold text-slate-800 text-sm">${u.name}</p>
                                <p class="text-[10px] font-bold text-slate-400">+91 ${u.phone}</p>
                                <p class="text-[10px] text-indigo-500 font-black mt-1 uppercase">UPI: ${u.upi || 'PENDING'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-emerald-600 text-lg">₹${u.balance || 0}</p>
                            <div class="flex gap-1 mt-2">
                                <button onclick="window.openModal('${d.id}', '${u.name}', ${u.balance || 0})" class="bg-slate-900 text-white text-[9px] font-black px-3 py-2 rounded-xl uppercase">Edit</button>
                                <button onclick="window.blockUser('${d.id}')" class="bg-rose-50 text-rose-500 text-[9px] font-black px-3 py-2 rounded-xl uppercase">Block</button>
                            </div>
                        </div>
                    </div>`;
                });
                document.getElementById('user-list').innerHTML = html || "No users yet.";
            });

            // Reviews Sync
            onSnapshot(collection(db, "task_submissions"), (snap) => {
                let p = 0; let html = "";
                snap.forEach(d => {
                    const t = d.data();
                    if(t.status === "Pending Approval") {
                        p++;
                        html += `
                        <div class="bg-white p-6 rounded-[2.5rem] border card-shadow border-l-8 border-l-orange-400">
                            <div class="flex justify-between items-start mb-5">
                                <div>
                                    <p class="text-[10px] font-black text-orange-400 mb-1 uppercase tracking-widest">${t.gigName}</p>
                                    <h4 class="font-black text-slate-800">+91 ${t.userPhone}</h4>
                                </div>
                                <a href="${t.proofLink}" target="_blank" class="bg-indigo-50 text-indigo-600 font-black text-[9px] px-4 py-2 rounded-full border border-indigo-100 uppercase">Check ↗</a>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="window.approve('${d.id}', '${t.userPhone}', 20)" class="flex-1 bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-500/20 active:scale-95 transition">Approve</button>
                                <button onclick="window.reject('${d.id}')" class="flex-1 bg-slate-50 text-slate-400 font-black py-4 rounded-2xl active:scale-95 transition">Reject</button>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById('stat-pending').innerText = p;
                document.getElementById('review-list').innerHTML = html || "<p class='text-center py-20 text-slate-400 font-bold'>No pending proofs.</p>";
                const bc = document.getElementById('badge-count');
                if(p > 0) { bc.innerText = p; bc.classList.remove('hidden'); } else { bc.classList.add('hidden'); }
            });
        }

        // --- ACTIONS ---
        window.openModal = (id, name, bal) => {
            activeId = id; document.getElementById('target-user-name').innerText = name;
            document.getElementById('target-new-bal').value = bal;
            document.getElementById('modal-bal').classList.add('active');
        };

        window.updateBalanceInDB = async () => {
            const b = parseInt(document.getElementById('target-new-bal').value);
            await updateDoc(doc(db, "users", activeId), { balance: b });
            document.getElementById('modal-bal').classList.remove('active');
            alert("Updated!");
        };

        window.approve = async (id, phone, reward) => {
            await updateDoc(doc(db, "task_submissions", id), { status: "Completed" });
            const q = query(collection(db, "users"), where("phone", "==", phone));
            const uSnap = await getDocs(q);
            if(!uSnap.empty) {
                const ud = uSnap.docs[0];
                const nb = (ud.data().balance || 0) + reward;
                await updateDoc(doc(db, "users", ud.id), { balance: nb });
                alert("Paid ₹"+reward);
            }
        };

        window.reject = async (id) => { if(confirm("Reject?")) await deleteDoc(doc(db, "task_submissions", id)); };

        window.addGigToDB = async () => {
            const t = document.getElementById('gig-title').value;
            const r = parseInt(document.getElementById('gig-reward').value);
            const l = document.getElementById('gig-link').value;
            if(!t || !r) return alert("Fill data!");
            await addDoc(collection(db, "gigs"), { title: t, reward: r, link: l, timestamp: new Date() });
            alert("Gig is Live!");
            document.getElementById('gig-title').value = ""; document.getElementById('gig-reward').value = "";
        };

        window.blockUser = async (id) => { if(confirm("Delete user?")) await deleteDoc(doc(db, "users", id)); };

        // SESSION CHECK
        if(localStorage.getItem("admin_login_prox")) { document.body.classList.add('authenticated'); startSync(); }
    </script>
</body>
</html>
