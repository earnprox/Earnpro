<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnproX | Server Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F9FAFB; color: #111827; padding-bottom: 80px; }
        @media (min-width: 768px) { body { padding-bottom: 0; padding-left: 280px; } }
        .nav-active { background: #EEF2FF; color: #4F46E5 !important; border-radius: 16px; font-weight: 800; }
        @media (max-width: 767px) { .nav-active { background: transparent; border-top: 4px solid #4F46E5; border-radius: 0; } }
        .view-section { display: none; opacity: 0; transform: translateY(10px); }
        .view-section.active { display: block; opacity: 1; transform: translateY(0); transition: all 0.3s ease; }
        #auth-screen { display: flex; position: fixed; inset: 0; background: #0F172A; z-index: 9999; }
        #admin-app { display: none; }
        .authenticated #auth-screen { display: none; }
        .authenticated #admin-app { display: block; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 10000; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-screen" class="flex flex-col items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-sm shadow-2xl text-center">
            <h2 class="text-2xl font-extrabold text-slate-900 mb-2">Server Login</h2>
            <p class="text-sm text-slate-400 mb-8 font-medium">EarnproX Database Access</p>
            <input type="password" id="admin-pass" placeholder="••••" class="w-full bg-slate-100 p-4 rounded-2xl mb-4 outline-none border-2 focus:border-indigo-500 font-black text-center tracking-[0.5em]">
            <button onclick="window.doLogin()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition">Connect to Server 🔗</button>
        </div>
    </div>

    <div id="admin-app">
        
        <aside class="fixed left-0 top-0 bottom-0 w-[280px] bg-white border-r hidden md:flex flex-col p-8 z-50">
            <h1 class="text-2xl font-black mb-12 tracking-tighter italic">EarnproX<span class="text-indigo-600">.</span></h1>
            <nav class="flex flex-col gap-2">
                <button onclick="window.switchView('dash', this)" class="nav-btn nav-active p-4 text-left flex items-center gap-3 font-bold text-slate-500 transition">📊 Dashboard</button>
                <button onclick="window.switchView('users', this)" class="nav-btn p-4 text-left flex items-center gap-3 font-bold text-slate-500 transition">👥 All Users</button>
                <button onclick="window.switchView('reviews', this)" class="nav-btn p-4 text-left flex items-center gap-3 font-bold text-slate-500 transition relative">
                    🔍 Proofs <span id="badge-count" class="absolute right-4 bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded-full hidden">0</span>
                </button>
                <button onclick="window.switchView('gigs', this)" class="nav-btn p-4 text-left flex items-center gap-3 font-bold text-slate-500 transition">🚀 Add Gig</button>
            </nav>
            <button onclick="window.doLogout()" class="mt-auto p-4 text-rose-500 font-bold hover:bg-rose-50 rounded-xl transition flex items-center gap-2">🚪 Disconnect</button>
        </aside>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t md:hidden flex justify-around p-3 z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
            <button onclick="window.switchView('dash', this)" class="flex flex-col items-center p-2 nav-btn nav-active"><span class="text-xl">📊</span><span class="text-[10px] font-black mt-1">Dash</span></button>
            <button onclick="window.switchView('users', this)" class="flex flex-col items-center p-2 nav-btn"><span class="text-xl">👥</span><span class="text-[10px] font-black mt-1">Users</span></button>
            <button onclick="window.switchView('reviews', this)" class="flex flex-col items-center p-2 nav-btn"><span class="text-xl">🔍</span><span class="text-[10px] font-black mt-1">Review</span></button>
            <button onclick="window.switchView('gigs', this)" class="flex flex-col items-center p-2 nav-btn"><span class="text-xl">🚀</span><span class="text-[10px] font-black mt-1">Gig</span></button>
        </nav>

        <main class="p-4 md:p-12 max-w-5xl mx-auto">
            
            <section id="view-dash" class="view-section active">
                <h2 class="text-3xl font-extrabold mb-8 tracking-tight">Database Stats</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                    <div class="bg-white p-6 rounded-3xl border card-shadow"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Users</p><h3 id="stat-users" class="text-4xl font-black text-indigo-600">0</h3></div>
                    <div class="bg-white p-6 rounded-3xl border card-shadow"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pending</p><h3 id="stat-pending" class="text-4xl font-black text-orange-500">0</h3></div>
                    <button onclick="location.reload()" class="bg-slate-900 text-white rounded-3xl font-bold text-sm h-full flex items-center justify-center p-4">🔄 Refresh</button>
                </div>
            </section>

            <section id="view-users" class="view-section">
                <h2 class="text-3xl font-extrabold mb-8 tracking-tight">Server Users</h2>
                <div id="user-list" class="grid gap-3">
                    <p class="text-slate-400 text-center py-20 font-bold italic">Connecting to Server...</p>
                </div>
            </section>

            <section id="view-reviews" class="view-section">
                <h2 class="text-3xl font-extrabold mb-8 tracking-tight">Task Approvals</h2>
                <div id="review-list" class="grid gap-6"></div>
            </section>

            <section id="view-gigs" class="view-section">
                <h2 class="text-3xl font-extrabold mb-8 tracking-tight">Upload to Server</h2>
                <div class="bg-white p-8 rounded-3xl border card-shadow max-w-lg space-y-4">
                    <input type="text" id="gig-title" placeholder="Gig Title (e.g. Rate 5 Star)" class="w-full bg-slate-50 p-4 rounded-xl border outline-none font-bold text-slate-800">
                    <input type="number" id="gig-reward" placeholder="Reward ₹ (e.g. 50)" class="w-full bg-slate-50 p-4 rounded-xl border outline-none font-black text-emerald-600">
                    <input type="text" id="gig-link" placeholder="Instruction Link (URL)" class="w-full bg-slate-50 p-4 rounded-xl border outline-none font-medium text-slate-500">
                    <button onclick="window.addGigToDB()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition">Upload Task 🚀</button>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-edit" class="modal p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative">
            <h3 class="text-2xl font-black text-slate-900 mb-6">Edit Server Data</h3>
            
            <div class="space-y-4 mb-8">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Full Name</label>
                    <input type="text" id="edit-name" class="w-full bg-slate-100 p-4 rounded-2xl outline-none border-2 focus:border-indigo-500 font-bold text-slate-800">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Phone (+91)</label>
                    <input type="tel" id="edit-phone" class="w-full bg-slate-100 p-4 rounded-2xl outline-none border-2 focus:border-indigo-500 font-bold text-slate-800">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">UPI ID</label>
                    <input type="text" id="edit-upi" class="w-full bg-slate-100 p-4 rounded-2xl outline-none border-2 focus:border-indigo-500 font-bold text-slate-800">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block">Wallet Balance (₹)</label>
                    <input type="number" id="edit-bal" class="w-full bg-indigo-50 p-4 rounded-2xl outline-none border-2 border-indigo-200 text-indigo-600 font-black text-xl">
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="window.saveUserData()" class="flex-1 bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">Save to Server</button>
                <button onclick="document.getElementById('modal-edit').classList.remove('active')" class="flex-1 bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl active:scale-95 transition">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🔥 FIREBASE KEYS
        const firebaseConfig = {
            apiKey: "AIzaSyCtOcibo2YODmROtrW4W1oRCW1ZvOslPfI",
            authDomain: "earnproxuc.firebaseapp.com",
            projectId: "earnproxuc",
            storageBucket: "earnproxuc.firebasestorage.app",
            messagingSenderId: "411733884378",
            appId: "1:411733884378:web:b3944ee303740e4ae1d4e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // GLOBAL VARIABLES (No HTML breaking issues anymore)
        let globalUsersData = {}; 
        let globalTasksData = {};
        let activeUserId = "";

        // AUTH & NAV
        window.doLogin = () => {
            if(document.getElementById('admin-pass').value === "admin123") {
                localStorage.setItem("adm_p", "t");
                document.body.classList.add('authenticated');
                startServerSync();
            } else { alert("❌ Access Denied!"); }
        };
        window.doLogout = () => { localStorage.removeItem("adm_p"); location.reload(); };

        window.switchView = (id, btn) => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            if(btn) btn.classList.add('nav-active');
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
        };

        // 🟢 SYNC WITH SERVER
        function startServerSync() {
            
            // Sync Users
            onSnapshot(collection(db, "users"), (snap) => {
                document.getElementById('stat-users').innerText = snap.size;
                let html = "";
                
                snap.forEach(d => {
                    const u = d.data();
                    globalUsersData[d.id] = u; // Save safely in JS memory, not HTML!

                    const initial = (u.name ? u.name.charAt(0) : "U").toUpperCase();
                    html += `
                    <div class="bg-white p-5 rounded-3xl border card-shadow flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center font-black text-lg border border-indigo-100">${initial}</div>
                            <div>
                                <p class="font-extrabold text-slate-800 text-sm">${u.name || "Unknown"}</p>
                                <p class="text-[10px] font-bold text-slate-400">+91 ${u.phone || "N/A"}</p>
                                <p class="text-[9px] text-indigo-500 font-black uppercase mt-1">UPI: ${u.upi && u.upi !== "None" ? u.upi : 'NOT SET'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-emerald-600 text-lg">₹${u.balance || 0}</p>
                            <div class="flex gap-1 mt-2">
                                <button onclick="window.openEditModal('${d.id}')" class="bg-slate-900 text-white text-[9px] font-black px-3 py-2 rounded-xl uppercase active:scale-95 transition">Edit</button>
                                <button onclick="window.blockUser('${d.id}')" class="bg-rose-50 text-rose-500 text-[9px] font-black px-3 py-2 rounded-xl uppercase active:scale-95 transition">Block</button>
                            </div>
                        </div>
                    </div>`;
                });
                document.getElementById('user-list').innerHTML = html || "<p class='text-center py-10 text-slate-400 font-bold'>Database Empty</p>";
            });

            // Sync Tasks
            onSnapshot(collection(db, "task_submissions"), (snap) => {
                let p = 0; let html = "";
                snap.forEach(d => {
                    const t = d.data();
                    globalTasksData[d.id] = t; // Save safely in JS memory

                    if(t.status === "Pending Approval") {
                        p++;
                        html += `
                        <div class="bg-white p-6 rounded-3xl border card-shadow border-l-8 border-l-orange-400">
                            <div class="flex justify-between items-start mb-5">
                                <div><p class="text-[10px] font-black text-orange-400 mb-1 uppercase tracking-widest">${t.gigName}</p><h4 class="font-black text-slate-800">+91 ${t.userPhone}</h4></div>
                                <a href="${t.proofLink}" target="_blank" class="bg-indigo-50 text-indigo-600 font-black text-[9px] px-4 py-2 rounded-full border border-indigo-100 uppercase">View ↗</a>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="window.approve('${d.id}')" class="flex-1 bg-emerald-500 text-white font-black py-4 rounded-2xl text-xs active:scale-95 transition shadow-lg shadow-emerald-500/20">Approve</button>
                                <button onclick="window.reject('${d.id}')" class="flex-1 bg-slate-50 text-slate-400 font-black py-4 rounded-2xl text-xs active:scale-95 transition">Reject</button>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById('stat-pending').innerText = p;
                document.getElementById('review-list').innerHTML = html || "<p class='text-center py-20 text-slate-400 font-bold italic'>Clear! ✨</p>";
                const bc = document.getElementById('badge-count');
                if(p > 0) { bc.innerText = p; bc.classList.remove('hidden'); } else { bc.classList.add('hidden'); }
            });
        }

        // ================= FULL SERVER ACTIONS =================

        // 1. OPEN MODAL SAFELY (Data strictly picked from memory, not HTML)
        window.openEditModal = (docId) => {
            activeUserId = docId;
            const userData = globalUsersData[docId]; // Picking exact data from Server snapshot
            
            document.getElementById('edit-name').value = userData.name || "";
            document.getElementById('edit-phone').value = userData.phone || "";
            document.getElementById('edit-upi').value = (userData.upi && userData.upi !== "None") ? userData.upi : "";
            document.getElementById('edit-bal').value = userData.balance || 0;
            
            document.getElementById('modal-edit').classList.add('active');
        };

        // 2. UPDATE SERVER SAFELY
        window.saveUserData = async () => {
            const btn = event.target;
            btn.innerText = "Updating...";

            const newName = document.getElementById('edit-name').value.trim();
            const newPhone = document.getElementById('edit-phone').value.trim();
            const newUpi = document.getElementById('edit-upi').value.trim();
            let newBal = parseInt(document.getElementById('edit-bal').value);
            
            if (isNaN(newBal)) newBal = 0;
            if (!newPhone || !newName) {
                alert("⚠️ Error: Name and Phone are required on Server.");
                btn.innerText = "Save to Server";
                return;
            }

            try {
                // Sending direct query to Firestore
                await updateDoc(doc(db, "users", activeUserId), {
                    name: newName,
                    phone: newPhone,
                    upi: newUpi || "None",
                    balance: newBal
                });
                
                document.getElementById('modal-edit').classList.remove('active');
                alert(`✅ Server Updated Successfully!\nName: ${newName}\nPhone: ${newPhone}\nBalance: ₹${newBal}`);
            } catch (error) {
                alert("❌ Server Error: " + error.message);
            } finally {
                btn.innerText = "Save to Server";
            }
        };

        // 3. APPROVE TASK SAFELY
        window.approve = async (taskId) => {
            try {
                const taskData = globalTasksData[taskId];
                const userPhone = taskData.userPhone;
                
                // Set task completed
                await updateDoc(doc(db, "task_submissions", taskId), { status: "Completed" });
                
                // Find user and add money
                const q = query(collection(db, "users"), where("phone", "==", userPhone));
                const uSnap = await getDocs(q);
                
                if(!uSnap.empty) {
                    const ud = uSnap.docs[0];
                    const nb = (ud.data().balance || 0) + 20; // 20 Rs reward
                    await updateDoc(doc(db, "users", ud.id), { balance: nb });
                    alert("✅ Task Approved. Reward added to server.");
                } else {
                    alert("⚠️ Task approved, but user phone not found in database.");
                }
            } catch (error) {
                alert("❌ Approval failed: " + error.message);
            }
        };

        // 4. ADD TASK TO SERVER
        window.addGigToDB = async () => {
            const btn = event.target;
            const t = document.getElementById('gig-title').value.trim();
            const rStr = document.getElementById('gig-reward').value;
            const r = parseInt(rStr);
            const l = document.getElementById('gig-link').value.trim();
            
            if(!t || isNaN(r)) {
                alert("⚠️ Fill Title and Reward to push to Server!");
                return;
            }
            
            btn.innerText = "Uploading...";
            try {
                await addDoc(collection(db, "gigs"), { title: t, reward: r, link: l, timestamp: new Date() });
                alert("🚀 Gig Uploaded to Server!");
                document.getElementById('gig-title').value = ""; document.getElementById('gig-reward').value = ""; document.getElementById('gig-link').value = "";
            } catch (e) {
                alert("❌ Database Error: " + e.message);
            } finally {
                btn.innerText = "Upload Task 🚀";
            }
        };

        window.reject = async (id) => { if(confirm("Delete this submission from server?")) await deleteDoc(doc(db, "task_submissions", id)); };
        window.blockUser = async (id) => { if(confirm("🚨 Delete user permanently from Server?")) await deleteDoc(doc(db, "users", id)); };

        // BOOT APP
        if(localStorage.getItem("adm_p")) { document.body.classList.add('authenticated'); startServerSync(); }
    </script>
</body>
</html>
